<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS P&L Simulator — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@500;600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap&subset=vietnamese" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0e1117; --panel:#161b24; --panel2:#1c222d; --card:#1a2029;
  --ink:#e8ebf0; --muted:#8b93a3; --dim:#5a6273; --line:#252c38; --line2:#2f3745;
  --own:#2dd4a7; --own-dim:#1a8f70;
  --blue:#4a9eff; --amber:#e0a234; --coral:#e2664b; --red:#e0574d; --violet:#8b7ff0; --gray:#6b7688;
  --pos:#2dd4a7; --neg:#e0574d; --warn:#e0a234;
  --radius:8px; --pw:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;font-weight:400;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px}
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--panel);
  border-bottom:1px solid var(--line);flex-shrink:0}
.topbar h1{font-family:'Noto Serif Display',serif;font-weight:600;font-size:16px;color:var(--ink)}
.ver-badge{background:var(--own);color:#06231b;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:7px;margin-left:4px}
.rel-stamp{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--dim);margin-left:6px;letter-spacing:.2px}
.spacer{flex:1}
.tab-toggle{display:flex;gap:0;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.tab-toggle button{border:none;background:var(--panel2);color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:12.5px;font-weight:600;padding:7px 18px;cursor:pointer;transition:all .12s}
.tab-toggle button.on{background:var(--own);color:#06231b}
.seg{display:flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
.seg button{border:none;background:var(--panel2);color:var(--muted);font-size:11.5px;font-weight:600;
  padding:6px 12px;cursor:pointer;transition:all .12s}
.seg button.on{background:var(--own);color:#06231b}
.btn{font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:600;padding:6px 11px;
  border:1px solid var(--line2);border-radius:7px;background:var(--panel2);cursor:pointer;color:var(--ink);transition:all .12s}
.btn:hover{border-color:var(--own);color:var(--own)}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.primary{background:var(--own);color:#06231b;border-color:var(--own)}
.btn.sm{padding:4px 9px;font-size:11px}

.main{flex:1;display:flex;overflow:hidden}
.control{width:var(--pw);min-width:200px;max-width:520px;background:var(--panel);border-right:1px solid var(--line);
  overflow-y:auto;flex-shrink:0;padding:12px}
.resizer{width:5px;cursor:col-resize;background:var(--line);flex-shrink:0;transition:background .12s}
.resizer:hover{background:var(--own-dim)}
.stage{flex:1;overflow-y:auto;padding:14px;position:relative}

.cblock{margin-bottom:16px}
.cblock-t{font-family:'Noto Serif Display',serif;font-size:12.5px;font-weight:600;color:var(--own);
  margin-bottom:8px;letter-spacing:.2px}
.cblock-t.clps{cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.cblock-t.clps .clps-caret{font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0}
.cblock.clps-off .cblock-t.clps .clps-caret{transform:rotate(-90deg)}
.cblock.clps-off > *:not(.cblock-t){display:none!important}
.cblock.clps-off{padding-bottom:6px}
.keyctrl.clps-off > *:not(.keyctrl-h){display:none!important}
.keyctrl.clps-off{padding-bottom:8px}
.keyctrl-h.clps .clps-caret{font-size:10px;color:var(--muted);transition:transform .15s}
.keyctrl.clps-off .keyctrl-h .clps-caret{transform:rotate(-90deg)}
.chn-row{display:flex;gap:6px;margin-bottom:6px}
.chn-tog{flex:1;text-align:center;padding:7px 4px;border:1px solid var(--line2);border-radius:7px;
  background:var(--panel2);cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);transition:all .12s}
.chn-tog.on{background:var(--own-dim);color:var(--ink);border-color:var(--own)}
.sld-row{margin-bottom:12px}
.sld-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.sld-lbl b{color:var(--ink);font-family:'DM Mono',monospace;font-weight:500}
input[type=range]{width:100%;height:4px;background:var(--line2);border-radius:2px;outline:none;-webkit-appearance:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--own);cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--own);cursor:pointer}
.sld-steps{display:flex;gap:4px;margin-top:4px}
.stepbtn{flex:1;padding:2px;border:1px solid var(--line2);border-radius:5px;background:var(--panel2);
  color:var(--muted);cursor:pointer;font-size:12px;line-height:1}
.stepbtn:hover{border-color:var(--own);color:var(--own)}
.derived{background:var(--panel2);border-radius:6px;padding:7px 9px;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center}
.derived .lbl{font-size:11px;color:var(--muted)}
.derived .val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--own)}

.mchips{display:flex;flex-wrap:wrap;gap:5px}
.mchip{padding:4px 9px;border:1px solid var(--line2);border-radius:6px;background:var(--panel2);
  cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all .12s}
.mchip.on{background:var(--own-dim);color:var(--ink);border-color:var(--own)}
.mchip.marker{border-style:dashed}
.mchip.marker.on{background:transparent;color:var(--amber);border-color:var(--amber)}

.ladder{margin-top:4px}
.ladder-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;
  border-bottom:1px solid var(--line);font-size:11.5px}
.ladder-row.head{background:var(--panel2);font-weight:600;color:var(--ink)}
.ladder-row.cm{border-top:1px solid var(--own-dim);color:var(--own);font-weight:600}
.ladder-row.op{border-top:1px solid var(--line2);font-weight:700}
.ladder-row .v{font-family:'DM Mono',monospace}
.ladder-row .v.neg{color:var(--neg)}
.ladder-row .v.pos{color:var(--pos)}

.zone{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.zone-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.zone-t{font-family:'Noto Serif Display',serif;font-size:13.5px;font-weight:600;color:var(--ink)}
.zone-sub{font-size:11px;color:var(--muted)}
.zgrid{display:grid;grid-template-columns:1fr 1.15fr;gap:12px}
.chart-wrap{position:relative;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:11px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:4px}
.lg-sw{width:10px;height:10px;border-radius:2px}
.lg-ln{width:12px;height:3px}

.chsel{display:flex;gap:5px}
.chsel button{padding:3px 10px;border:1px solid var(--line2);border-radius:6px;background:var(--panel2);
  color:var(--muted);cursor:pointer;font-size:10.5px;font-weight:600;transition:all .12s}
.chsel button.on{background:var(--own-dim);color:var(--ink);border-color:var(--own)}

.dtable{width:100%;border-collapse:collapse;font-size:11.5px}
.dtable th{background:var(--panel2);color:var(--muted);text-align:right;padding:5px 8px;font-size:10.5px;
  font-weight:600;position:sticky;top:0;border-bottom:1px solid var(--line2)}
.dtable th:first-child{text-align:left}
.dtable td{padding:4px 8px;border-bottom:1px solid var(--line);text-align:right;font-family:'DM Mono',monospace}
.dtable td:first-child{text-align:left;font-family:'Outfit',sans-serif;color:var(--muted)}
.dtable tr.grp td{background:var(--panel2);font-weight:600;color:var(--own);font-family:'Outfit',sans-serif}
.dtable tr.sum td{border-top:1px solid var(--own-dim);font-weight:600}
.dtable .neg{color:var(--neg)}
.collapse-h{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:6px 0}
.collapse-h .caret{transition:transform .15s;color:var(--muted)}
.collapse-h.closed .caret{transform:rotate(-90deg)}

.recon{font-size:11px;padding:7px 10px;border-radius:7px;margin-top:8px;background:var(--panel2)}
.depflow-row{display:flex;align-items:center;gap:7px;padding:4px 8px;border:1px solid var(--line);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:border-color .12s}
.depflow-row:hover{border-color:var(--own)}
.depflow-row .df-arrow{font-family:DM Mono;font-size:12px;color:var(--muted);flex-shrink:0}
.depflow-row .df-lbl{flex:1;font-size:11.5px;color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.depflow-row .df-val{font-family:DM Mono;font-size:11px;color:var(--own);flex-shrink:0}
.htc-tree{display:inline-block;padding:4px}
.htc-row{display:flex;align-items:center;gap:0}
.htc-inputs{display:flex;flex-direction:column;justify-content:center;gap:0}
.htc-card{background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:5px 9px;cursor:pointer;transition:border-color .12s;min-width:130px;flex-shrink:0;margin:5px 0}
.htc-card:hover{border-color:var(--own)}
.htc-card.htc-noval{border-color:var(--warn);border-style:dashed}
.htc-card .htc-lbl{font-size:11.5px;color:var(--ink);font-weight:500;white-space:nowrap}
.htc-card .htc-meta{display:flex;gap:6px;align-items:center;margin-top:2px}
.htc-card .htc-meta span{font-family:DM Mono;font-size:9px}
.htc-card .htc-val{color:var(--own)!important}
.htc-pinbadge{display:inline-block;background:var(--own);color:#06231b;font-size:9px;font-weight:700;padding:0 5px;border-radius:6px;margin-left:5px;font-family:"DM Mono",monospace;vertical-align:middle}
.htc-cardrow{display:flex;align-items:stretch;gap:0}
.htc-toggle{display:flex;align-items:center;justify-content:center;min-width:20px;cursor:pointer;color:var(--muted);font-size:13px;border-right:1px solid var(--line2);margin:-5px 6px -5px -9px;padding:0 4px;border-radius:6px 0 0 6px;transition:color .12s,background .12s}
.htc-toggle:hover{color:var(--own);background:rgba(45,212,167,.08)}
.htc-toggle-menu{display:flex;flex-direction:column;min-width:24px;padding:0;overflow:hidden}
.htc-toggle-menu .htc-t1,.htc-toggle-menu .htc-tall{display:flex;align-items:center;justify-content:center;flex:1;font-size:9px;font-weight:600;cursor:pointer;transition:color .12s,background .12s;color:var(--muted)}
.htc-toggle-menu .htc-t1{border-bottom:1px solid var(--line2)}
.htc-toggle-menu .htc-t1:hover{color:var(--own);background:rgba(45,212,167,.12)}
.htc-toggle-menu .htc-tall{font-size:11px}
.htc-toggle-menu .htc-tall:hover{color:var(--own);background:rgba(45,212,167,.12)}
/* ⭐ Key controls — thoáng, đẹp */
.keyctrl{border:1px solid var(--own);border-radius:12px;background:linear-gradient(180deg,rgba(45,212,167,.06),rgba(45,212,167,.02));padding:12px;margin-bottom:14px}
.keyctrl-h{font-size:12px;font-weight:800;color:var(--own);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;letter-spacing:.3px}
.keyctrl-h span{font-size:9.5px;color:var(--dim);font-weight:500;background:var(--panel2);padding:2px 8px;border-radius:10px}
.kc-item{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;margin-bottom:9px}
.kc-item:last-child{margin-bottom:0}
.kc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.kc-lbl{font-size:11.5px;font-weight:700;color:var(--ink)}
.kc-x{cursor:pointer;color:var(--muted);font-size:12px;padding:0 3px;border-radius:5px;transition:all .12s}
.kc-x:hover{color:var(--neg);background:rgba(179,64,46,.12)}
.kc-valrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.kc-valrow.readonly{margin-bottom:0}
.kc-unit{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.kc-val{font-family:DM Mono;font-size:15px;font-weight:500;color:var(--own)}
.kc-sld{width:100%;margin:2px 0 8px}
.kc-steps{display:flex;gap:6px}
.kc-steps .stepbtn{flex:1;padding:5px 0;font-size:13px;border:1px solid var(--line2);border-radius:7px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .12s}
.kc-steps .stepbtn:hover{border-color:var(--own);color:var(--own)}
.kc-tog{text-align:center;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--muted);transition:all .12s}
.kc-tog.on{background:var(--own);color:#06231b;border-color:var(--own)}
/* pair layout: table 40% | chart 40%, chia sẻ trung tâm */
.zone-topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pairzone .pairgrid{display:grid;gap:0;align-items:stretch}
.pair-tbl{min-width:0;overflow-x:auto;padding-right:8px}
.pair-chart{min-width:0;padding-left:8px}
.minitbl-wrap{overflow-x:auto;height:100%}
.minitbl{width:100%;border-collapse:collapse;font-size:11px}
.minitbl th{background:var(--panel2);color:var(--muted);text-align:right;padding:5px 8px;font-size:10px;font-weight:700;border-bottom:1px solid var(--line2);position:sticky;top:0}
.minitbl th:first-child{text-align:left}
.minitbl td{padding:5px 8px;text-align:right;font-family:DM Mono;font-size:11px;border-bottom:1px solid var(--line2);color:var(--ink)}
.minitbl td.mt-lbl{text-align:left;font-family:Outfit;color:var(--muted);font-weight:600;white-space:nowrap}
.minitbl tr:hover td{background:var(--panel2)}
@media(max-width:900px){.pairzone .pairgrid{grid-template-columns:1fr}}
.mchips-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.mchip-sm{padding:3px 0;font-size:10px;text-align:center;min-width:0}
.mini-preset{font-size:9.5px;padding:2px 7px;border:1px solid var(--line2);border-radius:6px;background:var(--panel2);color:var(--muted);cursor:pointer;font-weight:600}
.mini-preset:hover{border-color:var(--own);color:var(--own)}
/* pair resizer: ranh giới table|chart kéo được (dùng chung ratio) */
.pairzone .pairgrid{grid-template-columns:var(--pair-ratio,1fr) 10px var(--pair-ratio-r,1fr)}
.pair-resizer{cursor:col-resize;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .12s}
.pair-resizer:hover,.pair-resizer.dragging{background:rgba(45,212,167,.18)}
.pair-resizer::after{content:'';width:2px;height:36px;background:var(--line2);border-radius:2px}
.pair-resizer:hover::after,.pair-resizer.dragging::after{background:var(--own)}
.htc-cardmain{flex:1;cursor:pointer}
.htc-cyc{font-size:10px;color:var(--warn);font-style:italic;padding:4px 8px;border:1px dashed var(--warn);border-radius:5px;margin:5px 0}
.recon.ok{border-left:2px solid var(--own)}
.recon.bad{border-left:2px solid var(--neg)}

.warnbox{font-size:11px;padding:6px 9px;border-radius:6px;background:rgba(224,162,52,.1);
  border-left:2px solid var(--warn);color:var(--amber);margin-top:6px}
#status{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9000;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:14px;opacity:0;pointer-events:none;transition:opacity .2s}
#status.show{opacity:1}
#status.ok{background:var(--own);color:#06231b}
#status.warn{background:var(--warn);color:#2a1e06}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="status"></div>
<div class="topbar">
  <h1>SaaS P&L Simulator — Demo</h1>
  <span class="ver-badge">v1.25</span>
  <span class="rel-stamp">Released 07/07/2026 · v1.1: ownership view · KPI scorecard · backlog export</span>
  <div class="spacer"></div>
  <div class="seg" id="cashSeg">
    <button data-cashmode="false" class="on">Accrual</button>
    <button data-cashmode="true">Cash</button>
  </div>
  <div class="tab-toggle" id="tabToggle">
    <button data-tab="model" class="on">The Model</button>
    <button data-tab="config">Configure</button>
  </div>
  <button class="btn ghost sm" onclick="exportJSON()">⬇ Export</button>
</div>

<div class="main">
  <div class="control" id="control"></div>
  <div class="resizer" id="resizer"></div>
  <div class="stage" id="stageModel"></div>
  <div class="stage hidden" id="stageConfig"></div>
</div>
<script>
/* ============================================================
   SAAS P&L SIMULATOR — DEMO (phi định danh)
   Engine port từ Cashflow Sim v2.8 (verified) + churn 3 tầng.
   Vai: QUANTIFIER + FALSIFIER. 1 nguồn base (computeCB→computeAll).
   ============================================================ */
const N=36, USD=26.3;
const MLABELS=(()=>{const a=[];let y=2026,m=7;for(let i=0;i<N;i++){a.push('T'+m+'/'+String(y).slice(2));m++;if(m>12){m=1;y++;}}return a;})();
const CHN={TS:'TS · Telesale',SS:'SS · Self-serve',DS:'DS · Direct+BD'};
const CHK=['TS','SS','DS'];

const DEF={
  arpuTS:0.9,
  arpuMult:{TS:1.0, SS:1.2, DS:1.0},
  ch:{
    TS:{base0:50000, lead:125660, crMax:10, on:true},
    SS:{base0:30000, lead:200310, crMax:10, on:true},
    DS:{base0:0,     lead:62830,  crMax:10, on:true}
  },
  crAnchor:0.45,
  elasNew:{TS:-1.651, SS:-2.377, DS:-1.651},
  cogs:16, comm:15, commShare:45,
  tsSal:250, dsSal:100, csSal:200,
  // v1.23: ĐẢO nhân quả — leadPool là INPUT tay; ads (MKT cost) = DERIVED theo CPL bậc thang.
  leadPool:150000,       // demo: x10 để feed base x10. ads suy ngược qua CPL bậc thang.
  cplBase:0.02,          // CPL bậc base (tr/lead = 20K VND) cho baseTiers đầu
  cplStepPct:10,         // mỗi bậc SAU base, CPL +stepPct% CỦA base (linear, Cách B)
  cplBaseTiers:10,       // số bậc đầu giữ giá base (10 bậc × 1000 = 10K lead ở giá base)
  cplTierSize:1000,      // kích thước 1 bậc (lead)
  dsSaleCount:5, dsProductivity:196,  // v1.13: DS revenue-only = số người × doanh thu/người (tr)
  branding:300,
  devCost:600, devUtil:70, devMarkup:1.5,
  l2CM:604, l2Growth:0,
  l1Rev:130, l1Margin:50, l1Growth:5,
  hlb:-8, bu3:-686, bu3Trend:0, css:-244, cssTrend:0,
  f5On:false, f5Start:1, f5Build:3, f5Eng:150, f5Share:5, f5Growth:10,
  plug:-1444, cash0:47300,
  cashMode:false,
  cb:{
    term:12, reactOn:false, pool0:830000, reactRate:3, poolExpire:12,
    ch:{
      TS:{arpuBase:0.9, naturalDue:18, operatingDue:12, elasRen:1.752, term:12},
      SS:{arpuBase:0.9, naturalDue:19, operatingDue:13, elasRen:3.021, term:6},
      DS:{arpuBase:0.9, naturalDue:17, operatingDue:11, elasRen:1.752, term:12}
    }
  }
};
let CFG=JSON.parse(JSON.stringify(DEF));

function crOf(cfg,k){
  var m=cfg.ch[k]; if(!m)return 0;
  var crMax=(m.crMax!=null)?m.crMax:0;
  var anchor=cfg.crAnchor||0.45;
  var X=anchor>0?arpuOf(cfg,k)/anchor:1;
  var e=Math.abs((cfg.elasNew&&cfg.elasNew[k]!=null)?cfg.elasNew[k]:0);
  return (X<=1)?crMax:crMax*Math.pow(X,-e);
}
function leadPoolOf(cfg){return cfg.leadPool||0;} // v1.23: input tay (không còn ads/cpl)
// v1.23: MKT cost bậc thang. Base baseTiers bậc đầu ở cplBase; mỗi bậc sau +stepPct% CỦA base (linear).
function adsCostOf(cfg){
  var L=cfg.leadPool||0, ts=cfg.cplTierSize||1000, base=cfg.cplBase||0;
  var bt=cfg.cplBaseTiers||0, sp=(cfg.cplStepPct||0)/100;
  if(L<=0||ts<=0)return 0;
  var cost=0, remain=L, tier=0;
  while(remain>0){
    var q=Math.min(ts,remain);
    var over=tier-bt+1; // bậc thứ mấy sau base (bậc base cuối over=0)
    var cpl=(tier<bt)?base:base*(1+sp*over);
    cost+=q*cpl; remain-=q; tier++;
  }
  return cost;
}
function newOf(cfg,k){var m=cfg.ch[k];if(!m||!m.on)return 0;
  if(k==='DS')return 0; // DS revenue-only: không có new từ lead (rev = người×productivity)
  return leadPoolOf(cfg)*crOf(cfg,k)/100; // TS/SS: pool chung × CR riêng (song song, Cách Y)
}
function dsRevOf(cfg){return (cfg.dsSaleCount||0)*(cfg.dsProductivity||0);} // DS doanh thu trực tiếp
function arpuOf(cfg,k){return (cfg.arpuTS||0)*((cfg.arpuMult&&cfg.arpuMult[k]!=null)?cfg.arpuMult[k]:1);}
// v1.25: kỳ hạn per-channel — cb.ch[k].term nếu có, else cb.term (default fallback)
function termOf(cfg,k){var m=cfg.cb&&cfg.cb.ch&&cfg.cb.ch[k];return (m&&m.term!=null)?m.term:(cfg.cb?cfg.cb.term:12);}

function channelChurn(m,arpu){
  const aB=m.arpuBase||1;
  const naturalDue=m.naturalDue||0, operatingDue=m.operatingDue||0;
  const nonPriceDue=naturalDue+operatingDue;
  const Rmax=Math.max(0,100-nonPriceDue);
  const X=aB>0?arpu/aB:1;
  const e=Math.abs(m.elasRen||0);
  const renewal=(X<=1)?Rmax:Rmax*Math.pow(X,-e);
  const retentionOnDue=Math.max(0,Math.min(100,renewal));
  const totalDue=100-retentionOnDue;
  const priceDue=Math.max(0,totalDue-nonPriceDue);
  return {naturalDue,operatingDue,nonPriceDue,priceDue,totalDue,retentionOnDue,X,Rmax,e};
}

function computeCB(cfg){
  const cb=cfg.cb;
  // v1.25: dueRate per-channel (tính trong loop theo termOf)
  const chC={};for(const k in cb.ch)chC[k]=channelChurn(cb.ch[k],arpuOf(cfg,k));
  let base={};
  for(const k in cfg.ch){base[k]=cfg.ch[k].on?cfg.ch[k].base0:0;}
  let vint=[];const P=cb.reactOn?cb.pool0:0;
  for(let a=1;a<=cb.poolExpire;a++)vint.push({age:a,count:P/cb.poolExpire});
  const rows=[];
  for(let t=1;t<=N;t++){
    let baseStartTot=0,baseEndTot=0,dueTot=0,churnTot=0,renewTot=0,newTot=0,reactTot=0;
    let naturalTot=0,operatingTot=0,priceTot=0;
    const perCh={};
    let poolStart=vint.reduce((a,v)=>a+v.count,0);
    let react=0, expired=0;
    if(cb.reactOn){
      const target=Math.min(poolStart*(cb.reactRate/100),poolStart);
      const sorted=[...vint].sort((a,b)=>b.age-a.age);
      let need=target;
      for(const v of sorted){if(need<=0)break;const take=Math.min(v.count,need);v.count-=take;need-=take;react+=take;}
    }
    for(const k in cfg.ch)if(cfg.ch[k].on)baseStartTot+=base[k];
    for(const k in cfg.ch){
      if(!cfg.ch[k].on){perCh[k]={on:false};continue;}
      const cc=chC[k];
      const bStart=base[k];
      const dueRate=1/termOf(cfg,k); // v1.25: kỳ hạn riêng kênh
      const due=bStart*dueRate;
      const churn=due*(cc.totalDue/100);
      const chNatural=due*(cc.naturalDue/100);
      const chOperating=due*(cc.operatingDue/100);
      const chPrice=due*(cc.priceDue/100);
      const renew=due-churn;
      const nw=newOf(cfg,k);
      const reactShare=baseStartTot>0?react*(bStart/baseStartTot):0;
      const bEnd=bStart-churn+nw+reactShare;
      perCh[k]={on:true,baseStart:bStart,due,churn,chNatural,chOperating,chPrice,renew,new:nw,react:reactShare,baseEnd:bEnd,
        naturalDue:cc.naturalDue,operatingDue:cc.operatingDue,priceDue:cc.priceDue,totalDue:cc.totalDue,retentionOnDue:cc.retentionOnDue};
      base[k]=bEnd;
      baseEndTot+=bEnd;dueTot+=due;churnTot+=churn;renewTot+=renew;newTot+=nw;
      naturalTot+=chNatural;operatingTot+=chOperating;priceTot+=chPrice;
    }
    reactTot=react;
    vint.forEach(v=>v.age++);
    expired=vint.filter(v=>v.age>cb.poolExpire).reduce((a,v)=>a+v.count,0);
    vint=vint.filter(v=>v.age<=cb.poolExpire);
    if(cb.reactOn)vint.push({age:1,count:churnTot});
    const poolEnd=vint.reduce((a,v)=>a+v.count,0);
    let rev=0;
    for(const k in cfg.ch){if(!cfg.ch[k].on)continue;const pc=perCh[k];if(!pc||!pc.on)continue;
      const a=arpuOf(cfg,k);
      if(k==='DS'){ rev+=dsRevOf(cfg); continue; } // DS revenue-only
      if(cfg.cashMode){ rev+=(pc.new+pc.renew)*a*(termOf(cfg,k)/12); } // v1.25: per-channel term
      else { const avg=(pc.baseStart+pc.baseEnd)/2; rev+=avg*a/12; }
    }
    rows.push({t,lb:MLABELS[t-1],baseStart:baseStartTot,baseEnd:baseEndTot,due:dueTot,churn:churnTot,
      natural:naturalTot,operating:operatingTot,price:priceTot,
      renew:renewTot,newTot,react:reactTot,expired,rev,poolStart,poolEnd,perCh});
  }
  return {rows,cb,chC,arpuOf:(k)=>arpuOf(cfg,k)};
}

function computeAll(cfg){
  const cbFull=computeCB(cfg);
  let cash=cfg.cash0;
  let rows=[], beMonth=null, cashOut=null, minCash=cfg.cash0, minCashM=0, ownCum=0;
  for(let t=1;t<=N;t++){
    const cbr=cbFull.rows[t-1];
    let rev=0, baseEnd=0;const chBase={};const chPL={};
    for(const k in cfg.ch){
      const pc=cbr.perCh[k];
      if(!cfg.ch[k].on||!pc||!pc.on){chBase[k]=0;chPL[k]={on:false,start:0,add:0,renew:0,churn:0,end:0,avg:0,arpu:arpuOf(cfg,k),rev:0,cogs:0,comm:0,cm:0,fixDirect:0,fixAlloc:0,op:0};continue;}
      const a=arpuOf(cfg,k);
      const avg=(pc.baseStart+pc.baseEnd)/2;
      const rvk=(k==='DS')?dsRevOf(cfg):(cfg.cashMode?((pc.new+pc.renew)*a*(termOf(cfg,k)/12)):(avg*a/12));
      rev+=rvk;
      baseEnd+=pc.baseEnd;chBase[k]=pc.baseEnd;
      chPL[k]={on:true,start:pc.baseStart,add:pc.new,renew:pc.renew,churn:pc.churn,end:pc.baseEnd,avg,arpu:a,rev:rvk,cogs:0,comm:0,cm:0,fixDirect:0,fixAlloc:0,op:0,dsUsers:(k==='DS'&&a>0?rvk/(a/12):0)};
    }
    // v1.24: RECLASSIFY chi phí.
    //  Variable = COGS + commission + lương sale (TS,DS) + digital MKT (ads bậc thang). Lương/ads theo KÊNH cụ thể.
    //  Direct FC (dùng chung, phân bổ theo share doanh thu) = CS lương + Marketing(branding) + Dev/product.
    //  Allocated FC = css (corporate shared, kéo từ 'other' vào Own).
    const salesTS=cfg.ch.TS.on?(cfg.tsSal+adsCostOf(cfg)):0; // TS gánh lương telesale + toàn bộ digital MKT
    const salesDS=cfg.ch.DS.on?cfg.dsSal:0;                  // DS gánh lương direct sales
    const varSalesMkt=salesTS+salesDS;                       // phần variable "sale+mkt" (số tuyệt đối theo kênh)
    const varC=rev*(cfg.cogs/100)+rev*(cfg.comm/100)*(cfg.commShare/100)+varSalesMkt;
    const fixDirectTotal=cfg.csSal+cfg.branding+cfg.devCost; // v1.24: CS + Marketing + Dev = Direct FC dùng chung
    const fixAllocTotal=Math.abs(cfg.css*Math.pow(1+cfg.cssTrend/100,t-1)); // v1.24: CSS (số âm) → chi phí dương, Allocated FC
    const fixed=fixDirectTotal+fixAllocTotal;
    for(const k in cfg.ch){
      const p=chPL[k];if(!p.on){continue;}
      const share=rev>0?p.rev/rev:0;
      p.cogs=p.rev*(cfg.cogs/100);
      p.comm=p.rev*(cfg.comm/100)*(cfg.commShare/100);
      const salesK=(k==='TS'?salesTS:0)+(k==='DS'?salesDS:0); // lương+mkt của đúng kênh này (variable)
      p.salesMkt=salesK;
      p.cm=p.rev-p.cogs-p.comm-salesK;      // CM giờ đã trừ sale+mkt (theo lựa chọn CFO)
      p.fixDirect=fixDirectTotal*share;     // Direct FC dùng chung, phân bổ theo doanh thu
      p.fixAlloc=fixAllocTotal*share;       // CSS phân bổ theo doanh thu
      p.op=p.cm-p.fixDirect-p.fixAlloc;
    }
    const own=rev-varC-fixed;
    if(own>0&&beMonth===null)beMonth=t;
    ownCum+=own;
    const l2=cfg.l2CM*Math.pow(1+cfg.l2Growth/100,t-1); // v1.24: dev ĐÃ kéo về Own (Direct FC) — gỡ khỏi L2
    const l1=cfg.l1Rev*(cfg.l1Margin/100)*Math.pow(1+cfg.l1Growth/100,t-1);
    const bu3=cfg.bu3*Math.pow(1+cfg.bu3Trend/100,t-1);
    let f5=0;
    if(cfg.f5On&&t>=cfg.f5Start){const kk=t-cfg.f5Start;f5=(kk<cfg.f5Build)?-cfg.f5Eng:cfg.f5Share*Math.pow(1+cfg.f5Growth/100,kk-cfg.f5Build);}
    const other=cfg.hlb+bu3; // v1.24: css ĐÃ kéo vào Own (Allocated FC) — gỡ khỏi other
    const net=own+l2+l1+other+f5+cfg.plug;
    cash+=net;
    if(cash<minCash){minCash=cash;minCashM=t;}
    if(cash<0&&cashOut===null)cashOut=t;
    rows.push({t,lb:MLABELS[t-1],baseEnd,rev,own,l2,l1,other,f5,plug:cfg.plug,net,cash,chBase,chPL,
      varC,fixAllocTotal,fixDirectTotal,salesTS,salesDS,varSalesMkt});
  }
  let beSus=null;
  for(let i=N-1;i>=0;i--){if(rows[i].own>0)beSus=i+1;else break;}
  return {rows,cbFull,kpi:{cashEnd:rows[N-1].cash,netEnd:rows[N-1].net,baseEnd:rows[N-1].baseEnd,beMonth,beSus,cashOut,minCash,minCashM,ownCum}};
}

// steady state: tháng đầu |Δbase|<0.5%. Nếu null → tìm đỉnh/đảo chiều.
function steadyState(cbRows){
  let ss=null, peak=null;
  for(let i=1;i<cbRows.length;i++){
    const prev=cbRows[i-1].baseEnd, cur=cbRows[i].baseEnd;
    if(ss===null && prev>0 && Math.abs(cur-prev)/prev<0.005) ss=i+1;
  }
  // đỉnh: base cao nhất rồi giảm
  let maxV=-Infinity, maxI=0;
  cbRows.forEach((r,i)=>{if(r.baseEnd>maxV){maxV=r.baseEnd;maxI=i;}});
  if(maxI<cbRows.length-1) peak=maxI+1; // có đảo chiều
  return {ss,peak,trend:cbRows[cbRows.length-1].baseEnd>cbRows[0].baseStart?'up':'down'};
}

/* ===== MIDNODES (v1.10) — node trung gian engine-tính, TÁCH KÊNH, read-only.
   Tường minh tối đa: mọi biến trong công thức = 1 node. midValue đọc LAST tại tháng focus.
   {id,grp,label,unit,ch?,desc,formula,dep, get:(pc,r,cbr)=>value} ===== */
const MIDNODES=[];
(function buildMid(){
  const K=['TS','SS','DS'];
  // 1 GIÁ: arpu kênh (TS = arpuTS; SS/DS = arpuTS×mult)
  K.forEach(k=>{MIDNODES.push({id:'arpu_'+k,grp:1,ch:k,label:'ARPU · '+k,unit:'tr/năm',
    desc:'ARPU kênh '+k+' = arpuTS × hệ số kênh.',formula:k==='TS'?'arpu_TS=arpuTS':'arpu_'+k+'=arpuTS×mult'+k,
    dep:k==='TS'?['arpuTS']:['arpuTS','mult'+k],
    get:()=>arpuOf(CFG,k)});});
  // 2 CR: CR hiệu lực kênh
  K.forEach(k=>{MIDNODES.push({id:'crEff_'+k,grp:2,ch:k,label:'CR hiệu lực · '+k,unit:'%',
    desc:'CR sau điều chỉnh giá: X=arpu/anchor, X≤1→crMax, else crMax×X^(−|elasNew|).',
    formula:'crEff=(X≤1)?crMax:crMax×X^(−|elasNew|)',dep:['crMax'+k,'arpu_'+k,'crAnchor','elasNew'+k],
    get:()=>crOf(CFG,k)});});
  // 3 CHURN: totalChurn kênh (= nat+op+price %)
  K.forEach(k=>{MIDNODES.push({id:'totChurn_'+k,grp:3,ch:k,label:'Churn on-due · '+k,unit:'%',
    desc:'Tổng % churn khi đến hạn kênh '+k+' = natural+operating+price.',
    formula:'totalDue=natural+operating+price',dep:['nat'+k,'op'+k,'price'+k],
    get:(g)=>{const cc=LAST.cbFull.chC[k];return cc?cc.totalDue:null;}});});
  // 4 LƯỢNG: due, new, renew, baseEnd, baseAvg kênh
  K.forEach(k=>{
    MIDNODES.push({id:'due_'+k,grp:4,ch:k,label:'Đến hạn/tháng · '+k,unit:'user',
      desc:'Số user đến hạn kênh '+k+' = base_start × (1/kỳ hạn kênh).',formula:'due=base_start×(1/term_'+k+')',
      dep:['base0'+k,'term_'+k],get:()=>pcOf(k,'due')});
    MIDNODES.push({id:'new_'+k,grp:4,ch:k,label:'New/tháng · '+k,unit:'user',
      desc:k==='DS'?'DS revenue-only: user suy ngược = rev_DS / (arpu/12). Không từ lead.':'Khách mới kênh '+k+' = leadPool chung × CR hiệu lực.',
      formula:k==='DS'?'user_DS=rev_DS/(arpu/12)':'new=leadPool×crEff/100',
      dep:k==='DS'?['rev_DS','arpu_DS']:['leadPool','crEff_'+k],
      get:()=>{if(k==='DS'){const p=chPLOf('DS');return p?(p.dsUsers||0):null;}return pcOf(k,'new');}});
    MIDNODES.push({id:'renew_'+k,grp:4,ch:k,label:'Renew/tháng · '+k,unit:'user',
      desc:k==='DS'?'DS revenue-only: không có tái ký theo base.':'Tái ký kênh '+k+' = đến hạn × (1−churn on-due).',formula:k==='DS'?'—':'renew=due×(1−totalChurn/100)',
      dep:k==='DS'?[]:['due_'+k,'totChurn_'+k],get:()=>k==='DS'?0:pcOf(k,'renew')});
    MIDNODES.push({id:'baseEnd_'+k,grp:4,ch:k,label:'Base cuối kỳ · '+k,unit:'user',
      desc:'Base cuối = đầu − churn + new + reactivation kênh '+k+'.',formula:'baseEnd=base_start−churn+new+react',
      dep:['base0'+k,'totChurn_'+k,'new_'+k],get:()=>pcOf(k,'baseEnd')});
    MIDNODES.push({id:'baseAvg_'+k,grp:4,ch:k,label:'Base bình quân · '+k,unit:'user',
      desc:'Trung bình đầu-cuối kỳ kênh '+k+' (dùng cho Accrual).',formula:'baseAvg=(base_start+base_end)/2',
      dep:['base0'+k,'baseEnd_'+k],get:()=>{const pc=pcRaw(k);return pc?(pc.baseStart+pc.baseEnd)/2:null;}});
  });
  // 5 DOANH THU: rev kênh + revTotal
  K.forEach(k=>{MIDNODES.push({id:'rev_'+k,grp:5,ch:k,label:'Doanh thu/tháng · '+k,unit:'tr',
    desc:k==='DS'?'DS revenue-only = số người bán × doanh thu/người.':'Doanh thu kênh '+k+'. Cash: (new+renew)×arpu×term/12 · Accrual: baseAvg×arpu/12.',
    formula:k==='DS'?'rev_DS=dsSaleCount×dsProductivity':'Cash:(new+renew)×arpu×term/12 · Accrual:baseAvg×arpu/12',
    dep:k==='DS'?['dsSaleCount','dsProductivity']:['new_'+k,'renew_'+k,'arpu_'+k,'term_'+k,'cashMode','baseAvg_'+k],
    get:()=>{const p=chPLOf(k);return p?p.rev:null;}});});
  MIDNODES.push({id:'revTotal',grp:5,label:'Doanh thu/tháng (tổng Own)',unit:'tr',
    desc:'Tổng doanh thu 3 kênh Own tại tháng focus.',formula:'revTotal=Σ rev_kênh',
    dep:['rev_TS','rev_SS','rev_DS'],get:()=>LAST.rows[STATE.focusMonth-1].rev});
  // 6 CHI PHÍ (số tiền): COGS, Commission
  MIDNODES.push({id:'cogsAmt',grp:6,label:'COGS (tr)',unit:'tr',
    desc:'Giá vốn = doanh thu × COGS%.',formula:'cogsAmt=revTotal×cogs%',
    dep:['revTotal','cogs'],get:()=>{const r=LAST.rows[STATE.focusMonth-1];return r.rev*(CFG.cogs/100);}});
  MIDNODES.push({id:'commAmt',grp:6,label:'Commission (tr)',unit:'tr',
    desc:'Hoa hồng = doanh thu × comm% × commShare%.',formula:'commAmt=revTotal×comm%×commShare%',
    dep:['revTotal','comm','commShare'],get:()=>{const r=LAST.rows[STATE.focusMonth-1];return r.rev*(CFG.comm/100)*(CFG.commShare/100);}});
  // 6 CHI PHÍ (variable) — v1.24: lương sale + digital MKT trộn vào variable
  MIDNODES.push({id:'salesMktAmt',grp:6,label:'Sale+MKT variable (tr)',unit:'tr',
    desc:'v1.24: lương sale (TS+DS) + digital MKT (ads bậc thang) — nay là VARIABLE cost, trừ vào CM.',formula:'salesMkt=tsSal+ads+dsSal',
    dep:['tsSal','ads','dsSal'],get:()=>{const r=LAST.rows[STATE.focusMonth-1];return r.varSalesMkt||0;}});
  // 7 LỢI NHUẬN (số tiền): fixed trực tiếp, fixed phân bổ
  MIDNODES.push({id:'fixDirect',grp:7,label:'Fixed trực tiếp (tr)',unit:'tr',
    desc:'v1.24: Direct FC = CS lương + Marketing + Dev/product.',formula:'fixDirect=csSal+Marketing+devCost',
    dep:['csSal','branding','devCost'],get:()=>{const r=LAST.rows[STATE.focusMonth-1];return r.fixDirectTotal||0;}});
  MIDNODES.push({id:'fixAlloc',grp:7,label:'Fixed phân bổ (tr)',unit:'tr',
    desc:'v1.24: Allocated FC = CSS (corporate shared, kéo từ other vào Own).',formula:'fixAlloc=|css|',
    dep:['css'],get:()=>{const r=LAST.rows[STATE.focusMonth-1];return r.fixAllocTotal||0;}});
})();
function pcRaw(k){const cbr=LAST.cbFull.rows[STATE.focusMonth-1];const pc=cbr&&cbr.perCh[k];return (pc&&pc.on)?pc:null;}
function pcOf(k,f){const pc=pcRaw(k);return pc?pc[f]:null;}
function chPLOf(k){const r=LAST.rows[STATE.focusMonth-1];const p=r&&r.chPL[k];return (p&&p.on)?p:null;}
function midValue(node){try{const v=node.get?node.get():null;return v;}catch(e){return null;}}
function allMidNodes(){return MIDNODES;}

/* deep get/set CFG theo path */
function getPath(o,p){return p.split('.').reduce((a,k)=>a==null?a:a[k],o);}
function setPath(o,p,v){const ks=p.split('.');const last=ks.pop();let t=o;for(const k of ks)t=t[k];t[last]=v;}
function nodeVal(node){if(!node.path)return null;return getPath(CFG,node.path);}

/* ===== localStorage — autosave qua version (đọc bản trước nếu bản này chưa có) ===== */
const LSKEY='saas_pnl_sim_demo_v1';
const LSKEY_HISTORY=[]; // demo: không kế thừa lịch sử bản định danh
let lastSaved=null;
function hasLS(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch(e){return false;}}
function save(){if(!hasLS())return;try{localStorage.setItem(LSKEY,JSON.stringify({CFG,meta:STATE.meta,anno:ANNO,annoSeq,
  months:[...STATE.months],markers:[...STATE.markers],focusMonth:STATE.focusMonth,connStyle:STATE.connStyle,
  valign:STATE.valign,showChips:STATE.showChips,zoom:STATE.zoom,ownerPool:OWNERPOOL,depMode:STATE.depMode,treeDir:STATE.treeDir,listGroupBy:STATE.listGroupBy,filterKeepDep:STATE.filterKeepDep,pinned:[...(STATE.pinned||[])],scaleLock:STATE.scaleLock,pairRatio:STATE.pairRatio,panelCollapsed:[...(STATE.panelCollapsed||[])],teamOverride:STATE.teamOverride||{}}));
  lastSaved=new Date();updateSaveIndicator();}catch(e){}}
function updateSaveIndicator(){const el=document.getElementById('saveInd');if(el&&lastSaved){
  const hh=String(lastSaved.getHours()).padStart(2,'0'),mm=String(lastSaved.getMinutes()).padStart(2,'0'),ss=String(lastSaved.getSeconds()).padStart(2,'0');
  el.textContent='● Đã lưu '+hh+':'+mm+':'+ss;}}
function load(){if(!hasLS())return;try{
  let raw=localStorage.getItem(LSKEY);
  if(!raw){ // bản này chưa có → đọc bản version trước (migration tự động, không mất chỉnh tay)
    for(const k of LSKEY_HISTORY){const r=localStorage.getItem(k);if(r){raw=r;break;}}
  }
  if(!raw)return;const o=JSON.parse(raw);
  if(o.CFG)CFG=o.CFG;if(o.meta)STATE.meta=o.meta;if(o.anno)ANNO=o.anno;if(o.annoSeq)annoSeq=o.annoSeq;
  if(o.months)STATE.months=new Set(o.months);if(o.markers)STATE.markers=new Set(o.markers);if(o.pinned)STATE.pinned=new Set(o.pinned);if(o.scaleLock)STATE.scaleLock=o.scaleLock;if(o.pairRatio)STATE.pairRatio=o.pairRatio;if(o.panelCollapsed)STATE.panelCollapsed=new Set(o.panelCollapsed);
  if(o.focusMonth)STATE.focusMonth=o.focusMonth;if(o.connStyle)STATE.connStyle=o.connStyle;
  if(o.valign)STATE.valign=o.valign;if(o.showChips)STATE.showChips=Object.assign(STATE.showChips,o.showChips);
  if(o.zoom)STATE.zoom=o.zoom;if(o.ownerPool)OWNERPOOL=o.ownerPool;if(o.depMode)STATE.depMode=o.depMode;if(o.treeDir)STATE.treeDir=o.treeDir;if(o.listGroupBy)STATE.listGroupBy=o.listGroupBy;if(o.filterKeepDep!=null)STATE.filterKeepDep=o.filterKeepDep;if(o.teamOverride)STATE.teamOverride=o.teamOverride;
  // v1.5 migration: owner chỉ thuộc KPI node — dọn owner khỏi mọi node non-KPI
  const kpiIds=new Set(KPINODES.map(n=>n.id));
  for(const id in STATE.meta){if(!kpiIds.has(id)&&STATE.meta[id]&&STATE.meta[id].owners&&STATE.meta[id].owners.length){STATE.meta[id].owners=[];}}
}catch(e){}}

function status(msg,cls){const e=document.getElementById('status');e.textContent=msg;e.className='show '+(cls||'ok');
  setTimeout(()=>e.className='',2200);}
function fmt(v){if(v==null||isNaN(v))return '–';const r=Math.round(v);if(Math.abs(r)<0.5)return '–';
  return r<0?'('+Math.abs(r).toLocaleString('en-US')+')':r.toLocaleString('en-US');}
function fmt1(v){if(v==null||isNaN(v))return '–';return (Math.round(v*10)/10).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1});}
function fmt2(v){if(v==null||isNaN(v))return '–';return (Math.round(v*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ===== CONTROL PANEL — Tab 1 (The Model) ===== */
function pinnedControlsHTML(){ // ⭐ Key controls — node ghim
  const ids=[...(STATE.pinned||[])];
  if(!ids.length)return '';
  const byId={};allNodes().forEach(n=>byId[n.id]=n);
  let h='<div class="keyctrl"><div class="keyctrl-h">⭐ Key controls<span>'+ids.length+' node</span></div>';
  ids.forEach(id=>{const n=byId[id];if(!n){return;}
    const g=GRP.find(x=>x.id===n.grp)||{color:'gray'};const col=GCOL[g.color];
    const editable=(n.kind==='engine'&&n.type!=='derived'&&n.type!=='fwd'&&n.type!=='toggle'&&n.path);
    const isToggle=(n.type==='toggle'&&n.path);
    h+=`<div class="kc-item" style="border-left:3px solid ${col}">`;
    h+=`<div class="kc-top"><span class="kc-lbl">${esc(n.label)}</span><span class="kc-x" data-unpin="${id}" title="Gỡ ghim">✕</span></div>`;
    if(editable){
      const val=nodeVal(n);const disp=(n.step<1)?fmt2(val):fmt(val);
      h+=`<div class="kc-valrow"><span class="kc-unit">${n.unit||''}</span><b class="kc-val">${disp}</b></div>`+
         `<input type="range" class="kc-sld" data-pinsld="${n.path}" data-pinid="${id}" min="${n.min}" max="${n.max}" step="${n.step}" value="${val}">`+
         `<div class="kc-steps"><button class="stepbtn" data-pinstep="${n.path}" data-pinid="${id}" data-d="-1">−</button><button class="stepbtn" data-pinstep="${n.path}" data-pinid="${id}" data-d="1">+</button></div>`;
    }else if(isToggle){
      const val=nodeVal(n);const lbl=(id==='cashMode')?(val?'Cash':'Accrual'):(val?'Bật':'Tắt');

function sliderHTML(id,lbl,val,min,max,step,unit,focus){
  const disp=(step<1)?fmt2(val):fmt(val);
  return `<div class="sld-row"><div class="sld-lbl"><span>${lbl}</span><b>${disp}${unit?' '+unit:''}</b></div>`+
    `<input type="range" data-sld="${id}" min="${min}" max="${max}" step="${step}" value="${val}"${focus?' data-focus="1"':''}>`+
    `<div class="sld-steps"><button class="stepbtn" data-step="${id}" data-d="-1">−</button><button class="stepbtn" data-step="${id}" data-d="1">+</button></div></div>`;
}
function ladderRow(lbl,val,cls){
  const vcls=val<0?'neg':(val>0?'pos':'');
  return `<div class="ladder-row ${cls||''}"><span>${lbl}</span><span class="v ${vcls}">${fmt(val)}</span></div>`;
}
function decoratePanelCollapse(){
  const c=document.getElementById('control');if(!c)return;
  c.querySelectorAll('.cblock').forEach(bl=>{
    const t=bl.querySelector(':scope > .cblock-t');
    if(!t)return; // block không tiêu đề → bỏ
    if(bl.querySelector('[onclick*="closeNode"]'))return; // node editor header: bỏ
    const key=(t.textContent||'').replace(/[▾▸\s]+$/,'').trim();
    if(!key)return;
    if(bl.children.length<=1)return; // chỉ có tiêu đề → không cần
    if(t.classList.contains('clps'))return;
    t.classList.add('clps');
    const caret=document.createElement('span');caret.className='clps-caret';caret.textContent='▾';
    t.insertBefore(caret,t.firstChild);
    if(STATE.panelCollapsed&&STATE.panelCollapsed.has(key))bl.classList.add('clps-off');
    t.onclick=(e)=>{e.stopPropagation();
      if(!STATE.panelCollapsed)STATE.panelCollapsed=new Set();
      if(STATE.panelCollapsed.has(key)){STATE.panelCollapsed.delete(key);bl.classList.remove('clps-off');}
      else{STATE.panelCollapsed.add(key);bl.classList.add('clps-off');}
      save();};
  });
  // Key controls block (.keyctrl) cũng thu nhỏ được
  c.querySelectorAll('.keyctrl').forEach(bl=>{
    const t=bl.querySelector(':scope > .keyctrl-h');if(!t)return;
    if(t.classList.contains('clps'))return;
    const key='__keyctrl__';
    t.classList.add('clps');t.style.cursor='pointer';
    const caret=document.createElement('span');caret.className='clps-caret';caret.textContent='▾';caret.style.marginRight='4px';
    t.insertBefore(caret,t.firstChild);
    if(STATE.panelCollapsed&&STATE.panelCollapsed.has(key))bl.classList.add('clps-off');
    t.onclick=(e)=>{e.stopPropagation();
      if(!STATE.panelCollapsed)STATE.panelCollapsed=new Set();
      if(STATE.panelCollapsed.has(key)){STATE.panelCollapsed.delete(key);bl.classList.remove('clps-off');}
      else{STATE.panelCollapsed.add(key);bl.classList.add('clps-off');}
      save();};
  });
}
function bindControlModel(){
  document.querySelectorAll('[data-chtog]').forEach(b=>b.onclick=()=>{const k=b.dataset.chtog;
    const on=CFG.ch[k].on;const cnt=CHK.filter(x=>CFG.ch[x].on).length;
    if(on&&cnt<=1){status('Phải giữ ≥1 kênh','warn');return;}
    CFG.ch[k].on=!on;renderAll();});
  document.querySelectorAll('[data-sld]').forEach(s=>s.addEventListener('change',()=>{
    const id=s.dataset.sld;const v=parseFloat(s.value);
    if(s.dataset.focus){STATE.focusMonth=Math.round(v);}else{setPath(CFG,id,v);}
    renderAll();}));
  document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.step,d=+b.dataset.d;
    if(id==='__focus'){STATE.focusMonth=Math.max(1,Math.min(36,STATE.focusMonth+d));renderAll();return;}
    const node=PMAP.find(n=>n.path===id)||{step:id==='arpuTS'?0.1:(id==='cb.term'?1:1)};
    const st=node.step||1;let nv=Math.round((getPath(CFG,id)+st*d)*100)/100;
    const mn=node.min!=null?node.min:0;nv=Math.max(mn,nv);if(node.max!=null)nv=Math.min(node.max,nv);
    setPath(CFG,id,nv);renderAll();});
  document.querySelectorAll('[data-mchip]').forEach(b=>b.onclick=()=>{const m=+b.dataset.mchip;
    if(STATE.months.has(m)){if(STATE.months.size>1)STATE.months.delete(m);}else STATE.months.add(m);renderAll();});
  document.querySelectorAll('[data-marker]').forEach(b=>b.onclick=()=>{const m=+b.dataset.marker;
    if(STATE.markers.has(m))STATE.markers.delete(m);else STATE.markers.add(m);renderAll();});
  document.querySelectorAll('[data-mpreset]').forEach(b=>b.onclick=()=>{const p=b.dataset.mpreset;
    if(p==='clear')STATE.months=new Set([STATE.focusMonth]);
    else if(p==='quarter')STATE.months=new Set([3,6,9,12,15,18,21,24,27,30,33,36]);
    else if(p==='halfyear')STATE.months=new Set([6,12,18,24,30,36]);
    renderAll();});
  document.querySelectorAll('[data-kpreset]').forEach(b=>b.onclick=()=>{const p=b.dataset.kpreset;
    if(p==='clear')STATE.markers=new Set();
    else if(p==='quarter')STATE.markers=new Set([3,6,9,12,15,18,21,24,27,30,33,36]);
    renderAll();});
  // ⭐ pinned controls (v1.18)
  document.querySelectorAll('[data-pinsld]').forEach(s=>s.addEventListener('change',()=>{
    setPath(CFG,s.dataset.pinsld,parseFloat(s.value));renderAll();}));
  document.querySelectorAll('[data-pinstep]').forEach(b=>b.onclick=()=>{
    const path=b.dataset.pinstep,d=+b.dataset.d,id=b.dataset.pinid;
    const node=allNodes().find(n=>n.id===id)||{};const st=node.step||1;
    let nv=Math.round((getPath(CFG,path)+st*d)*100)/100;
    if(node.min!=null)nv=Math.max(node.min,nv);if(node.max!=null)nv=Math.min(node.max,nv);
    setPath(CFG,path,nv);renderAll();});
  document.querySelectorAll('[data-pintog]').forEach(b=>b.onclick=()=>{
    const path=b.dataset.pintog;setPath(CFG,path,!getPath(CFG,path));renderAll();});
  document.querySelectorAll('[data-unpin]').forEach(b=>b.onclick=()=>{
    STATE.pinned.delete(b.dataset.unpin);save();renderControlModel();});
}

// tính miền hiện tại của mọi chart để khóa
function computeCurrentScales(){
  const {pick,rows}=chSelData();
  const base=rows.map(r=>pick(r,'baseEnd'));
  const churn=rows.map(r=>pick(r,'churn'));
  const nnew=rows.map(r=>pick(r,'newTot'));
  const renew=rows.map(r=>STATE.chSel==='ALL'?r.renew:(r.perCh[STATE.chSel]&&r.perCh[STATE.chSel].on?r.perCh[STATE.chSel].renew:0));
  const rev=LAST.rows.map(r=>r.rev);
  const maxOf=a=>Math.max(...a,1);
  return {
    ss_base:{min:0,max:maxOf(base)*1.05}, ss_flow:{min:0,max:maxOf(churn.concat(nnew))*1.1},
    flow_y:{min:-maxOf(churn)*1.1,max:maxOf(nnew.concat(renew))*1.1},
    base_y:{min:0,max:maxOf(base)*1.05}, base_rev:{min:0,max:maxOf(rev)*1.1},
    wf_y:{min:0,max:maxOf(base)*1.05}
  };
}

function drawCharts(ss){
  destroyCharts();
  const {pick,rows}=chSelData();
  const fm=STATE.focusMonth-1;
  Chart.defaults.color=CC.ink;Chart.defaults.font.family='Outfit, sans-serif';Chart.defaults.font.size=10.5;
  const noLeg={legend:{display:false}};

  const lk=(key,fallbackMin,fallbackMax)=>LS?{min:LS[key].min,max:LS[key].max}:{min:fallbackMin,max:fallbackMax};

  // Zone 1a waterfall
  const bS=pick(rows[fm],'baseStart'), nat=pick(rows[fm],'natural'), op=pick(rows[fm],'operating'),
    pr=pick(rows[fm],'price'), nw=pick(rows[fm],'newTot'), bE=pick(rows[fm],'baseEnd');
  let run=bS;const seg=[];
  seg.push([0,bS]); // base đầu
  run-=nat;seg.push([run,run+nat]);
  const afterNat=run;run-=op;seg.push([run,run+op]);
  const afterOp=run;run-=pr;seg.push([run,run+pr]);
  const afterPr=run;seg.push([afterPr,afterPr+nw]);
  seg.push([0,bE]);
  const mn=Math.min(bS,bE,afterPr)*0.96;
  charts.wf=new Chart(document.getElementById('wfChart'),{type:'bar',
    data:{labels:['Base đầu','Natural','Operating','Price','New','Base cuối'],
      datasets:[{data:seg,backgroundColor:[CC.base,CC.natural,CC.operating,CC.price,CC.new,CC.base],
        borderRadius:3,barPercentage:0.72}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{...noLeg,tooltip:{callbacks:{label:(x)=>{
      const v=Array.isArray(x.raw)?Math.abs(x.raw[1]-x.raw[0]):x.raw;return fmt(v);}}}},
      scales:{x:{ticks:{autoSkip:false,maxRotation:35,minRotation:35},grid:{display:false}},
        y:{beginAtZero:false,min:LS?LS.wf_y.min:Math.max(0,mn),max:LS?LS.wf_y.max:undefined,grid:{color:CC.grid},ticks:{callback:v=>Math.round(v).toLocaleString()}}}}});

  // Zone 1c steady state
  const labels=rows.map(r=>'M'+r.t);
  const base=rows.map(r=>Math.round(pick(r,'baseEnd')));
  const churn=rows.map(r=>Math.round(pick(r,'churn')));
  const nnew=rows.map(r=>Math.round(pick(r,'newTot')));
  const mk=(t)=>STATE.markers.has(t)?4:0;
  const mkArr=rows.map(r=>mk(r.t));
  charts.ss=new Chart(document.getElementById('ssChart'),{type:'line',
    data:{labels,datasets:[
      {label:'Base',data:base,yAxisID:'y',borderColor:CC.base,backgroundColor:'rgba(74,158,255,.08)',borderWidth:2,fill:true,pointRadius:mkArr,tension:.25},
      {label:'Churn',data:churn,yAxisID:'y1',borderColor:CC.churn,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.25},
      {label:'New',data:nnew,yAxisID:'y1',borderColor:CC.new,borderWidth:2,pointRadius:0,tension:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:noLeg,
      scales:{x:{grid:{display:false},ticks:{maxTicksLimit:8}},
        y:{position:'left',min:LS?LS.ss_base.min:undefined,max:LS?LS.ss_base.max:undefined,grid:{color:CC.grid},ticks:{callback:v=>(v/1000).toFixed(1)+'k'}},
        y1:{position:'right',min:LS?LS.ss_flow.min:undefined,max:LS?LS.ss_flow.max:undefined,grid:{display:false}}}}});

  // Zone 1b churn decomposition per kênh (% at due)
  const onCh=CHK.filter(k=>CFG.ch[k].on);
  const decNat=[],decOp=[],decPr=[];
  onCh.forEach(k=>{const cc=LAST.cbFull.chC[k];decNat.push(cc.naturalDue);decOp.push(cc.operatingDue);decPr.push(Math.round(cc.priceDue*10)/10);});

    data:{labels:onCh,datasets:[
      {label:'Natural',data:decNat,backgroundColor:CC.natural,barThickness:22},
      {label:'Operating',data:decOp,backgroundColor:CC.operating,barThickness:22},
      {label:'Price',data:decPr,backgroundColor:CC.price,borderRadius:3,barThickness:22}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:noLeg,
      scales:{x:{stacked:true,grid:{color:CC.grid},ticks:{callback:v=>v+'%'}},y:{stacked:true,grid:{display:false}}}}});

  // Zone 2 flow
  charts.flow=new Chart(document.getElementById('flowChart'),{type:'bar',

function renderTable(){
  const wrap=document.getElementById('tableWrap');if(!wrap)return;
  const mons=[...STATE.months].sort((a,b)=>a-b);
  const cols=mons.map(m=>LAST.rows[m-1]);
  const cbCols=mons.map(m=>LAST.cbFull.rows[m-1]);
  const cash=!!CFG.cashMode;
  let h=`<div class="zone"><div class="collapse-h${STATE.tableOpen?'':' closed'}" id="tblToggle">
    <span class="caret">▼</span><span class="zone-t">Bảng số · Customer ‖ Finance</span>
    <span class="zone-sub" style="margin-left:auto">${cash?'CASH':'ACCRUAL'} · cột = tháng chọn</span></div>`;
  if(STATE.tableOpen){
    h+='<div style="overflow-x:auto"><table class="dtable"><tr><th>Chỉ tiêu</th>'+mons.map(m=>`<th>M${m}</th>`).join('')+'</tr>';
    h+='<tr class="grp"><td>Khách hàng '+(cash?'(billing)':'(base flow)')+'</td>'+mons.map(()=>'<td></td>').join('')+'</tr>';
    if(cash){
      h+=row('New (ký mới)',cbCols.map(r=>r.newTot));
      h+=row('+ Renew (tái ký)',cbCols.map(r=>r.renew));
      h+=row('= Billed',cbCols.map(r=>r.newTot+r.renew),'sum');
      h+=row('Base cuối kỳ',cbCols.map(r=>r.baseEnd));
    }else{
      h+=row('Base đầu kỳ',cbCols.map(r=>r.baseStart));
      h+=row('+ New',cbCols.map(r=>r.newTot));
      h+=row('− Natural',cbCols.map(r=>-r.natural));
      h+=row('− Operating',cbCols.map(r=>-r.operating));
      h+=row('− Price',cbCols.map(r=>-r.price));
      h+=row('+ Renew',cbCols.map(r=>r.renew));
      h+=row('= Base cuối kỳ',cbCols.map(r=>r.baseEnd),'sum');
    }
    h+='<tr class="grp"><td>Finance (P&L Own)</td>'+mons.map(()=>'<td></td>').join('')+'</tr>';
    h+=row('Net revenue',cols.map(r=>r.rev),'sum');
    h+=row('− COGS',cols.map(r=>-r.rev*(CFG.cogs/100)));
    h+=row('− Commission',cols.map(r=>-r.rev*(CFG.comm/100)*(CFG.commShare/100)));
    h+=row('− Sale+MKT (variable)',cols.map(r=>-(r.varSalesMkt||0)));
    h+=row('= Contribution Margin',cols.map(r=>r.rev-r.rev*(CFG.cogs/100)-r.rev*(CFG.comm/100)*(CFG.commShare/100)-(r.varSalesMkt||0)),'sum');
    h+=row('− Fixed direct (CS+MKT+Dev)',cols.map(r=>-(r.fixDirectTotal||0)));
    h+=row('− Fixed alloc (CSS)',cols.map(r=>-(r.fixAllocTotal||0)));
    h+=row('= Operating Profit',cols.map(r=>r.own),'sum');
    h+='</table></div>';
    // recon
    let revB=0,opB=0;
    LAST.rows.forEach((r,i)=>{revB=Math.max(revB,Math.abs(r.rev-LAST.cbFull.rows[i].rev));
      let s=0;for(const k in r.chPL)if(r.chPL[k].on)s+=r.chPL[k].op;opB=Math.max(opB,Math.abs(s-r.own));});
    const ok=revB<0.01&&opB<0.01;
    h+=`<div class="recon ${ok?'ok':'bad'}"><b style="color:${ok?'var(--own)':'var(--neg)'}">${ok?'✓ KHỚP':'✗ LỆCH'}</b> · Revenue P&L vs Customer Base lệch tối đa/tháng = <span style="font-family:DM Mono">${fmt2(revB)}</span> · OP lệch = <span style="font-family:DM Mono">${fmt2(opB)}</span>. 1 nguồn base.</div>`;
  }
  h+='</div>';
  wrap.innerHTML=h;
  const tt=document.getElementById('tblToggle');if(tt)tt.onclick=()=>{STATE.tableOpen=!STATE.tableOpen;renderTable();};
}
function row(lbl,vals,cls){return `<tr class="${cls||''}"><td>${lbl}</td>`+vals.map(v=>`<td class="${v<0?'neg':''}">${fmt(v)}</td>`).join('')+'</tr>';}

const TEAM_LIST=['Finan','Sale','Marketing','CX','new input'];
// map tường minh theo bản chất phòng ban sở hữu chỉ số
const TEAM_MAP={
  // Sale — lương sale, commission, CR acquisition, DS bán hàng
  tsSal:'Sale', dsSal:'Sale', comm:'Sale', commShare:'Sale', rateUser:'Sale',
  crAnchor:'Sale', crMaxTS:'Sale', crMaxSS:'Sale', crMaxDS:'Sale',
  elasNewTS:'Sale', elasNewSS:'Sale', elasNewDS:'Sale',
  dsSaleCount:'Sale', dsProductivity:'Sale',
  // Marketing — ads/CPL, leadPool, branding(Marketing)
  ads:'Marketing', cplBase:'Marketing', cplStepPct:'Marketing', leadPool:'Marketing', branding:'Marketing',
  // CX — CS lương, churn on-due, retention elasticity, reactivation
  csSal:'CX',
  natTS:'CX', natSS:'CX', natDS:'CX', opTS:'CX', opSS:'CX', opDS:'CX', priceTS:'CX', priceSS:'CX', priceDS:'CX',
  elasRenTS:'CX', elasRenSS:'CX', elasRenDS:'CX',
  // Finan — giá/ARPU, term, COGS, base, doanh thu, CM/OP, fixed, segment khác
  arpuTS:'Finan', multSS:'Finan', multDS:'Finan',
  term:'Finan', term_TS:'Finan', term_SS:'Finan', term_DS:'Finan',
  cogs:'Finan', cogsAmt:'Finan', commAmt:'Finan', salesMktAmt:'Finan',
  base0TS:'Finan', base0SS:'Finan', base0DS:'Finan',
  cashMode:'Finan', revTotal:'Finan',
  cmOut:'Finan', opOut:'Finan', fixDirect:'Finan', fixAlloc:'Finan', devCost:'Finan', css:'Finan',
  kpi_base:'Finan', kpi_new:'Finan', kpi_churn:'Finan', kpi_rev:'Finan', kpi_cm:'Finan', kpi_runway:'Finan'
};
// prefix cho midnode per-channel (due_TS, new_SS, rev_DS, arpu_TS, renew_, baseAvg_, crEff_, totChurn_, baseEnd_)
function teamOf(id){
  if(STATE.teamOverride && STATE.teamOverride[id]) return STATE.teamOverride[id];
  if(TEAM_MAP[id]) return TEAM_MAP[id];
  // midnode per-channel
  if(/^new_|^crEff_/.test(id)) return 'Sale';         // khách mới, CR hiệu lực → Sale
  if(/^due_|^renew_|^totChurn_/.test(id)) return 'CX'; // đến hạn/tái ký/churn → CX
  if(/^rev_|^arpu_|^baseAvg_|^baseEnd_/.test(id)) return 'Finan'; // doanh thu/arpu/base → Finan
  return 'Finan'; // default
}

// v1.6: giá trị hiển thị của bất kỳ node nào (input tay / derived / kpi / price)
function nodeDisplayValue(node){
  if(!node)return null;
  if(node.type==='toggle'){if(node.id==='cashMode')return nodeVal(node)?'Cash':'Accrual';return nodeVal(node)?'Bật':'Tắt';}
  if(node.path!=null){const v=nodeVal(node);return v==null?null:(node.step<1?fmt2(v):fmt(v))+(node.unit&&node.unit!=='×'?' '+node.unit:(node.unit==='×'?'×':''));}
  if(node.type==='derived'){return derivedValue(node);} // đã có %/tr đơn vị
  if(node.kind==='kpi'){const mv=kpiModelVal(node);return mv==null?null:(node.unit==='%'?fmt2(mv)+'%':fmt(mv)+(node.unit&&node.unit!=='user'?' '+node.unit:(node.unit==='user'?' user':'')));}
  if(node.type==='mid'){const v=midValue(node);if(v==null)return null;return (node.unit==='%'?fmt2(v)+'%':(Math.abs(v)>=100?fmt(v):fmt2(v)))+(node.unit&&node.unit!=='%'?' '+node.unit:'');}
  if(node.type==='fwd')return 'FWD (chưa động)';
  return null;
}
// block truy nguyên: node này tính từ input nào (giá trị), và ảnh hưởng tới node nào
function depFlowHTML(node){
  const byId={};allNodes().forEach(n=>byId[n.id]=n);
  const deps=(node.dep||[]).map(id=>byId[id]).filter(Boolean);

  if(deps.length){

  }

  if(children.length){
    h+='<div class="cblock"><div style="font-size:10.5px;color:var(--dim);margin-bottom:4px">Ảnh hưởng tới ('+children.length+' node)</div>';
    children.forEach(ch=>{const cv=nodeDisplayValue(ch);
      h+=`<div class="depflow-row" data-flownode="${ch.id}"><span class="df-arrow" style="color:var(--own)">→</span><span class="df-lbl">${esc(trim(ch.label,26))}</span><span class="df-val">${cv==null?'–':esc(cv)}</span></div>`;});
    h+='</div>';
  }
  if(!deps.length&&!children.length)h+='<div style="font-size:10.5px;color:var(--dim);font-style:italic;margin-bottom:12px">Node độc lập — không khai dependency.</div>';
  return h;
}
function derivedValue(node){
  const r=LAST.rows[STATE.focusMonth-1];const cbr=LAST.cbFull.rows[STATE.focusMonth-1];
  if(node.id==='ads')return fmt(adsCostOf(CFG))+' tr';
  if(node.id==='cmOut'){const cogs=r.rev*(CFG.cogs/100),comm=r.rev*(CFG.comm/100)*(CFG.commShare/100);return fmt(r.rev-cogs-comm-(r.varSalesMkt||0))+' tr';}
  if(node.id==='opOut')return fmt(r.own)+' tr';
  if(node.id.startsWith('price')){const k=node.id.replace('price','');const cc=LAST.cbFull.chC[k];return cc?fmt2(cc.priceDue)+'%':'–';}
  return '–';
}
