/* ===== (2) DEPENDENCY VIEW — layered DAG: independent trái → dependent phải =====
   layer(n) = 0 nếu dep rỗng; else 1+max(layer(dep)). Cycle guard. */
function computeLayers(){
  const byId={};allNodes().forEach(n=>byId[n.id]=n);
  const layer={};const visiting={};let hasCycle=false;const cycleNodes=[];
  function lay(id,stack){
    if(layer[id]!=null)return layer[id];
    if(visiting[id]){hasCycle=true;cycleNodes.push(id);return 0;} // vòng → cắt tại đây
    visiting[id]=true;
    const n=byId[id];let mx=-1;
    (n&&n.dep||[]).forEach(d=>{if(byId[d])mx=Math.max(mx,lay(d,stack));});
    visiting[id]=false;
    layer[id]=mx+1;return layer[id];
  }
  allNodes().forEach(n=>lay(n.id,[]));
  return {layer,hasCycle,cycleNodes:[...new Set(cycleNodes)]};
}
function renderDependencyView(s){
  if(STATE.depMode==='tree'){renderDependencyTree(s);return;}
  const {layer,hasCycle,cycleNodes}=computeLayers();
  const NH=nodeHeight();
  // gom node theo layer
  const cols={};let maxLayer=0;
  allNodes().forEach(n=>{const L=layer[n.id]||0;(cols[L]=cols[L]||[]).push(n);maxLayer=Math.max(maxLayer,L);});
  const colW=170, gapY=8, rowH=NH+gapY, topY=80, padX=20;
  const pos={};let maxCount=0;
  for(const L in cols)maxCount=Math.max(maxCount,cols[L].length);
  for(let L=0;L<=maxLayer;L++){const list=cols[L]||[];const x=padX+L*colW;
    let startY=topY;
    if(STATE.valign==='center')startY=topY+(maxCount-list.length)*rowH/2;
    else if(STATE.valign==='bottom')startY=topY+(maxCount-list.length)*rowH;
    list.forEach((n,i)=>{pos[n.id]={x,y:startY+i*rowH,h:NH,L};});}
  const W=Math.max(1080,padX+(maxLayer+1)*colW+20);
  let maxY=topY;for(const id in pos)maxY=Math.max(maxY,pos[id].y+pos[id].h);
  const H=maxY+40;
  const filtOn=anyFilter();const keep=filtOn?depClosure():null;
  const z=STATE.zoom||1;const zoomedW=Math.round(W*z);
  let svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="background:radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/24px 24px">`;
  svg+=`<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6273" stroke-width="1.5"/></marker></defs>`;
  // layer headers
  for(let L=0;L<=maxLayer;L++){const x=padX+L*colW;
    const lbl=L===0?'Độc lập (input gốc)':'Tầng '+L;
    svg+=`<text x="${x+64}" y="66" text-anchor="middle" fill="var(--muted)" font-family="Outfit" font-size="11" font-weight="600">${lbl}</text>`;}
  // connectors dep→node (trái sang phải)
  allNodes().forEach(n=>{(n.dep||[]).forEach(d=>{const a=pos[d],b=pos[n.id];if(!a||!b)return;
    const dim=filtOn&&STATE.filterMode==='dim'&&(!keep.has(n.id)||!keep.has(d));
    svg+=connector(a.x+128,a.y+a.h/2,b.x,b.y+b.h/2,STATE.connStyle,dim);});});
  // nodes (tái dùng render node từ canvas)
  allNodes().forEach(n=>{const p=pos[n.id];if(!p)return;
    if(filtOn&&STATE.filterMode==='hide'&&!keep.has(n.id))return;
    const g=GRP.find(x=>x.id===n.grp)||{color:'gray'};const col=GCOL[g.color];
    const isFwd=n.type==='fwd',isAnno=n.kind==='anno',isKpi=n.kind==='kpi';
    const meta=STATE.meta[n.id]||{};const sel=STATE.selNode===n.id;
    const dim=filtOn&&STATE.filterMode==='dim'&&!keep.has(n.id);
    const dash=(isFwd||isAnno)?' stroke-dasharray="4 3"':'';
    const op=dim?0.2:(isFwd?0.65:1);
    svg+=`<g class="cnode" data-node="${n.id}" style="cursor:pointer;opacity:${op}">`;
    svg+=`<rect x="${p.x}" y="${p.y}" width="128" height="${p.h}" rx="6" fill="var(--panel2)" stroke="${sel?'var(--own)':col}" stroke-width="${sel?2:1}"${dash}/>`;
    let ty=p.y+15;
    svg+=`<text x="${p.x+8}" y="${ty}" fill="var(--ink)" font-family="Outfit" font-size="10.5" font-weight="500">${esc(trim(n.label,20))}</text>`;
    if(STATE.showChips.type){ty+=13;const kl=isKpi?'KPI':isAnno?'annotation':isFwd?'FWD':n.type==='derived'?'derived':'engine';
      svg+=`<text x="${p.x+8}" y="${ty}" fill="${col}" font-family="DM Mono" font-size="9">${kl}</text>`;}
    if(STATE.showChips.val){ty+=13;let v='';
      if(n.path)v=(n.type==='toggle'?(nodeVal(n)?'ON':'OFF'):fmt2(nodeVal(n)));
      else if(isKpi){const mv=kpiModelVal(n);v=mv==null?'':(n.unit==='%'?fmt2(mv)+'%':fmt(mv));}
      else if(n.type==='derived')v='(tính)';else if(isFwd)v='FWD';
      svg+=`<text x="${p.x+8}" y="${ty}" fill="var(--muted)" font-family="DM Mono" font-size="9.5">${esc(trim(String(v),18))}</text>`;}
    if(STATE.showChips.owner && isKpi){ty+=13;const ow=(meta.owners||[]);
      svg+=`<text x="${p.x+8}" y="${ty}" fill="${ow.length?'var(--own)':'var(--dim)'}" font-family="Outfit" font-size="9">${ow.length?esc(trim(ow.join(', '),20)):'chưa gán owner'}</text>`;}
    if(STATE.showChips.kpi && isKpi){ty+=13;const st=kpiStatus(n,meta);
      const txt=st?(st.cls==='pos'?'✓ đạt '+fmt(st.pct)+'%':st.cls==='warn'?'⚠ cận '+fmt(st.pct)+'%':'✗ lệch '+fmt(st.pct)+'%'):'chưa có target';
      const cc=st?(st.cls==='pos'?'var(--own)':st.cls==='warn'?'var(--warn)':'var(--neg)'):'var(--dim)';
      svg+=`<text x="${p.x+8}" y="${ty}" fill="${cc}" font-family="Outfit" font-size="9">${txt}</text>`;}
    if(STATE.showChips.formula && n.formula){ty+=13;
      svg+=`<text x="${p.x+8}" y="${ty}" fill="var(--dim)" font-family="DM Mono" font-size="8.5">${esc(trim(n.formula,22))}</text>`;}
    svg+=`</g>`;});
  svg+='</svg>';
  let warn='';
  if(hasCycle)warn=`<div class="warnbox" style="margin-bottom:8px">⚠ Phát hiện vòng phụ thuộc (cycle) tại: ${cycleNodes.map(id=>{const n=allNodes().find(x=>x.id===id);return n?n.label:id;}).join(', ')}. Layout đã cắt vòng — kiểm tra lại dep các node này.</div>`;
  s.innerHTML=`<div class="zone" style="padding:8px;position:relative">${warn}
    <div style="position:absolute;top:14px;left:14px;z-index:30" class="seg">
      <button class="on" data-depmode="graph">Đồ thị</button><button data-depmode="tree">Cây</button></div>
    <div id="zoomCtrl" style="position:absolute;top:14px;right:14px;z-index:30;display:flex;gap:4px;align-items:center;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:4px 6px">
      <button class="btn sm ghost" data-zoom="out" style="padding:2px 8px">−</button>
      <span style="font-family:DM Mono;font-size:11px;color:var(--muted);min-width:38px;text-align:center">${Math.round(z*100)}%</span>
      <button class="btn sm ghost" data-zoom="in" style="padding:2px 8px">+</button>
      <button class="btn sm ghost" data-zoom="reset" style="padding:2px 6px" title="Reset">⊙</button>
    </div>
    <div style="overflow:auto;max-height:calc(100vh - 160px)"><div style="width:${zoomedW}px">${svg}</div></div></div>`;
  s.querySelectorAll('[data-node]').forEach(g=>g.onclick=(e)=>{e.stopPropagation();selectNode(g.dataset.node);});
  s.querySelectorAll('[data-depmode]').forEach(b=>b.onclick=()=>{STATE.depMode=b.dataset.depmode;save();renderDependencyView(s);});
  s.querySelectorAll('[data-zoom]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const a=b.dataset.zoom;
    if(a==='in')STATE.zoom=Math.min(2,(STATE.zoom||1)+0.1);else if(a==='out')STATE.zoom=Math.max(0.3,(STATE.zoom||1)-0.1);else STATE.zoom=1;
    save();renderDependencyView(s);});
}

/* ===== (1) DEPENDENCY TREE — cây NGANG (Cách B): input sát bên trái, node bị ảnh hưởng bên phải.
   Node cha ở phải, dep mở dần sang trái. Node quyết định nhiều node → lặp. Cycle guard cắt đệ quy. ===== */
function renderDependencyTree(s){
  const byId={};allNodes().forEach(n=>byId[n.id]=n);
  const {hasCycle,cycleNodes}=computeLayers();
  const cycleSet=new Set(cycleNodes);
  const filtOn=anyFilter();const keep=filtOn?depClosure():null; // filter áp cho cây (v1.19)
  const isDe=new Set();allNodes().forEach(n=>(n.dep||[]).forEach(d=>isDe.add(d)));
  let roots=allNodes().filter(n=>!isDe.has(n.id));
  if(!roots.length)roots=allNodes().slice(0,1);
  const rtl=(STATE.treeDir!=='ltr'); // rtl: node phải, input trái | ltr: node trái, input phải
  const ROWH=nodeHeight()+10; // chiều cao 1 hàng node (card + gap)
  // đếm số hàng-lá của 1 nhánh (để tính chiều cao cluster → geometry connector)
  function pkey(path,id){return path.concat(id).join('>');}
  function leafRows(n,path){
    if(path.includes(n.id))return 1;
    if(STATE.treeCollapsed.has(pkey(path,n.id)))return 1; // đã thu gọn → lá
    let deps=(n.dep||[]).map(id=>byId[id]).filter(Boolean);
    if(filtOn&&STATE.filterMode==='hide')deps=deps.filter(d=>subtreeHasKept(d,path.concat(n.id)));
    if(!deps.length)return 1;
    let sum=0;deps.forEach(d=>sum+=leafRows(d,path.concat(n.id)));
    return Math.max(1,sum);
  }
  function card(n,path){
    const meta=STATE.meta[n.id]||{};const g=GRP.find(x=>x.id===n.grp)||{color:'gray'};const col=GCOL[g.color];
    const dv=nodeDisplayValue(n);
    const isFwd=n.type==='fwd',isAnno=n.kind==='anno',isKpi=n.kind==='kpi';
    const kindL=isKpi?'KPI':isAnno?'anno':isFwd?'FWD':n.type==='mid'?'trung gian':n.type==='derived'?'derived':'engine';
    const noVal=(dv==null);
    const hasInputs=((n.dep||[]).map(id=>byId[id]).filter(Boolean).length>0)&&!path.includes(n.id);
    const pk=pkey(path,n.id);
    const collapsed=STATE.treeCollapsed.has(pk);
    const dim=filtOn&&STATE.filterMode==='dim'&&!keep.has(n.id);
    const pinned=STATE.pinned&&STATE.pinned.has(n.id);
    // DEMO: highlight node khớp filter team (chính node đó match, không phải chỉ nằm trong dependency)
    const teamHit=STATE.filters.team&&STATE.filters.team.size>0&&STATE.filters.team.has(n.team||teamOf(n.id));
    const hlStyle=teamHit?';box-shadow:0 0 0 2px '+col+', 0 0 10px '+col+'88;border-radius:6px':'';
    let h=`<div class="htc-card${noVal?' htc-noval':''}${teamHit?' htc-teamhit':''}"${dim?' style="opacity:.24;border-left:3px solid '+col+hlStyle+'"':' style="border-left:3px solid '+col+hlStyle+'"'}>`;
    h+='<div class="htc-cardrow">';
    if(hasInputs){
      if(collapsed){
        h+=`<span class="htc-toggle htc-toggle-menu" title="Mở input của node này">`+
           `<span class="htc-t1" data-treeexpand1="${esc(pk)}" title="Mở thêm 1 cấp (chỉ input trực tiếp)">+1</span>`+
           `<span class="htc-tall" data-treeexpandfull="${esc(pk)}" title="Mở hết cả nhánh">⊕</span></span>`;
      }else{
        h+=`<span class="htc-toggle" data-treetoggle="${esc(pk)}" title="Thu gọn nhánh input">⊟</span>`;
      }
    }
    h+=`<div class="htc-cardmain" data-treenode="${n.id}">`;
    const pinHid=collapsed?pinnedInBranch(n,path):0; // v1.23: số node ghim (Key control) trong nhánh ẩn
    h+=`<div class="htc-lbl">${pinned?'⭐ ':''}${esc(n.label)}${(collapsed&&pinHid>0)?' <span class="htc-pinbadge" title="'+pinHid+' node Key control đang bị ẩn trong nhánh này">'+pinHid+'*</span>':''}</div>`;
    // showChips: type/val/owner/kpi/formula (đồng bộ với canvas)
    let chips='';
    if(STATE.showChips.type)chips+=`<span style="color:${col}">${kindL}</span>`;
    if(STATE.showChips.val){if(dv!=null)chips+='<span class="htc-val">'+esc(dv)+'</span>';else chips+='<span style="color:var(--warn)">chưa có value</span>';}
    if(STATE.showChips.owner&&isKpi){const ow=(meta.owners||[]);if(ow.length)chips+=`<span style="color:var(--blue)">${esc(ow.join(', '))}</span>`;}
    if(STATE.showChips.kpi&&isKpi){const st=kpiStatus(n,meta);if(st)chips+=`<span style="color:${st.cls==='pos'?'var(--own)':st.cls==='warn'?'var(--amber)':'var(--neg)'}">${st.cls==='pos'?'✓':st.cls==='warn'?'⚠':'✗'}${fmt(st.pct)}%</span>`;}
    if(STATE.showChips.formula&&n.formula)chips+=`<span style="color:var(--dim);font-family:DM Mono;font-size:8.5px">${esc(trim(n.formula,26))}</span>`;
    if(!chips)chips=`<span style="color:${col}">${kindL}</span>`+(dv!=null?'<span class="htc-val">'+esc(dv)+'</span>':'<span style="color:var(--warn)">chưa có value</span>');
    h+=`<div class="htc-meta">${chips}</div>`;
    h+='</div></div></div>';return h;
  }
  // v1.23: đếm distinct node ĐÃ GHIM (STATE.pinned) trong toàn nhánh con bị ẩn (đệ quy, guard trùng)
  function pinnedInBranch(n,path){
    const pinned=STATE.pinned; if(!pinned||!pinned.size)return 0;
    const seen=new Set(), hit=new Set();
    (function walk(node,pth){
      if(pth.includes(node.id))return;            // cycle guard
      let deps=(node.dep||[]).map(id=>byId[id]).filter(Boolean);
      if(filtOn&&STATE.filterMode==='hide')deps=deps.filter(d=>subtreeHasKept(d,pth.concat(node.id)));
      deps.forEach(d=>{
        if(pinned.has(d.id))hit.add(d.id);        // node con ghim → đếm
        const key=pth.concat(node.id,d.id).join('>');
        if(seen.has(d.id))return; seen.add(d.id);  // mỗi id chỉ duyệt sâu 1 lần (tránh nổ đệ quy)
        walk(d,pth.concat(node.id));
      });
    })(n,path);
    return hit.size;
  }
  // connector SVG có geometry thật: nối tâm mỗi input (theo hàng) tới tâm node
  function connSVG(depRowCounts){
    const n=depRowCounts.length;if(!n)return '';
    const totalRows=depRowCounts.reduce((a,b)=>a+b,0);
    const Htotal=totalRows*ROWH, W=26, cx=Htotal/2; // node ở giữa cluster theo chiều dọc
    const st=STATE.connStyle, c='#3a4351';
    // x: rtl → input bên trái (x=0) tới node bên phải (x=W); ltr → ngược
    const xIn=rtl?0:W, xNode=rtl?W:0;
    let paths='';let acc=0;
    depRowCounts.forEach(rc=>{
      const yIn=acc*ROWH+rc*ROWH/2; acc+=rc;
      const yNode=cx;
      if(st==='straight')paths+=`<line x1="${xIn}" y1="${yIn}" x2="${xNode}" y2="${yNode}" stroke="${c}" stroke-width="1.1"/>`;
      else if(st==='curve'){const mx=(xIn+xNode)/2;paths+=`<path d="M${xIn} ${yIn} C ${mx} ${yIn}, ${mx} ${yNode}, ${xNode} ${yNode}" fill="none" stroke="${c}" stroke-width="1.1"/>`;}
      else{const mx=(xIn+xNode)/2;paths+=`<path d="M${xIn} ${yIn} L ${mx} ${yIn} L ${mx} ${yNode} L ${xNode} ${yNode}" fill="none" stroke="${c}" stroke-width="1.1"/>`;}
    });
    return `<svg width="${W}" height="${Htotal}" style="flex-shrink:0" viewBox="0 0 ${W} ${Htotal}">${paths}</svg>`;
  }
  function subtreeHasKept(n,path){
    if(!filtOn||STATE.filterMode!=='hide')return true;
    if(keep.has(n.id))return true;
    if(path.includes(n.id))return false;
    const deps=(n.dep||[]).map(id=>byId[id]).filter(Boolean);
    return deps.some(d=>subtreeHasKept(d,path.concat(n.id)));
  }
  function branch(n,path){
    const inPath=path.includes(n.id);
    const collapsed=STATE.treeCollapsed.has(pkey(path,n.id));
    let deps=(n.dep||[]).map(id=>byId[id]).filter(Boolean);
    // hide mode: bỏ nhánh con không chứa node khớp filter
    if(filtOn&&STATE.filterMode==='hide')deps=deps.filter(d=>subtreeHasKept(d,path.concat(n.id)));
    let cluster='',conn='';
    if(inPath){
      cluster=`<div class="htc-cyc">⚠ vòng — dừng</div>`;
    }else if(deps.length && !collapsed){ // collapsed → không mở cụm input
      cluster='<div class="htc-inputs">'+deps.map(d=>branch(d,path.concat(n.id))).join('')+'</div>';
      const rowCounts=deps.map(d=>leafRows(d,path.concat(n.id)));
      conn=connSVG(rowCounts);
    }
    let h='<div class="htc-row">';
    if(rtl){ if(cluster)h+=cluster+conn; h+=card(n,path); }
    else   { h+=card(n,path); if(cluster)h+=conn+cluster; }
    h+='</div>';
    return h;
  }
  let body='';
  let renderRoots=roots;
  if(filtOn&&STATE.filterMode==='hide')renderRoots=roots.filter(r=>subtreeHasKept(r,[]));
  renderRoots.forEach(r=>{body+='<div class="htc-tree">'+branch(r,[])+'</div>';});
  if(!body)body='<div style="color:var(--dim)">Không có node khớp filter.</div>';
  let warn='';
  if(hasCycle)warn=`<div class="warnbox" style="margin-bottom:8px">⚠ Phát hiện vòng phụ thuộc (cycle): ${cycleNodes.map(id=>{const n=byId[id];return n?n.label:id;}).join(', ')}. Cây đã dừng mở rộng tại điểm vòng.</div>`;
  const z=STATE.zoom||1;
  s.innerHTML=`<div class="zone" style="padding:8px;position:relative">${warn}
    <div style="position:absolute;top:14px;left:14px;z-index:30;display:flex;gap:6px;flex-wrap:wrap">
      <div class="seg"><button data-depmode="graph">Đồ thị</button><button class="on" data-depmode="tree">Cây</button></div>
      <div class="seg"><button data-treedir="rtl"${rtl?' class="on"':''} title="Output phải, input trái">→◧</button><button data-treedir="ltr"${!rtl?' class="on"':''} title="Output trái, input phải">◨←</button></div>
      <button class="btn sm ghost" data-treecollapseall="1" title="Thu gọn mọi nhánh về gốc (chỉ hiện node output)">⊟ Thu gọn tất cả</button>
      ${STATE.treeCollapsed.size?`<button class="btn sm ghost" data-treeexpandall="1" title="Mở lại mọi nhánh đã thu gọn">⊕ Mở tất cả (${STATE.treeCollapsed.size})</button>`:''}
    </div>
    <div id="zoomCtrl" style="position:absolute;top:14px;right:14px;z-index:30;display:flex;gap:4px;align-items:center;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:4px 6px">
      <button class="btn sm ghost" data-zoom="out" style="padding:2px 8px">−</button>
      <span style="font-family:DM Mono;font-size:11px;color:var(--muted);min-width:38px;text-align:center">${Math.round(z*100)}%</span>
      <button class="btn sm ghost" data-zoom="in" style="padding:2px 8px">+</button>
      <button class="btn sm ghost" data-zoom="reset" style="padding:2px 6px" title="Reset">⊙</button>
    </div>
    <div style="margin-top:44px;font-size:10.5px;color:var(--dim);margin-bottom:8px">${rtl?'Đọc trái→phải: input sát bên trái node nó ảnh hưởng.':'Đọc phải→trái: input sát bên phải node nó ảnh hưởng.'} Node quyết định nhiều node sẽ lặp lại. Node <span style="color:var(--warn)">chưa có value</span> = cần bổ sung (FWD). Đường nối theo setting Canh & đường nối. Click để mở editor.</div>
    <div style="overflow:auto;max-height:calc(100vh - 210px)"><div style="transform:scale(${z});transform-origin:top left;display:inline-block">${body||'<div style="color:var(--dim)">Không có node.</div>'}</div></div></div>`;
  s.querySelectorAll('[data-depmode]').forEach(b=>b.onclick=()=>{STATE.depMode=b.dataset.depmode;save();renderDependencyView(s);});
  s.querySelectorAll('[data-treedir]').forEach(b=>b.onclick=()=>{STATE.treeDir=b.dataset.treedir;save();renderDependencyTree(s);});
  s.querySelectorAll('[data-treenode]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();selectNode(b.dataset.treenode);});
  s.querySelectorAll('[data-treetoggle]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const pk=b.dataset.treetoggle;
    const sc=_stageScroller();const sx=sc?sc.scrollLeft:0,sy=sc?sc.scrollTop:0;
    if(STATE.treeCollapsed.has(pk))STATE.treeCollapsed.delete(pk);else STATE.treeCollapsed.add(pk);
    renderDependencyTree(s);const sc2=_stageScroller();if(sc2){sc2.scrollLeft=sx;sc2.scrollTop=sy;}});
  // +1 cấp: mở input trực tiếp của node, nhưng các input đó VẪN thu gọn (lá có thể mở tiếp)
  s.querySelectorAll('[data-treeexpand1]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const pk=b.dataset.treeexpand1;
    const sc=_stageScroller();const sx=sc?sc.scrollLeft:0,sy=sc?sc.scrollTop:0;
    STATE.treeCollapsed.delete(pk); // node này mở
    const nodeId=pk.split('>').pop();const nd=byId[nodeId];
    (nd&&nd.dep||[]).forEach(d=>{if(byId[d])STATE.treeCollapsed.add(pk+'>'+d);}); // input trực tiếp: thu gọn tiếp
    renderDependencyTree(s);const sc2=_stageScroller();if(sc2){sc2.scrollLeft=sx;sc2.scrollTop=sy;}});
  // mở hết: node này + mọi hậu duệ trên đường pk đều mở
  s.querySelectorAll('[data-treeexpandfull]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const pk=b.dataset.treeexpandfull;
    const sc=_stageScroller();const sx=sc?sc.scrollLeft:0,sy=sc?sc.scrollTop:0;
    [...STATE.treeCollapsed].forEach(k=>{if(k===pk||k.startsWith(pk+'>'))STATE.treeCollapsed.delete(k);});
    renderDependencyTree(s);const sc2=_stageScroller();if(sc2){sc2.scrollLeft=sx;sc2.scrollTop=sy;}});
  const exAll=s.querySelector('[data-treeexpandall]');if(exAll)exAll.onclick=()=>{STATE.treeCollapsed.clear();renderDependencyTree(s);};
  const colAll=s.querySelector('[data-treecollapseall]');if(colAll)colAll.onclick=()=>{
    // thu gọn mọi root có input → chỉ còn node output làm lá
    renderRoots.forEach(r=>{const hasInp=(r.dep||[]).map(id=>byId[id]).filter(Boolean).length>0;if(hasInp)STATE.treeCollapsed.add(r.id);});
    renderDependencyTree(s);};
  s.querySelectorAll('[data-zoom]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const a=b.dataset.zoom;
    if(a==='in')STATE.zoom=Math.min(2,(STATE.zoom||1)+0.1);else if(a==='out')STATE.zoom=Math.max(0.3,(STATE.zoom||1)-0.1);else STATE.zoom=1;
    save();renderDependencyTree(s);});
}
function _deadTreeConn(){
  const st=STATE.connStyle, c='#3a4351', W=20, H=16, midY=H/2;
  let path;
  if(st==='straight')path=`<line x1="0" y1="${midY}" x2="${W-3}" y2="${midY}" stroke="${c}" stroke-width="1.2" marker-end="url(#tah)"/>`;
  else if(st==='curve')path=`<path d="M0 ${midY} C ${W/2} ${midY}, ${W/2} ${midY}, ${W-3} ${midY}" fill="none" stroke="${c}" stroke-width="1.2" marker-end="url(#tah)"/>`;
  else path=`<path d="M0 ${midY} L ${W/2} ${midY} L ${W-3} ${midY}" fill="none" stroke="${c}" stroke-width="1.2" marker-end="url(#tah)"/>`;
  return `<svg class="htc-conn2" width="${W}" height="${H}" style="flex-shrink:0"><defs><marker id="tah" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 2L7 5L2 8" fill="none" stroke="${c}" stroke-width="1.5"/></marker></defs>${path}</svg>`;
}

function nodeHeight(){ // chiều cao node theo số field bật (P1)
  let rows=1; // label luôn có
  if(STATE.showChips.val)rows++;
  if(STATE.showChips.owner)rows++;
  if(STATE.showChips.type)rows++;
  if(STATE.showChips.formula)rows++;
  if(STATE.showChips.kpi)rows++;
  return 14+rows*13;
}
function nodeLayout(){ // 7 cột riêng · P4 alignment (top/center/bottom trong cột)
  const colX={1:20,2:170,3:320,4:470,5:620,6:770,7:920};
  const NH=nodeHeight(), GAP=8, rowH=NH+GAP;
  const byCol={};allNodes().forEach(n=>{const g=n.grp||6;(byCol[g]=byCol[g]||[]).push(n);});
  let maxCount=0;for(const g in byCol)maxCount=Math.max(maxCount,byCol[g].length);
  const colTop=80;
  const pos={};
  for(const g in byCol){const list=byCol[g];const x=colX[g]||470;
    let startY=colTop;
    if(STATE.valign==='center')startY=colTop+(maxCount-list.length)*rowH/2;
    else if(STATE.valign==='bottom')startY=colTop+(maxCount-list.length)*rowH;
    list.forEach((n,i)=>{pos[n.id]={x,y:startY+i*rowH,g:+g,h:NH};});
  }
  return pos;
}

function renderConfigCanvas(s){
  const pos=nodeLayout();
  const W=1080, nodes=allNodes();
  const NH=nodeHeight();
  let maxY=0;for(const id in pos)maxY=Math.max(maxY,pos[id].y+pos[id].h);
  const H=maxY+40;
  const filtOn=anyFilter();const keep=filtOn?depClosure():null;
  let svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="background:radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/24px 24px">`;
  svg+=`<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6273" stroke-width="1.5"/></marker></defs>`;
  // group headers
  GRP.forEach(g=>{const anyNode=nodes.find(n=>n.grp===g.id);if(!anyNode)return;const p=pos[anyNode.id];if(!p)return;
    svg+=`<text x="${p.x+64}" y="66" text-anchor="middle" fill="${GCOL[g.color]}" font-family="Outfit" font-size="11" font-weight="600">${g.name}</text>`;});
  // connectors
  nodes.forEach(n=>{(n.dep||[]).forEach(d=>{const a=pos[d],b=pos[n.id];if(!a||!b)return;
    const dim=filtOn&&STATE.filterMode==='dim'&&(!keep.has(n.id)||!keep.has(d));
    svg+=connector(a.x+128,a.y+a.h/2,b.x,b.y+b.h/2,STATE.connStyle,dim);});});
  // nodes

/* ===== C2: KPI editor + data ===== */
function kpiModelVal(node){try{return node.modelFn?node.modelFn():null;}catch(e){return null;}}
function kpiStatus(node,m){ // trả {pct,cls,txt} theo actual vs target
  const k=(m&&m.kpi)||{};
  if(k.target==null||k.actual==null||isNaN(k.target)||isNaN(k.actual))return null;
  if(k.target===0)return null;
  let pct=k.actual/k.target*100;
  if(node.lowerBetter)pct=k.target/Math.max(k.actual,1e-9)*100; // thấp hơn = tốt
  const cls=pct>=100?'pos':(pct>=80?'warn':'neg');
  return {pct,cls};
}
function renderKpiEditor(node){
  const m=STATE.meta[node.id]||{};const k=m.kpi||{};
  const mv=kpiModelVal(node);
  const st=kpiStatus(node,m);
  const numStyle='width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:6px 8px;color:var(--ink);font-family:DM Mono;font-size:12px';
  let h='<div class="cblock">';
  h+=`<div class="derived"><span class="lbl">Model value (M${STATE.focusMonth})</span><span class="val">${mv==null?'–':(node.unit==='%'?fmt2(mv)+'%':fmt(mv))}</span></div>`;
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h+=`<div><div style="font-size:10.5px;color:var(--dim);margin-bottom:3px">Target</div><input type="number" data-kpi="target" value="${k.target!=null?k.target:''}" style="${numStyle}"></div>`;
  h+=`<div><div style="font-size:10.5px;color:var(--dim);margin-bottom:3px">Actual</div><input type="number" data-kpi="actual" value="${k.actual!=null?k.actual:''}" style="${numStyle}"></div>`;
  h+='</div>';
  h+=`<div style="margin-bottom:8px"><div style="font-size:10.5px;color:var(--dim);margin-bottom:3px">Kỳ cập nhật</div><input type="text" data-kpi="period" value="${k.period||''}" placeholder="VD: T7/26" style="${numStyle};font-family:Outfit"></div>`;
  if(st){
    const lbl=st.cls==='pos'?'✓ Đạt':(st.cls==='warn'?'⚠ Cận':'✗ Lệch');
    h+=`<div class="recon ${st.cls==='pos'?'ok':'bad'}" style="border-left-color:var(--${st.cls==='pos'?'own':st.cls==='warn'?'warn':'neg'})"><b style="color:var(--${st.cls==='pos'?'own':st.cls==='warn'?'warn':'neg'})">${lbl}</b> · actual/target = <span style="font-family:DM Mono">${fmt(st.pct)}%</span>${node.lowerBetter?' (thấp hơn = tốt)':''}</div>`;
  }else h+='<div style="font-size:11px;color:var(--dim);font-style:italic">Nhập target + actual để tính variance.</div>';
  h+='</div>';
  return h;
}

/* ===== P3: FILTER engine (dim/hide + giữ dependency) ===== */
function anyFilter(){return Object.values(STATE.filters).some(x=>x.size>0);}
function clearFilters(){for(const k in STATE.filters)STATE.filters[k].clear();STATE.openDrop=null;renderControlConfig();renderConfigStage();}
function kpiStatusKey(n){ // trả 'pos'|'warn'|'neg'|'none' cho node KPI
  if(n.kind!=='kpi')return null;const m=STATE.meta[n.id]||{};const st=kpiStatus(n,m);
  if(!st)return 'none';return st.cls;
}
function nodeMatchesFilter(n){ // node tự thân khớp mọi filter đang bật?
  const F=STATE.filters;
  if(F.grp.size && !F.grp.has(String(n.grp)))return false;
  if(F.kind.size){const k=n.kind==='kpi'?'kpi':n.kind==='anno'?'anno':(n.type==='fwd'?'fwd':'engine');if(!F.kind.has(k))return false;}
  if(F.owner.size){const ow=(STATE.meta[n.id]||{}).owners||[];if(!ow.some(o=>F.owner.has(o)))return false;}
  if(F.kpi.size){if(n.kind!=='kpi')return false;const sk=kpiStatusKey(n);if(!F.kpi.has(sk))return false;}
  if(F.team.size){if(!F.team.has(n.team||teamOf(n.id)))return false;}
  return true;
}
function depClosure(){ // tập id: node khớp + (tùy chọn) toàn bộ dependency (ancestor)
  const keep=new Set();const byId={};allNodes().forEach(n=>byId[n.id]=n);
  const keepDep=STATE.filterKeepDep!==false; // mặc định giữ dependency
  function addAnc(id,seen){if(seen.has(id))return;seen.add(id);const n=byId[id];if(!n)return;
    (n.dep||[]).forEach(d=>{keep.add(d);addAnc(d,seen);});}
  allNodes().forEach(n=>{if(nodeMatchesFilter(n)){keep.add(n.id);if(keepDep)addAnc(n.id,new Set());}});
  return keep;
}
function passesFilter(n){ // node có nằm trong tập giữ (khớp + dependency) không
  if(!anyFilter())return true;
  return depClosure().has(n.id);
}

// resizer
(function(){const r=document.getElementById('resizer');let drag=false;
  r.addEventListener('mousedown',()=>{drag=true;document.body.style.cursor='col-resize';});
  document.addEventListener('mousemove',e=>{if(!drag)return;const w=Math.max(200,Math.min(520,e.clientX));
    document.documentElement.style.setProperty('--pw',w+'px');});
  document.addEventListener('mouseup',()=>{drag=false;document.body.style.cursor='';});})();
document.addEventListener('click',()=>{if(STATE.openDrop){STATE.openDrop=null;if(STATE.tab==='config'&&!STATE.selNode)renderControlConfig();}});
renderAll();
</script>
</body>
</html>
