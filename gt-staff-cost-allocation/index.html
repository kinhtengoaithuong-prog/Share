function roleOf(e){if(e.role)return e.role;const p=(e.pos||'').toUpperCase();if(p.includes('GĐKD')||p.includes('GDKD'))return 'GĐKD';if(p.includes('ASM'))return 'ASM';if(p.includes('PG'))return 'PG';if(p.includes('GSBH')||p.startsWith('GS'))return 'GSBH';return 'NVKD';}
function cov(e){if(e.scope==='ALL')return ORG.npps.map(n=>n.code);if(e.scope==='REGION')return ORG.npps.filter(n=>n.region===e.region).map(n=>n.code);return e.npps||[];}
function rev(c){const n=ORG.npps.find(x=>x.code===c);return n?(+n.revenue||0):0;}
function cost(e){return COMPS.reduce((s,c)=>s+(+e[c.f]||0),0);}
function mat(){const M={};ORG.employees.forEach(e=>{const L=cov(e);if(!L.length){M[e.code]=[];return;}
 if(RULE==='revenue_weighted'){const t=L.reduce((s,n)=>s+rev(n),0);
   M[e.code]= t>0 ? L.map(n=>({npp:n,pct:rev(n)/t*100})) : L.map(n=>({npp:n,pct:100/L.length}));}
 else M[e.code]=L.map(n=>({npp:n,pct:100/L.length}));});return M;}
// Ma trận NPP × role: chi phí + danh sách người
function grid(){const M=mat(),G={};
 ORG.npps.forEach(n=>{G[n.code]={};ROLES.forEach(r=>G[n.code][r]={cost:0,ppl:[]});});
 ORG.employees.forEach(e=>{const r=roleOf(e),c=cost(e);
   (M[e.code]||[]).forEach(a=>{if(!G[a.npp])return;G[a.npp][r].cost+=c*a.pct/100;G[a.npp][r].ppl.push({code:e.code,name:e.name,amt:c*a.pct/100});});});
 return G;}
function alloc(){const M=mat(),R={};ORG.npps.forEach(n=>{R[n.code]={};COMPS.forEach(c=>R[n.code][c.f]=0);});
 ORG.employees.forEach(e=>(M[e.code]||[]).forEach(a=>{if(!R[a.npp])return;COMPS.forEach(c=>R[a.npp][c.f]+=(+e[c.f]||0)*a.pct/100);}));
 Object.keys(ovr).forEach(k=>{const[n,f]=k.split('|');if(R[n])R[n][f]=ovr[k];});return R;}
function isOv(n,f){return (n+'|'+f) in ovr;}
function JE(){
 const R=alloc(),L=[];
 if(jeMode==='detail'){
  ORG.npps.forEach(n=>COMPS.forEach(c=>{const v=R[n.code][c.f];if(Math.abs(v)<0.5)return;
   L.push({lab:c.l,f:c.f,npp:n.code,name:n.name,dr:c.dr,cr:c.cr,ce:c.ce,amt:v});}));
 }else if(jeMode==='group'){
  // gộp theo tài khoản Có (đúng kế toán): lương+thưởng -> 334101; từng quỹ BH riêng
  ORG.npps.forEach(n=>{
   const byCr={};
   COMPS.forEach(c=>{const v=R[n.code][c.f];if(Math.abs(v)<0.5)return;
    const k=c.dr+'|'+c.cr;
    if(!byCr[k])byCr[k]={dr:c.dr,cr:c.cr,amt:0,parts:[]};
    byCr[k].amt+=v;byCr[k].parts.push(c.l);});
   Object.values(byCr).forEach(g=>{
    L.push({lab:g.cr==='334101'?'Lương & thưởng':(ACC[g.cr]||g.cr),f:'grp',npp:n.code,name:n.name,
     dr:g.dr,cr:g.cr,ce:'',amt:g.amt,parts:g.parts.join(' + ')});});
  });
 }else{
  // full: 1 dòng tổng chi phí / NPP (Nợ 641101, Có 334101) — đơn giản nhất
  ORG.npps.forEach(n=>{const v=COMPS.reduce((s,c)=>s+R[n.code][c.f],0);if(Math.abs(v)<0.5)return;
   L.push({lab:'Tổng chi phí nhân sự',f:'all',npp:n.code,name:n.name,dr:'641101',cr:'334101',ce:'',amt:v,
    parts:COMPS.map(c=>c.l).join(' + ')});});
 }
 return{lines:L,tot:L.reduce((s,l)=>s+l.amt,0),R};
}

function parseOrg(wb){
 const sh=wb.SheetNames.find(n=>/chi ti[eế]t l[uư][oơ]ng/i.test(n))||wb.SheetNames[0];
 const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:true,defval:null});
 let hi=-1;for(let i=0;i<Math.min(rows.length,30);i++){const L=(rows[i]||[]).map(c=>(c==null?'':c.toString().toLowerCase()));
  if(L.some(c=>c.includes('mã nv'))&&L.some(c=>c.includes('mã sap'))){hi=i;break;}}
 if(hi<0)throw new Error('Không thấy tiêu đề "Mã NV"/"Mã SAP"');
 const H=rows[hi].map(c=>(c==null?'':c.toString().toLowerCase()));
 const F=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
 const I={time:F('thời gian'),sap:F('mã sap'),cust:F('tên khách'),reg:F('khu vực'),nv:F('mã nv'),nm:F('họ và tên'),pos:F('chức vụ'),
  luong:F('cp lương'),thuong:F('thưởng lễ'),bhxh:H.findIndex(h=>h.includes('bhxh')&&h.includes('17')),
  bhyt:H.findIndex(h=>h.includes('bhyt')&&h.includes('3%')),bhtn:H.findIndex(h=>h.includes('bhtn')&&h.includes('1%')),kpcd:H.findIndex(h=>h.includes('kpcđ')||h.includes('kpcd'))};
 const num=v=>{if(v==null)return 0;if(typeof v==='number')return v;const n=parseFloat(v.toString().replace(/[^\d.-]/g,''));return isNaN(n)?0:n;};
 const cnt={};for(let i=hi+1;i<rows.length;i++){const r=rows[i];if(!r||!r[I.nv])continue;const t=r[I.time];if(t)cnt[t]=(cnt[t]||0)+1;}
 const per=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
 const nM={},eM={};
 for(let i=hi+1;i<rows.length;i++){const r=rows[i];if(!r||!r[I.nv]||!r[I.sap])continue;if(per&&r[I.time]!==per)continue;
  const sap=r[I.sap].toString().trim();
  if(!nM[sap])nM[sap]={code:sap,name:(r[I.cust]||'').toString(),region:(r[I.reg]||'').toString(),revenue:0};
  const nv=r[I.nv].toString().trim();
  if(!eM[nv])eM[nv]={code:nv,name:(r[I.nm]||'').toString(),pos:(r[I.pos]||'').toString(),region:(r[I.reg]||'').toString(),npps:[],luong:0,thuong:0,bhxh:0,bhyt:0,bhtn:0,kpcd:0};
  const e=eM[nv];if(!e.npps.includes(sap))e.npps.push(sap);
  COMPS.forEach(c=>{if(I[c.f]>=0)e[c.f]+=num(r[I[c.f]]);});}
 const npps=Object.values(nM);
 const employees=Object.values(eM).map(e=>{COMPS.forEach(c=>e[c.f]=Math.round(e[c.f]));
  const n=e.npps.length;e.scope=n>=npps.length*0.9?'ALL':(n>1?'REGION':'DIRECT');
  const p=(e.pos||'').toUpperCase();
  e.role=p.includes('GĐKD')||p.includes('GDKD')?'GĐKD':p.includes('ASM')?'ASM':p.includes('PG')?'PG':(p.includes('GSBH')||p.startsWith('GS'))?'GSBH':'NVKD';
  return e;}).sort((a,b)=>b.npps.length-a.npps.length);
 return{npps,employees};}

// Đoán kỳ từ dữ liệu/tên file
function guessPeriod(rows,fname){
 const now=new Date();
 let y=now.getFullYear(),m=now.getMonth()+1;
 const fs=(fname||'').match(/(20\d{2})[_\-. ]?(0?[1-9]|1[0-2])/);
 if(fs){y=+fs[1];m=+fs[2];return y+'-'+String(m).padStart(2,'0');}
 // tìm "Tháng N" trong dữ liệu
 const txt=JSON.stringify(rows||[]).slice(0,20000);
 const tm=txt.match(/Th[áa]ng\s*(1[0-2]|[1-9])/);
 if(tm)m=+tm[1];
 const ym=txt.match(/(20\d{2})/);if(ym)y=+ym[1];
 return y+'-'+String(m).padStart(2,'0');
}

// Ghép pay + org + rev thành ORG
function applyDs(){
 const p=actDs('pay'),o=actDs('org'),r=actDs('rev');
 const npps = o? clone(o.data.npps) : (ORG.npps||[]);
 if(r){r.data.forEach(x=>{const n=npps.find(y=>y.code===x.code);if(n)n.revenue=x.revenue;});}
 const payM={};if(p)p.data.forEach(e=>payM[e.code]=e);
 const orgM={};if(o)o.data.employees.forEach(e=>orgM[e.code]=e);
 const codes=new Set([...Object.keys(payM),...Object.keys(orgM)]);
 const emps=[...codes].map(c=>{
  const P=payM[c]||{},O=orgM[c]||{};
  const L=(O.npps||[]).slice();
  const pos=(O.pos||P.pos||'');const U=pos.toUpperCase();
  // ORG CHART là nguồn chân lý cho region (bảng lương ghi viết tắt, không khớp)
  const region=O.region||P.region||'';
  const role=U.includes('GĐKD')||U.includes('GDKD')?'GĐKD':U.includes('ASM')?'ASM':U.includes('PG')?'PG':(U.includes('GSBH')||U.startsWith('GS'))?'GSBH':'NVKD';
  // scope: DIRECT giữ nguyên danh sách NPP thật từ org chart.
  // Chỉ dùng ALL khi phủ ~toàn bộ; REGION chỉ khi danh sách đúng bằng NPP của vùng đó.
  let scope='DIRECT';
  if(npps.length&&L.length>=npps.length*0.9)scope='ALL';
  else if(L.length>1){
   const rn=npps.filter(n=>n.region===region).map(n=>n.code);
   const same=rn.length===L.length&&rn.every(x=>L.includes(x));
   scope=same?'REGION':'DIRECT';
  }
  const e={code:c,name:P.name||O.name||'',pos,region,npps:L,scope,role};
  COMPS.forEach(x=>e[x.f]=+P[x.f]||0);
  // Dự phòng T13: nếu file lương không có cột → tự tính % trên (lương + thưởng)
  if(!e.dp13&&dp13Rate>0)e.dp13=Math.round((e.luong+e.thuong)*dp13Rate/100);
  return e;}).sort((a,b)=>b.npps.length-a.npps.length);
 if(npps.length)ORG={npps,employees:emps};
 SRC.pay=p?p.name:'seed';SRC.org=o?o.name:'seed';SRC.rev=r?r.name:'none';
}

function rd(ev,fn){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
 r.onload=e=>{try{fn(XLSX.read(new Uint8Array(e.target.result),{type:'array'}),f.name);}catch(x){alert('Lỗi: '+x.message);}};
 r.readAsArrayBuffer(f);ev.target.value='';}
function hdr(rows,keys,max){
 for(let i=0;i<Math.min(rows.length,max||30);i++){
  const L=(rows[i]||[]).map(c=>(c==null?'':c.toString().toLowerCase()));
  if(keys.every(k=>L.some(c=>c.includes(k))))return i;}
 return -1;}
// chọn cột "phần Công ty" — loại mọi cột "Trừ NLĐ"
function CT(H,key,pct){
 let i=H.findIndex(h=>h.includes(key)&&h.includes('cty'));
 if(i>=0)return i;
 i=H.findIndex(h=>h.includes(key)&&h.includes(pct)&&!h.includes('nlđ')&&!h.includes('trừ'));
 if(i>=0)return i;
 return H.findIndex(h=>h.includes(key)&&!h.includes('nlđ')&&!h.includes('trừ'));
}
const N=v=>{if(v==null)return 0;if(typeof v==='number')return v;const n=parseFloat(v.toString().replace(/[^\d.-]/g,''));return isNaN(n)?0:n;};

function onPay(ev){rd(ev,(wb,name)=>{
 const sh=wb.SheetNames.find(n=>/l[uư][oơ]ng/i.test(n))||wb.SheetNames[0];
 const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:true,defval:null});
 // header: dòng có (Code|Mã NV) và (Chức vụ)
 let hi=-1;
 for(let i=0;i<Math.min(rows.length,25);i++){
  const L=(rows[i]||[]).map(c=>(c==null?'':c.toString().toLowerCase().replace(/\s+/g,' ')));
  const hasCode=L.some(c=>c==='code'||c.includes('mã nv'));
  const hasPos=L.some(c=>c.includes('chức vụ'));
  if(hasCode&&hasPos){hi=i;break;}
 }
 if(hi<0)throw new Error('Không thấy dòng tiêu đề (cần cột "Code"/"Mã NV" + "Chức vụ"). Tải template để xem format.');
 const H=rows[hi].map(c=>(c==null?'':c.toString().toLowerCase().replace(/\s+/g,' ')));
 const F=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
 const EQ=k=>H.findIndex(h=>h.trim()===k);
 const I={
  nv: EQ('code')>=0?EQ('code'):F('mã nv','code'),
  nm: F('họ và tên','họ tên'),
  pos:F('chức vụ'),
  reg:F('khu vực'),
  // Lương: "Tiền lương (...)" hoặc "CP Lương" — tránh nhầm cột thuế
  luong:H.findIndex(h=>(h.includes('tiền lương')||h.includes('cp lương')||h.trim()==='lương')),
  thuong:F('thưởng lễ','thưởng'),
  // CHỈ lấy phần Cty, không lấy phần trừ NLĐ
  // BẮT BUỘC có "cty" — tránh nhầm sang cột "Trừ NLĐ"
  bhxh:CT(H,'bhxh','17'), bhyt:CT(H,'bhyt','3%'), bhtn:CT(H,'bhtn','1%'),
  kpcd:H.findIndex(h=>(h.includes('kpcđ')||h.includes('kpcd'))&&!h.includes('nlđ')),
  dp13:H.findIndex(h=>h.includes('dự phòng')||h.includes('t13')||h.includes('9%'))};
 if(I.nv<0)throw new Error('Không thấy cột mã nhân viên ("Code").');
 // Mã NV hợp lệ: chữ-chữ-gạch-số (NN-024, NA-103). Loại mọi dòng subtotal.
 const RE=/^[A-Za-zÀ-ỹ]{1,3}[-_]?\d{2,}$/;
 const pay={};let skipped=0;
 for(let i=hi+1;i<rows.length;i++){
  const r=rows[i];if(!r||r[I.nv]==null)continue;
  const c=r[I.nv].toString().trim();
  if(!RE.test(c)){skipped++;continue;}          // subtotal / vùng / kênh
  const p={code:c,name:(I.nm>=0?r[I.nm]:'')||'',pos:(I.pos>=0?r[I.pos]:'')||'',
   region:(I.reg>=0&&r[I.reg]&&r[I.reg]!==0?r[I.reg]:'').toString()};
  COMPS.forEach(x=>p[x.f]=Math.round(N(I[x.f]>=0?r[I[x.f]]:0)));
  pay[c]=p;
 }
 const list=Object.values(pay);
 if(!list.length)throw new Error('Không có dòng nhân viên hợp lệ (mã dạng NN-024).');
 askPeriod('pay',{data:list,raw:rows.slice(0,60)},name,list.length);
 if(skipped)setTimeout(()=>flag('ℹ bỏ qua '+skipped+' dòng tổng/nhóm'),50);
});}

function onOrg(ev){rd(ev,(wb,name)=>{
 const sh=wb.SheetNames.find(n=>/org|chi ti[eế]t/i.test(n))||wb.SheetNames[0];
 const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:true,defval:null});
 let hi=-1;
 for(let i=0;i<Math.min(rows.length,25);i++){
  const L=(rows[i]||[]).map(c=>(c==null?'':c.toString().toLowerCase().replace(/\s+/g,' ')));
  const hasNv=L.some(c=>c.includes('mã nv'));
  const hasNpp=L.some(c=>c.includes('mã sap')||c.includes('mã npp'));
  if(hasNv&&hasNpp){hi=i;break;}
 }
 if(hi<0)throw new Error('Không thấy tiêu đề (cần "Mã NV" + "Mã SAP"/"Mã NPP"). Tải template.');
 const H=rows[hi].map(c=>(c==null?'':c.toString().toLowerCase().replace(/\s+/g,' ')));
 const F=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
 const I={nv:F('mã nv'),nm:F('họ và tên','họ tên'),pos:F('chức vụ'),
  npp:F('mã sap','mã npp'),nn:F('tên khách','tên npp'),reg:F('khu vực'),prov:F('tỉnh')};
 const RE=/^[A-Za-zÀ-ỹ]{1,3}[-_]?\d{2,}$/;
 const nM={},map={};let skip=0;
 for(let i=hi+1;i<rows.length;i++){
  const r=rows[i];if(!r||r[I.nv]==null||r[I.npp]==null)continue;
  const nv=r[I.nv].toString().trim(),np=r[I.npp].toString().trim();
  if(!RE.test(nv)||!np||/total|tổng/i.test(np)){skip++;continue;}
  if(!nM[np])nM[np]={code:np,name:(I.nn>=0?r[I.nn]:'')||'',region:((I.reg>=0?r[I.reg]:'')||'').toString(),revenue:0};
  if(!map[nv])map[nv]={pos:((I.pos>=0?r[I.pos]:'')||'').toString(),nm:((I.nm>=0?r[I.nm]:'')||'').toString(),
   reg:((I.reg>=0?r[I.reg]:'')||'').toString(),npps:new Set()};
  map[nv].npps.add(np);
 }
 const npps=Object.values(nM);
 if(!npps.length)throw new Error('Không có cặp NV–NPP hợp lệ.');
 const employees=Object.keys(map).map(c=>({code:c,name:map[c].nm,pos:map[c].pos,region:map[c].reg,npps:[...map[c].npps]}));
 askPeriod('org',{data:{npps,employees},raw:rows.slice(0,60)},name,npps.length);
});}

function onRev(ev){rd(ev,(wb,name)=>{
 const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
 const hi=hdr(rows,['mã npp']);
 if(hi<0)throw new Error('Không thấy cột "Mã NPP".');
 const H=rows[hi].map(c=>(c==null?'':c.toString().toLowerCase()));
 const ci=H.findIndex(h=>h.includes('mã npp')),cr=H.findIndex(h=>h.includes('doanh thu')||h.includes('doanh số'));
 if(cr<0)throw new Error('Không thấy cột "Doanh thu".');
 const list=[];
 for(let i=hi+1;i<rows.length;i++){const r=rows[i];if(!r||!r[ci])continue;
  const c=r[ci].toString().trim();if(/total|tổng/i.test(c))continue;
  list.push({code:c,revenue:Math.round(N(r[cr]))});}
 if(!list.length)throw new Error('Không có dòng doanh số.');
 askPeriod('rev',{data:list,raw:rows.slice(0,60)},name,list.length);
});}

function buildSAP(team){
 const C=SAP[team],P=sapPeriod();
 const R=allocTeam(team==='PG');
 const rows=[];
 // r0: tiêu đề đầy đủ
 const r0=Array(16).fill(null);r0[8]=P.lbl;
 SAPF.forEach((f,i)=>r0[9+i]=C.titles[f]+' '+P.lbl);
 rows.push(r0);
 // r1: số thứ tự
 const r1=Array(16).fill(null);SAPF.forEach((f,i)=>r1[9+i]=i+1);rows.push(r1);
 // r2: tiêu đề rút gọn
 const r2=Array(16).fill(null);r2[8]=' '+P.lbl+' - ';
 SAPF.forEach((f,i)=>r2[9+i]=C.titles[f]);rows.push(r2);
 // r3: Cost Element
 const r3=Array(16).fill(null);r3[8]=team==='PG'?3:1;
 SAPF.forEach((f,i)=>r3[9+i]=C.ce[f]);rows.push(r3);
 // r4: TK Có
 const r4=Array(16).fill(null);r4[7]='Thời gian';r4[8]=P.th;
 SAPF.forEach((f,i)=>r4[9+i]=SAPCR[f]);rows.push(r4);
 // r5: filter
 const r5=Array(16).fill(null);r5[7]='Note nhân viên PG';r5[8]=C.filter;rows.push(r5);
 // r6: nhãn SAP
 const r6=Array(16).fill(null);r6[0]='B1-G/L Acct/BP Code';r6[1]='B3-Remarks';r6[2]='B4';r6[9]='B2-Debit';rows.push(r6);
 // r7: header
 rows.push(['GL account','Remarks','Product Group','Costing Group','Customer','Department','Cost Element','Mã SAP','Tên khách hàng',...SAPH]);
 // data — làm tròn theo largest-remainder để tổng khớp tuyệt đối
 const list=ORG.npps.filter(np=>SAPF.some(f=>Math.abs(R[np.code][f]||0)>=0.5));
 const vals={};
 SAPF.forEach(f=>{
  const raw=list.map(np=>R[np.code][f]||0);
  const exact=raw.reduce((s,x)=>s+x,0);
  const rnd=raw.map(x=>Math.round(x));
  let diff=Math.round(exact)-rnd.reduce((s,x)=>s+x,0);
  if(diff!==0&&rnd.length){                       // dồn dư vào dòng lớn nhất
   let i=rnd.reduce((mx,x,k,arr)=>x>arr[mx]?k:mx,0);
   rnd[i]+=diff;
  }
  vals[f]=rnd;
 });
 let n=0;
 list.forEach((np,i)=>{
  n++;
  rows.push([641101, C.titles.luong+' '+P.lbl+' - '+np.name, 'G', null, np.code, 'D06', C.rowCE, np.code, np.name,
   ...SAPF.map(f=>vals[f][i])]);
 });
 return {rows,n,C,P};
}
function xlsSAP(){
 const wb=XLSX.utils.book_new();
 ['GT','PG'].forEach(t=>{
  const B=buildSAP(t);
  if(!B.n)return;
  const ws=XLSX.utils.aoa_to_sheet(B.rows);
  ws['!cols']=[{wch:11},{wch:62},{wch:13},{wch:13},{wch:10},{wch:11},{wch:12},{wch:9},{wch:38},
   {wch:16},{wch:14},{wch:15},{wch:14},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,SAP[t].sheet);
 });
 const P=sapPeriod();
 XLSX.writeFile(wb,'SAP_DataImport_GT_'+P.y+'_'+P.mm+'.xlsx');
 flag('⬇ Đã xuất file SAP (GT + PG)');
}

// Tính chi phí theo NPP với 1 cặp dataset bất kỳ — không thay đổi state đang dùng
function calcWith(payId,orgId){
 const p=dsOf(payId),o=dsOf(orgId);
 if(!p||!o)return null;
 const npps=clone(o.data.npps);
 const payM={};p.data.forEach(e=>payM[e.code]=e);
 const orgM={};o.data.employees.forEach(e=>orgM[e.code]=e);
 const codes=new Set([...Object.keys(payM),...Object.keys(orgM)]);
 const emps=[...codes].map(c=>{
  const P=payM[c]||{},O=orgM[c]||{};
  const L=(O.npps||[]).slice();
  const pos=(O.pos||P.pos||'');const U=pos.toUpperCase();
  const region=O.region||P.region||'';
  const role=U.includes('GĐKD')||U.includes('GDKD')?'GĐKD':U.includes('ASM')?'ASM':U.includes('PG')?'PG':(U.includes('GSBH')||U.startsWith('GS'))?'GSBH':'NVKD';
  const e={code:c,name:P.name||O.name||'',pos,region,npps:L,role};
  COMPS.forEach(x=>e[x.f]=+P[x.f]||0);
  if(!e.dp13&&dp13Rate>0)e.dp13=Math.round((e.luong+e.thuong)*dp13Rate/100);
  return e;});
 // phân bổ (rule hiện tại)
 const R={},byRole={},byComp={};
 npps.forEach(n=>R[n.code]=0);
 ROLES.forEach(r=>byRole[r]=0);
 COMPS.forEach(c=>byComp[c.f]=0);
 emps.forEach(e=>{
  const L=e.npps;if(!L.length)return;
  const tot=COMPS.reduce((s,c)=>s+(+e[c.f]||0),0);
  let parts;
  if(RULE==='revenue_weighted'){
   const tr=L.reduce((s,c)=>{const n=npps.find(x=>x.code===c);return s+(n?+n.revenue||0:0);},0);
   parts= tr>0 ? L.map(c=>{const n=npps.find(x=>x.code===c);return{c,p:(n?+n.revenue||0:0)/tr};}) : L.map(c=>({c,p:1/L.length}));
  }else parts=L.map(c=>({c,p:1/L.length}));
  parts.forEach(a=>{if(R[a.c]!==undefined)R[a.c]+=tot*a.p;});
  byRole[e.role]+=tot;
  COMPS.forEach(c=>byComp[c.f]+=(+e[c.f]||0));
 });
 const T=Object.values(R).reduce((s,v)=>s+v,0);
 const nmap={};npps.forEach(n=>nmap[n.code]=n);
 return {R,T,npps,nmap,emps,byRole,byComp,period:p.period,payName:p.name,orgName:o.name};
}
// Bridge: tách Δ thành Δorg + Δpay
function bridge(){
 if(!cmpA||!cmpB)return null;
 const A=cmpA,B=cmpB;   // {pay,org}
 const base=calcWith(A.pay,A.org);      // kỳ gốc
 const fin =calcWith(B.pay,B.org);      // kỳ so
 if(!base||!fin)return null;
 const mixOrg=calcWith(A.pay,B.org);    // lương gốc × org mới → tách Δorg
 const dOrg=mixOrg.T-base.T;
 const dPay=fin.T-mixOrg.T;
 return {base,fin,mixOrg,dOrg,dPay,delta:fin.T-base.T,
  ok:Math.abs((dOrg+dPay)-(fin.T-base.T))<1};
}
function cmpPairs(){
 // các cặp (pay,org) cùng kỳ có sẵn
 const per=[...new Set(DS.map(d=>d.period))].sort();
 return per.map(p=>{
  const pay=DS.filter(d=>d.type==='pay'&&d.period===p);
  const org=DS.filter(d=>d.type==='org'&&d.period===p);
  return {period:p,pay,org,ready:pay.length&&org.length};
 }).filter(x=>x.ready);
}
function autoCmp(){
 const P=cmpPairs();
 if(P.length>=2&&!cmpA){
  cmpA={period:P[P.length-2].period,pay:P[P.length-2].pay[0].id,org:P[P.length-2].org[0].id};
  cmpB={period:P[P.length-1].period,pay:P[P.length-1].pay[0].id,org:P[P.length-1].org[0].id};
 }
}

   st:!(c in b.base.R)?'new':!(c in b.fin.R)?'gone':(t1&&Math.abs((t2-t1)/t1)>0.3)?'big':''};
 }).filter(r=>inF(fRegions,r.region)&&(!fSrch||r.c.toLowerCase().includes(fSrch)||r.name.toLowerCase().includes(fSrch)));

function vMat(){
 const G=grid(), rgs=regions().filter(r=>inF(fRegions,r));
 const cols=ROLES.filter(r=>inF(fRoles,r));
 const modeBar=`<div style="padding:9px 18px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--ink);z-index:6">
   <span style="font-family:var(--fm);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim)">Ô hiển thị</span>
   <div class="vtog" style="margin:0">
     <button class="vt ${mMode==='cost'?'on':''}" onclick="setMode('cost')">① Số người + chi phí</button>
     <button class="vt ${mMode==='name'?'on':''}" onclick="setMode('name')">② Tên nhân sự</button>
   </div>
   <button class="btn btn-s" onclick="expandAll()">⊕ Mở hết</button>
   <button class="btn btn-s" onclick="collapseAll()">⊖ Thu hết</button>
   <span style="margin-left:auto;font-size:11.5px;color:var(--sub)">${mMode==='cost'?'Ô = chi phí tầng đó rót vào NPP':'Ô = tên người phụ trách — bấm để mở Editor'}</span>
 </div>`;
 let rows='';
 rgs.forEach(rg=>{
  const npps=ORG.npps.filter(n=>n.region===rg && (!fSrch||n.code.toLowerCase().includes(fSrch)||(n.name||'').toLowerCase().includes(fSrch)));
  if(!npps.length)return;
  const cl=collapsed['rg_'+rg];
  const rT=npps.reduce((s,n)=>s+cols.reduce((x,r)=>x+G[n.code][r].cost,0),0);
  const rV=npps.reduce((s,n)=>s+(+n.revenue||0),0);
  rows+=`<tr class="rg" onclick="togC('rg_${rg.replace(/'/g,"")}')" style="cursor:pointer"><td class="l" colspan="2"><span class="cx">${cl?'▶':'▼'}</span> ${rg} — ${npps.length} NPP</td>
   ${cols.map(r=>{const t=npps.reduce((s,n)=>s+G[n.code][r].cost,0);return `<td style="color:${RC[r]}">${t>0?fmt(t):'—'}</td>`;}).join('')}
   <td style="color:var(--plat)">${fmt(rT)}</td><td>${rV?fmt(rV):'—'}</td><td>${rV>0?(rT/rV*100).toFixed(1)+'%':'—'}</td></tr>`;
  if(cl)return;
  npps.forEach(n=>{
   const g=G[n.code], tot=cols.reduce((s,r)=>s+g[r].cost,0), rv=+n.revenue||0, ra=rv>0?tot/rv*100:null;
   const cells=cols.map(r=>{const d=g[r];
    if(!d.ppl.length)return '<td style="color:var(--dim)">—</td>';
    if(mMode==='cost')return `<td><span style="color:${RC[r]}">${fmt(d.cost)}</span><div class="ppl">${d.ppl.length} người</div></td>`;
    return `<td class="l">${d.ppl.map(p=>`<span class="pchip" style="background:${RC[r]}22;color:${RC[r]}" onclick="pickEmp('${p.code}')" title="${p.code} · ${fmt(p.amt)}đ">${p.name.split(' ').slice(-2).join(' ')}</span>`).join('')}</td>`;
   }).join('');
   const rc = ra===null?'':(ra>15?'var(--rd)':ra>8?'var(--am)':'var(--gr)');
   rows+=`<tr><td class="l"><span class="lnk" onclick="pickNpp('${n.code}')">${n.code}</span></td>
    <td class="l nm">${(n.name||'').slice(0,30)}</td>${cells}
    <td style="color:var(--plat);font-weight:500">${fmt(tot)}</td>
    <td><input class="in" value="${rv}" onchange="setRev('${n.code}',this.value)"/></td>
    <td style="color:${rc}">${ra===null?'<span style="color:var(--dim)">—</span>':ra.toFixed(1)+'%'}</td></tr>`;
  });
 });
 const vis=ORG.npps.filter(n=>inF(fRegions,n.region)&&(!fSrch||n.code.toLowerCase().includes(fSrch)||(n.name||'').toLowerCase().includes(fSrch)));
 const tR={};cols.forEach(r=>tR[r]=vis.reduce((s,n)=>s+G[n.code][r].cost,0));
 const gT=cols.reduce((s,r)=>s+tR[r],0), gR=vis.reduce((s,n)=>s+(+n.revenue||0),0);
 return modeBar+`<table><thead><tr><th class="l">Mã</th><th class="l">Nhà phân phối</th>
  ${cols.map(r=>`<th style="color:${RC[r]}">${r}</th>`).join('')}
  <th style="color:var(--plat)">Tổng CP</th><th>Doanh thu</th><th>CP/DT</th></tr></thead><tbody>${rows}
  <tr class="tot"><td class="l" colspan="2">GRAND TOTAL — ${vis.length} NPP${fRegions.length||fSrch?' (đã lọc)':''}</td>
  ${cols.map(r=>`<td style="color:${RC[r]}">${fmt(tR[r])}</td>`).join('')}
  <td>${fmt(gT)}</td><td>${gR?fmt(gR):'—'}</td><td>${gR>0?(gT/gR*100).toFixed(1)+'%':'—'}</td></tr></tbody></table>`;
}
function expandAll(){collapsed={};R();}
function collapseAll(){regions().forEach(r=>collapsed['rg_'+r]=true);ORG.employees.forEach(()=>{});R();}
function vTree(){
 const byR={};ROLES.forEach(r=>byR[r]=ORG.employees.filter(e=>roleOf(e)===r));
 const node=(e,d)=>{const L=cov(e),c=cost(e),per=L.length?c/L.length:0,r=roleOf(e);
  return `<div class="tn ${selEmp===e.code?'sel':''}" style="margin-left:${d*20}px" onclick="pickEmp('${e.code}')">
   <span class="tdot" style="background:${RC[r]}"></span><span class="trole" style="color:${RC[r]}">${r}</span>
   <span class="tnm">${e.name}</span><span class="tcd">${e.code}</span>
   <span class="tnp">${L.length} NPP</span><span class="tct">${fmt(c)} đ</span>
   <span class="tpr">→ ${fmt(per)}/NPP</span></div>`;};
 let h='';
 const bar=`<div style="padding:9px 16px;display:flex;gap:8px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--ink);z-index:5">
  <button class="btn btn-s" onclick="expandAll()">⊕ Mở hết</button>
  <button class="btn btn-s" onclick="collapseAllTree()">⊖ Thu hết</button>
  <span style="margin-left:auto;font-size:11.5px;color:var(--sub)">Bấm node để mở Editor · ${ORG.employees.length} người</span></div>`;
 if(inF(fRoles,'GĐKD'))byR['GĐKD'].forEach(g=>h+=node(g,0));
 regions().filter(r=>inF(fRegions,r)).forEach(rg=>{
  const asms=byR['ASM'].filter(e=>e.region===rg&&inF(fRoles,'ASM'));
  const subs=ORG.employees.filter(e=>['GSBH','NVKD','PG'].includes(roleOf(e))&&e.region===rg&&inF(fRoles,roleOf(e)));
  if(!asms.length&&!subs.length)return;
  const all=[...asms,...subs];
  const rc=all.reduce((s,e)=>s+cost(e),0);
  const cl=collapsed['t_'+rg];
  h+=`<div class="tgrp" onclick="togC('t_${rg.replace(/'/g,"")}')" style="cursor:pointer;display:flex;align-items:center;gap:6px">
   <span class="cx">${cl?'▶':'▼'}</span>${rg} · ${all.length} người · ${fmt(rc)} đ</div>`;
  if(cl)return;
  asms.forEach(x=>h+=node(x,1));
  subs.forEach(x=>h+=node(x,2));
 });
 return bar+`<div class="tree">${h||'<div class="empty">Không có dữ liệu khớp bộ lọc</div>'}</div>`;
}

   <br/>Tạo 2 sheet: <b>Data import</b> (${ORG.employees.length-nPG} NV non-PG · CE A0101…) + <b>Data import PG</b> (${nPG} NV PG · CE B0210). Kỳ: <b>${P.lbl}</b>.</div>
   <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:11.5px;color:var(--sub)">Dự phòng T13:</span>
    <input class="in" style="width:52px;text-align:center" value="${dp13Rate}" onchange="setDp(this.value)"/>
    <span style="font-size:11.5px;color:var(--sub)">%</span>
    <button class="btn btn-g" onclick="xlsSAP()">⬇ Xuất SAP Data import</button></div></div>`;
  b=bar+warn+sapBox+`<table><thead>${hdr}</thead><tbody>
  ${Object.keys(g).map(k=>{const rs=g[k],sub=rs.reduce((s,l)=>s+l.amt,0);
   return `<tr class="rg"><td class="l" colspan="5">${k} — ${rs.length} NPP</td><td>${fmt(sub)}</td></tr>`+
    rs.map(l=>`<tr><td class="l nm">${(l.name||'').slice(0,34)}</td><td class="l">${l.npp}</td>
     <td style="color:var(--te)">${l.dr}</td><td style="color:var(--pu)">${l.cr}</td>
     <td class="l" style="color:var(--dim);font-size:10.5px">${jeMode==='detail'?l.ce:(l.parts||'')}</td>
     <td>${fmt(l.amt)}</td></tr>`).join('');}).join('')}
  <tr class="tot"><td class="l" colspan="5">TỔNG ${J.lines.length} dòng</td><td>${fmt(J.tot)}</td></tr></tbody></table>`;
 }
 else if(step===6){
  const ok=Math.abs(tA-tS)<1;
  b=`<div style="padding:18px;max-width:1100px">
   ${ok?`<div class="note g"><b>✓ Đối chiếu khớp tuyệt đối.</b> Tổng chi phí phân bổ xuống ${ORG.npps.length} NPP = tổng bảng lương. Không thất thoát, không nhân đôi.</div>`
    :`<div class="note e"><b>✗ Lệch ${fmt(Math.abs(tA-tS))} đ.</b> ${Object.keys(ovr).length?'Do ô sửa tay — kiểm tra lại.':'Có NV chưa gắn NPP. Quay lại Org Chart.'}</div>`}
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:16px">
    <div><div class="fl" style="margin-bottom:8px">Đối chiếu theo cấu phần</div>
    <table><thead><tr><th class="l">Cấu phần</th><th>Bảng lương</th><th>Phân bổ</th><th>Lệch</th></tr></thead><tbody>
    ${COMPS.map(c=>{const a=ORG.npps.reduce((x,n)=>x+J.R[n.code][c.f],0),d=a-s[c.f];
     return `<tr><td class="l">${c.l}</td><td>${fmt(s[c.f])}</td><td>${fmt(a)}</td><td style="color:${Math.abs(d)<1?'var(--gr)':'var(--rd)'}">${Math.abs(d)<1?'✓ 0':fmt(d)}</td></tr>`;}).join('')}
    <tr class="tot"><td class="l">TỔNG</td><td>${fmt(tS)}</td><td>${fmt(tA)}</td><td style="color:${ok?'var(--gr)':'var(--rd)'}">${fmt(tA-tS)}</td></tr>
    </tbody></table></div>
    <div><div class="fl" style="margin-bottom:8px">Tác động tài khoản</div>
    <table><tbody>
    ${Object.keys(dr).sort().map(k=>`<tr><td class="l" style="color:var(--te)">${k}<div style="font-size:11px;color:var(--sub);font-family:var(--fh)">${ACC[k]||''}</div></td><td>${fmt(dr[k])}</td></tr>`).join('')}
    ${Object.keys(cr).sort().map(k=>`<tr><td class="l" style="color:var(--pu)">${k}<div style="font-size:11px;color:var(--sub);font-family:var(--fh)">${ACC[k]||''}</div></td><td>${fmt(cr[k])}</td></tr>`).join('')}
    <tr class="tot"><td class="l">ΣNợ = ΣCó</td><td style="color:var(--gr)">${fmt(J.tot)}</td></tr>
    </tbody></table>
    <button class="btn btn-g" style="margin-top:14px;width:100%" onclick="xls()">⬇ Xuất bút toán sang Excel</button></div>
   </div></div>`;}
 document.getElementById('mb').innerHTML=b;
}
boot();
</script>
</body></html>
