<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ma trận kịch bản — Giáo án AI Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap&subset=latin,latin-ext,vietnamese" rel="stylesheet">
<style>
:root{
  --accent:#0B5D4B; --accent-soft:#E3F0EC; --accent-dim:#6E9A8E;
  --ink:#16201C; --muted:#5A6560; --dim:#8A938F;
  --bg:#f4f6f4; --panel:#fff; --line:#DCE2DE; --line-soft:#EAEEEB;
  --warn:#A6603A; --warn-bg:#FBF2EC;
  --idea:#0B5D4B; --idea-bg:#E3F0EC;
  --vidu:#2A5A8C; --vidu-bg:#E4ECF5;
  --baitap:#8A6210; --baitap-bg:#F7EFD9;
  --sans:'Outfit',system-ui,sans-serif; --mono:'DM Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
:focus-visible{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(11,93,75,.16)!important}

/* ---------- project bar ---------- */
.projbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--accent);
  color:#fff;flex-wrap:wrap;position:sticky;top:0;z-index:70}
.plabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;opacity:.75}
.psel{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.28);
  border-radius:6px;padding:4px 9px;font-size:12.5px;max-width:300px}
.psel option{color:var(--ink);background:#fff}
.projbar .btn{background:transparent;color:#fff;border-color:rgba(255,255,255,.32)}
.projbar .btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.6)}
.projbar .btn.dgr{color:#FFD9CC;border-color:rgba(255,190,170,.4)}
.pdesc{font-size:11.5px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40%}
/* ---------- top bar ---------- */
.top{position:sticky;top:37px;z-index:60;background:var(--panel);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:11px;padding:8px 14px;flex-wrap:wrap}
.tname{font-weight:700;font-size:14px;letter-spacing:-.01em}
.vbadge{font-family:var(--mono);font-size:10px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:4px}
.stamp{font-family:var(--mono);font-size:10px;color:var(--dim)}
.spacer{flex:1}
.pill{font-family:var(--mono);font-size:10.5px;padding:4px 11px;border-radius:999px;opacity:0;transition:opacity .2s;white-space:nowrap}
.pill.on{opacity:1}
.pill.ok{background:var(--accent-soft);color:var(--accent)}
.pill.warn{background:var(--baitap-bg);color:var(--baitap)}
.pill.err{background:var(--warn-bg);color:var(--warn)}
.btn{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 11px;cursor:pointer;
  font-size:12.5px;transition:.13s;white-space:nowrap}
.btn:hover{border-color:var(--accent-dim)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn.pri:hover{background:#094D3E}
.btn.dgr{color:var(--warn);border-color:#E5CEC0}
.btn.sm{padding:3px 8px;font-size:11.5px}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:2px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);
  position:sticky;top:78px;z-index:55}
.tab{padding:8px 15px;border:1px solid transparent;border-bottom:none;border-radius:7px 7px 0 0;cursor:pointer;
  font-size:12.5px;color:var(--muted);background:transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--bg);border-color:var(--line);color:var(--accent);font-weight:600}
.hint{padding:7px 14px;background:var(--accent-soft);border-bottom:1px solid var(--line);
  font-size:11.5px;color:var(--accent)}

/* ---------- toolbar ---------- */
.tbar{display:flex;gap:8px;align-items:center;padding:9px 14px;flex-wrap:wrap;
  background:var(--panel);border-bottom:1px solid var(--line)}
.seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.seg button{background:var(--panel);border:none;padding:5px 13px;cursor:pointer;font-size:12.5px;
  color:var(--muted);border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
.seg.sub button{font-size:11.5px;padding:5px 11px}
.seg.sub button.on{background:var(--accent-soft);color:var(--accent)}
.srch{border:1px solid var(--line);border-radius:6px;padding:5px 10px;width:190px;background:var(--panel)}
.fchips{display:flex;gap:5px;flex-wrap:wrap}
.fchip{font-size:11.5px;padding:4px 10px;border:1px solid var(--line);border-radius:999px;cursor:pointer;background:var(--panel)}
.fchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.fmode{white-space:nowrap}
.fmode.hidemode{border-color:var(--warn);color:var(--warn)}
.cnt{font-family:var(--mono);font-size:11px;color:var(--dim)}

/* ---------- shell ---------- */
.shell{display:flex;height:calc(100vh - 37px - 41px - 37px - 30px - 45px);min-height:440px;overflow:hidden}
.pane{overflow:auto;position:relative;background:var(--panel);min-width:0}
.left{flex:0 0 20%;padding:14px;border-right:none}
.mid{flex:1 1 40%;padding:16px;background:var(--bg)}
.det{flex:0 0 40%;padding:0;border-left:none;background:var(--panel)}
.pane.hid{display:none}
.rsz{flex:0 0 6px;cursor:col-resize;background:var(--line-soft);position:relative;transition:background .12s}
.rsz:hover,.rsz.act{background:var(--accent-dim)}
.rsz::after{content:'';position:absolute;left:2px;top:50%;transform:translateY(-50%);
  width:2px;height:26px;background:var(--line);border-radius:1px}
.rsz:hover::after,.rsz.act::after{background:#fff}
.rsz.off{display:none}
.lempty{color:var(--dim);font-size:12.5px;font-style:italic;padding:20px 4px;text-align:center}
/* pane toggles in toolbar */
.ptog{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.ptog button{background:var(--panel);border:none;border-right:1px solid var(--line);padding:5px 10px;
  cursor:pointer;font-size:11.5px;color:var(--dim)}
.ptog button:last-child{border-right:none}
.ptog button.on{background:var(--accent-soft);color:var(--accent);font-weight:600}

/* ---------- inspector ---------- */
.ins h4{margin:0 0 3px;font-size:12.5px;font-weight:600}
.ins .isub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}
.fgrp{margin-bottom:12px}
.flab{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);display:block;margin-bottom:4px}
.fin,.fta,.fsel{width:100%;border:1px solid var(--line);border-radius:6px;padding:7px 9px;background:var(--panel);
  transition:.13s}
.fta{min-height:52px;resize:none;overflow:hidden;line-height:1.5}
.fta.lg{min-height:86px}
.irow{display:flex;gap:7px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.asave{font-family:var(--mono);font-size:10.5px;color:var(--dim);transition:color .2s}
.asave.saved{color:var(--accent)}

/* ---------- LIST view ---------- */
.grp{margin-bottom:18px}
.ghd{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--panel);
  border:1px solid var(--line);border-radius:7px 7px 0 0;font-weight:600;font-size:12.5px}
.gnum{font-family:var(--mono);font-size:10px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:4px}
.gcnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--dim);font-weight:400}
.rows{border:1px solid var(--line);border-top:none;border-radius:0 0 7px 7px;overflow:hidden;background:var(--panel)}
.row{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.row:last-child{border-bottom:none}
.row:hover{background:#FAFBFA}
.row.sel{background:var(--accent-soft)}
.row.dim{opacity:.22}
.row.lv3{padding-left:30px;background:#FCFDFC}
.row.lv3 .rtitle{font-weight:400}
.row.orph{box-shadow:inset 3px 0 0 var(--warn)}
.card.lv3{margin-left:14px;border-left:2px solid var(--line)}
.card.orph{border-left-color:var(--warn)}
.tchip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;flex:0 0 auto;margin-top:2px;letter-spacing:.04em}
.t-idea{background:var(--idea-bg);color:var(--idea)}
.t-vidu{background:var(--vidu-bg);color:var(--vidu)}
.t-baitap{background:var(--baitap-bg);color:var(--baitap)}
.rbody{flex:1;min-width:0}
.rtitle{font-weight:500;margin-bottom:2px}
.rtext{font-size:12.5px;color:var(--muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.rmiss{font-size:11px;color:var(--warn);font-style:italic;margin-top:3px}
.rbtns{display:none;gap:4px;flex:0 0 auto}
.row:hover .rbtns,.row.sel .rbtns{display:flex}

/* ---------- BOARD view ---------- */
.board{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.col{flex:0 0 268px;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.colh{padding:9px 11px;border-bottom:1px solid var(--line);font-weight:600;font-size:12.5px;
  display:flex;align-items:center;gap:8px;background:#FAFBFA}
.colb{padding:9px;min-height:56px;display:flex;flex-direction:column;gap:7px}
.card{border:1px solid var(--line);border-radius:7px;padding:9px 10px;cursor:pointer;background:var(--panel)}
.card:hover{border-color:var(--accent-dim)}
.card.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.card.dim{opacity:.22}
.ctitle{font-weight:500;font-size:12.5px;margin:5px 0 3px}
.ctext{font-size:11.5px;color:var(--muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}

/* ---------- MINDMAP view ---------- */
.mmwrap{background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:auto;position:relative}
#mm{display:block;cursor:grab}
#mm.drag{cursor:grabbing}
.mmbar{position:absolute;top:9px;right:9px;display:flex;gap:5px;z-index:5}
.mmn{cursor:pointer}
.mmn text{pointer-events:none;user-select:none}
.kidlist{display:flex;flex-wrap:wrap;gap:5px}
.kidlist .depchip{cursor:pointer}
.kidlist .depchip:hover{background:var(--accent);color:#fff}
.warnsel{border-color:var(--warn)!important}
.deplist{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.depchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--accent-soft);
  color:var(--accent);border-radius:5px;padding:3px 4px 3px 7px;max-width:100%}
.depchip i{font-family:var(--mono);font-size:9px;font-style:normal;opacity:.7}
.depx{border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:14px;
  line-height:1;padding:0 3px}
.depx:hover{color:var(--warn)}
.depnone{font-size:11.5px;color:var(--dim);font-style:italic}
.ordrow{display:flex;gap:6px}
.addnode{margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.addrow{display:flex;flex-wrap:wrap;gap:5px}
.addt{background:var(--panel);font-weight:500}
.addkid{background:var(--panel);font-weight:500}
.addhint{font-size:10.5px;color:var(--dim);font-style:italic;display:block;margin-top:6px}
.addt:hover{filter:brightness(.9)}
.totrow{margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.totrow .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);display:block;margin-bottom:4px}
.totrow b{font-family:var(--mono);font-size:17px;color:var(--accent);display:block}
.totrow .tsub{font-size:11px;color:var(--dim)}
.ghd{cursor:pointer}
.ghd:hover{background:var(--accent-soft)}
.ghd.selb{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.lnkopen{display:inline-block;font-size:11px;color:var(--accent);margin-top:5px;text-decoration:none}
.lnkopen:hover{text-decoration:underline}
.lnknote{display:block;font-size:10.5px;color:var(--dim);margin-top:5px;font-style:italic}
.rlink{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sllink{margin-bottom:10px}
.sllink a{display:inline-block;background:var(--accent);color:#fff;border-radius:7px;
  padding:8px 16px;font-size:13px;text-decoration:none;font-weight:500}
.sllink a:hover{background:#094D3E}
.slfile{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:7px;
  padding:7px 14px;font-size:12.5px;font-family:var(--mono);color:var(--muted)}
/* ---------- slide (detail pane) ---------- */
.slide{padding:26px 30px;min-height:100%;display:flex;flex-direction:column}
.slnav{display:flex;align-items:center;gap:7px;padding:9px 14px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--panel);z-index:3}
.slpos{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
.slblk{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px}
.sltype{display:inline-block;font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:5px;
  letter-spacing:.05em;margin-bottom:14px}
.sltitle{font-size:25px;font-weight:700;line-height:1.24;letter-spacing:-.015em;margin:0 0 18px}
.slbody{font-size:15.5px;line-height:1.72;white-space:pre-wrap;margin-bottom:22px;flex:1}
.slbody.empty{color:var(--warn);font-style:italic;font-size:14px}
.slnote{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;
  padding:13px 16px;font-size:13.5px;margin-bottom:14px}
.slnote .l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);display:block;margin-bottom:6px}
.sldep{border-top:1px solid var(--line-soft);padding-top:14px;margin-top:auto}
.sldep .l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);display:block;margin-bottom:7px}
.sldep a{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;background:var(--bg);
  border:1px solid var(--line);border-radius:5px;padding:4px 9px;margin:0 5px 5px 0;
  color:var(--ink);text-decoration:none;cursor:pointer}
.sldep a:hover{border-color:var(--accent);color:var(--accent)}
.sldep i{font-family:var(--mono);font-size:9px;font-style:normal;opacity:.6}
.slsrc{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:10px}
.cycwarn{background:var(--warn-bg);color:var(--warn);border:1px solid #E5CEC0;border-radius:7px;
  padding:8px 12px;margin-bottom:10px;font-size:12.5px}

footer{padding:9px 14px;font-family:var(--mono);font-size:10.5px;color:var(--dim);
  border-top:1px solid var(--line);background:var(--panel);display:flex;gap:14px;flex-wrap:wrap}

@media(max-width:900px){
  .shell{flex-direction:column;height:auto;overflow:visible}
  .pane{flex:1 1 auto!important;width:100%;border-bottom:1px solid var(--line)}
  .rsz{display:none}
  .srch{width:130px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="projbar">
  <span class="plabel">Dự án</span>
  <select class="psel" id="psel" title="Chuyển sang dự án khác"></select>
  <button class="btn sm" id="pEdit" title="Sửa tên và mô tả dự án">✎ Sửa</button>
  <button class="btn sm" id="pNew" title="Tạo dự án mới từ mẫu">+ Dự án</button>
  <button class="btn sm" id="pDup" title="Nhân bản dự án đang mở">Nhân bản</button>
  <button class="btn sm dgr" id="pDel" title="Xóa dự án đang mở">Xóa</button>
  <span class="spacer"></span>
  <span class="pdesc" id="pdesc"></span>
</div>
<div class="top">
  <span class="tname" id="ptitle">Ma trận kịch bản</span>
  <span class="vbadge" id="vb"></span>
  <span class="stamp" id="stamp"></span>
  <span class="spacer"></span>
  <span class="pill" id="pill"></span>
  <button class="btn" id="undoBtn" disabled>↩ Undo (0)</button>
  <button class="btn" id="expBtn" title="Tải toàn bộ model dạng JSON — import lại được">💾 Export JSON</button>
  <button class="btn" id="impBtn" title="Nạp file JSON đã export — ghi đè toàn bộ dữ liệu hiện tại">📥 Import</button>
  <input type="file" id="impFile" accept=".json" style="display:none">
  <button class="btn pri" id="addBtn">+ Node mới</button>
</div>

<div class="tabs">
  <button class="tab on" data-tab="edit">1 · Soạn</button>
  <button class="tab" data-tab="gap">2 · Rà thiếu</button>
</div>
<div class="hint" id="hintTxt"></div>

<div class="tbar">
  <div class="seg" id="viewSeg">
    <button data-v="list">List</button>
    <button data-v="board">Board</button>
    <button class="on" data-v="mind">Mindmap</button>
  </div>
  <div class="seg sub" id="mmSeg">
    <button class="on" data-m="tier">Theo tầng</button>
    <button data-m="dep">Theo phụ thuộc</button>
  </div>
  <input class="srch" id="q" placeholder="Tìm trong tiêu đề, nội dung…">
  <div class="fchips" id="tf"></div>
  <button class="btn sm fmode" id="fmode" title="Đổi cách hiển thị mục bị lọc"></button>
  <span class="spacer"></span>
  <div class="ptog" id="ptog">
    <button class="on" data-p="left" title="Ẩn/hiện vùng soạn">Soạn</button>
    <button class="on" data-p="mid" title="Ẩn/hiện vùng tổng thể">Tổng thể</button>
    <button class="on" data-p="det" title="Ẩn/hiện vùng slide">Slide</button>
  </div>
  <span class="cnt" id="cnt"></span>
</div>

<div class="shell" id="shell">
  <div class="pane left" id="left"></div>
  <div class="rsz" id="rsz1" title="Kéo để đổi rộng · nhấp đúp để reset"></div>
  <div class="pane mid" id="right"></div>
  <div class="rsz" id="rsz2" title="Kéo để đổi rộng · nhấp đúp để reset"></div>
  <div class="pane det" id="det"></div>
</div>

<footer>
  <span id="fstat"></span>
  <span>Tự động lưu vào máy này (localStorage) · Ctrl+Z để hoàn tác</span>
  <span id="fver"></span>
</footer>

<script>
"use strict";
/* ============ VERSION — single source ============ */
var VER = "v2.2";
var STAMP = "18/07/2026 · Soạn giáo án 6h · 3 vùng kéo được · 3 view · mindmap 2 chế độ · autosave · dependency · link";
var LS_KEY = "giaoan_matrix_v1";

/* ============ SEED ============ */
var SEED = {
  types: [
    {id:"idea",   label:"Idea",              desc:"điều muốn truyền tải", col:"#0B5D4B", bg:"#E3F0EC", lv:2},
    {id:"story",  label:"Story",             desc:"câu chuyện dẫn dắt",   col:"#1E6B6B", bg:"#DCEFEF", lv:2},
    {id:"vidu",   label:"Ví dụ",             desc:"case minh họa",        col:"#2A5A8C", bg:"#E4ECF5", lv:3},
    {id:"thaoluan",label:"Câu hỏi thảo luận",desc:"ném ra cho lớp bàn",   col:"#7A3E6B", bg:"#F2E6EF", lv:3},
    {id:"baitap", label:"Bài tập",           desc:"học viên làm",         col:"#8A6210", bg:"#F7EFD9", lv:3}
  ],
  blocks: [
    {id:"b1", num:"TD1", name:"Vùng LÕI", time:"40'", note:"Dùng AI để làm GÌ?"},
    {id:"b2", num:"TD2", name:"Tư duy CÔNG NGHIỆP", time:"50'", note:"Làm NHƯ THẾ NÀO?"},
    {id:"b3", num:"TD3", name:"Tư duy PRODUCT", time:"45'", note:"Làm đến MỨC NÀO thì đủ?"},

    /* --- MỞ --- */
    {id:"n01", b:"b0", type:"idea", title:"Hành trình $60/năm → $150/tháng",
     content:"Mua Chatbotapp.ai $60/năm vì tiết kiệm — tiếp cận được ChatGPT, Claude, Gemini, Deepseek cùng lúc. Nghĩ đơn giản: tên lớn thì chắc đều ngon.",
     insight:"", src:"Bài viết đoạn 1"},
    {id:"n02", dep:["n01"], b:"b0", type:"idea", title:"Mở lại log chat: 100% là trò chuyện",
     content:"Nhìn lại toàn bộ log trên tool $60/năm — đều là 'chat chit', đôi khi khá deep nhưng vẫn chỉ là trò chuyện. Chưa từng nghĩ AI có thể LÀM VIỆC.",

    {id:"n03", dep:["n02"], b:"b0", type:"vidu", title:"Khoảnh khắc thấy Hiếu build module HTML chạy được",

    {id:"n04", b:"b0", type:"idea", title:"Không phải Claude nào cũng như Claude nào",

    /* --- TD1 VÙNG LÕI --- */
    {id:"n11", b:"b1", type:"idea", title:"AI là chiếc đèn pin Doraemon",
     content:"AI không biến bạn thành người khác — nó chỉ phóng đại chân dung của bạn lên. Dùng hiệu quả thì x3, x5, x10; không hiệu quả thì x1. Nhưng chân dung cơ bản không đổi.",
     insight:"Ẩn dụ mạnh nhất trong bài. Đây là câu trả lời trực tiếp cho 3 câu hỏi 'nghề tôi còn lại gì' trong khảo sát.", src:"Bài viết — Thứ nhất"},
    {id:"n12", dep:["n11"], b:"b1", type:"idea", title:"Câu hỏi then chốt: dùng AI để làm gì?",
     content:"Để làm những thứ TRONG ĐỊA HẠT của bạn — thứ bạn quan tâm, muốn làm, đau đáu mỗi ngày, nhưng chưa làm được.",
     insight:"Đây là câu trả lời cho rào cản lớn nhất: 'không biết bắt đầu từ đâu'.", src:"Bài viết — Thứ nhất"},
    {id:"n13", dep:["n12"], b:"b1", type:"idea", title:"Nguyên tắc 80/20 Exploitation–Exploration",
     content:"80% nguồn lực cho khai thác địa hạt của mình, 20% cho khám phá cái mới. Ra khỏi địa hạt thì như chiến binh đơn thương độc mã, học theo kiểu connecting-the-dots rất chậm.",
     insight:"", src:"Bài viết — Thứ nhất"},
    {id:"n14", dep:["n13"], b:"b1", type:"vidu", title:"Anh kế toán không tự nhiên code ra hệ thống marketing",
     content:"Không thể nào một anh kế toán suốt ngày nợ với có lại tự nhiên dùng AI và code ra hệ thống sáng tạo content marketing tự động. Người làm được điều đó vốn đã có máu phát minh sẵn.",
     insight:"Ví dụ này gần với lớp — 32/56 người làm kế toán. Nhưng cẩn thận giọng: không để họ thấy bị hạ thấp. Nhấn: 'địa hạt của bạn cũng có mỏ vàng riêng'.", src:"Bài viết — Thứ nhất"},
    {id:"n15", dep:["n12"], b:"b1", type:"baitap", title:"BÀI TẬP: Xác định vùng lõi của bạn",
     content:"Ba câu, viết ra giấy:\n1. Việc gì bạn làm mà người khác hay hỏi ý kiến bạn?\n2. Việc gì bạn làm nhanh hơn đồng nghiệp mà không cần cố?\n3. Việc gì bạn đau đáu muốn làm tốt hơn nhưng chưa có thời gian?\n\nGiao nhau của 3 câu = vùng lõi.",
     insight:"Không có bài tập này thì học viên gật đầu rồi quên. Cần 8-10 phút, có chia sẻ 2-3 người.", src:"Đề xuất bổ sung"},

    /* --- TD2 CÔNG NGHIỆP --- */
    {id:"n21", dep:["n12"], b:"b2", type:"idea", title:"Chạy ăn từng bữa vs Tư duy công nghiệp",
     content:"Thời nguyên thủy: sáng nào cũng phải lao ra thảo nguyên kiếm thú. Ngừng lao là đói. Cách dùng tool $60/năm chính xác như vậy — hỏi khi cần, mô hình 'ngơi tay là ngơi miệng'.",
     insight:"Bản hay hơn của 'hỏi AI vs xây công cụ'. Có hình ảnh, có nỗi sợ (đói), có logic tiến hóa → nhớ được sau 1 tuần.", src:"Bài viết — Thứ hai"},
    {id:"n22", dep:["n21"], b:"b2", type:"idea", title:"Phóng trượt thì cũng nhịn",
     content:"Muốn có thú thì kỹ năng phóng lao phải tốt. Làm việc với AI giai đoạn đầu đòi hỏi năng lực đặt câu hỏi rất tốt — không biết xây prompt cho ra hồn thì kết quả chả tới đâu.",
     insight:"Đây CHÍNH XÁC là điều đã xảy ra với 3 học viên bỏ cuộc. Đọc nguyên văn câu này rồi chiếu 3 trích dẫn khảo sát.", src:"Bài viết — Thứ hai"},
    {id:"n23", dep:["n21"], b:"b2", type:"idea", title:"Ba đặc điểm của tư duy công nghiệp",
     content:"1. Tạo ra cỗ máy có khả năng tạo kết quả LẶP LẠI, không tạo 'miếng ăn' 1 lần\n2. Mô hình hóa mọi thứ để nhìn thấy mẫu số chung\n3. Chia nhỏ quy trình phức tạp thành nhiều bước để hiểu và cải tiến từng phần",
     insight:"Ba dòng này là xương sống của cả khóa. Nên in ra, dán lên slide, nhắc lại nhiều lần.", src:"Bài viết — Thứ hai"},
    {id:"n24", link:"Tôi_nghĩ_gì_khi_nghĩ_về_AI.docx", dep:["n23"], b:"b2", type:"vidu", title:"Tool thiết kế hệ thống — từ 1 bản vẽ thành cỗ máy",
     content:"Thay vì gửi khách 1 bản vẽ, nghĩ cách tạo tool tạo được nhiều thiết kế với độ phức tạp khác nhau, tái sử dụng cho khách sau. Cấu phần: Nhập liệu → Chỉnh sửa → Hiển thị → Lưu kết quả → Xuất báo cáo. Sau đó gắn thêm 'Finance' cho mỗi node → lên được báo giá ngay sau khi thiết kế xong.",
     insight:"Case gốc của bài viết. Nhưng đây là case của người làm sản phẩm — lớp 32/56 làm kế toán. CẦN THÊM 1 CASE TÀI CHÍNH.", src:"Bài viết — Thứ hai"},
    {id:"n25", dep:["n23"], b:"b2", type:"vidu", title:"[TRỐNG] Case tài chính cho TD2",
     content:"", insight:"CẦN BỔ SUNG: một tool bạn build cho công việc CFO, thể hiện 3 đặc điểm công nghiệp. Gợi ý: staff cost simulator (21 phiên bản), hoặc BCQT từ sổ kế toán.", src:""},

    /* --- TD3 PRODUCT --- */
    {id:"n31", dep:["n23"], b:"b3", type:"idea", title:"Bốn tiêu chí để đạt level Product",
     content:"1. Phải có nhu cầu/nỗi đau THẬT — không vẽ công dụng trước rồi tưởng tượng nhu cầu sau\n2. Tính năng VỪA ĐỦ — ít quá thì yếu, nhiều quá thì rườm rà\n3. Tốt gỗ chưa đủ, phải tốt cả nước sơn (UI/UX)\n4. Nghĩ trước về khả năng MỞ RỘNG — tránh hardcode",
     insight:"", src:"Bài viết — Thứ ba"},
    {id:"n32", dep:["n31"], b:"b3", type:"idea", title:"Xe thật vs xe trưng bày",
     content:"Một cái xe thật khác xe trưng bày ở chỗ: ngày mai đổ xăng vào nó phải tự chạy được, người khác cũng lái được — chứ không phải chỉ một mình bạn đẩy thì mới chạy. Khi đó nó là đồ chơi, không phải công cụ làm việc.",
     insight:"Đây là tiêu chí dự thi số 3: 'ít nhất một người khác đã dùng nó'. Nối hai thứ này lại khi nói về cuộc thi.", src:"Bài viết — Thứ ba"},
    {id:"n33", dep:["n31"], b:"b3", type:"idea", title:"⚠ Thứ tự ưu tiên: CHẠY ĐÚNG trước, ĐẸP sau",
     content:"Bài gốc nói 'UI/UX — AI làm phút mốt, sao phải tiết kiệm'. Nhưng với người mới, đuổi theo giao diện = không bao giờ xong phần lõi.",
     insight:"MÂU THUẪN CẦN GIẢI. Với lớp 100 người không support, phải nói rõ: tiêu chí 4 (tránh hardcode) quan trọng hơn tiêu chí 3 (đẹp) gấp nhiều lần. Không nói rõ → họ làm ngược → bỏ cuộc.", src:"Phân tích bổ sung"},
    {id:"n34", dep:["n33"], b:"b3", type:"vidu", title:"[TRỐNG] Case một tool hỏng vì hardcode",

     content:"Giá trị = Giá trị 1 lần dùng × Số lần dùng trong năm × Số người dùng",
     insight:"Thứ KHÔNG AI KHÁC trong thị trường đào tạo AI Việt Nam có. Đây là tài chính, là bạn. Nên đặt ở vị trí trang trọng nhất.", src:"Bài viết — Thứ tư"},
    {id:"n42", dep:["n41"], b:"b4", type:"idea", title:"Sự tàn nhẫn của phép nhân",

    {id:"n43", dep:["n41"], b:"b4", type:"idea", title:"Đánh đổi giữa 3 thừa số",
     content:"Hiếm sản phẩm nào đạt cao cả 3. Quyết định lớn (giá trị cao) thì ít người quyết và ít lần (VD: chiến lược giá — Giám đốc quyết vài lần/năm). Quyết định lặp lại nhiều người (VD: chọn sản phẩm bỏ vào bill) thì giá trị mỗi lần thấp.",

    {id:"n44", dep:["n41", "n15"], b:"b4", type:"baitap", title:"BÀI TẬP: Nhân thử 3 thừa số cho bài toán của bạn",
     content:"Lấy bài toán vừa xác định ở TD1, điền:\n· Giá trị 1 lần dùng = tiết kiệm bao nhiêu giờ, hoặc tránh được sai sót gì?\n· Số lần dùng/năm = ?\n· Số người dùng = ? (bao gồm cả người khác trong phòng ban)\n\nNhân lại. Có thừa số nào = 0 không?",
     insight:"Đây là bài tập quyết định bài toán nào được chọn build buổi chiều. Cực kỳ quan trọng — nối trực tiếp sang phần chiều.", src:"Đề xuất bổ sung"},
    {id:"n45", link:"tai-lieu-khoa-hoc-siren.html#p7", dep:["n42"], b:"b4", type:"idea", title:"Nối với tiêu chí chấm cuộc thi",
     content:"3 tiêu chí đã chốt chính là 3 thừa số: tiết kiệm thời gian đo được (giá trị 1 lần) / đang dùng thật (số lần) / có người khác dùng (số người).",
     insight:"Nói ra chỗ này để cuộc thi không phải luật rời rạc, mà là hệ quả tự nhiên của tư duy giá trị.", src:"Phân tích bổ sung"},

/* ============ STATE ============ */
var S = null, undoStack = [], sel = null, selKind = "node", view = "mind", tab = "edit", filterType = "all", query = "";
var mmZoom = 1, mmPanX = 0, mmPanY = 0;
var mmMode = "tier";   /* mindmap sub-mode: tier | dep */
var filterMode = "dim";  /* how filtered-out items appear: dim | hide */
/* autosave: debounce timer + guard so one editing burst = one undo snapshot */
var autoT = null, burstId = null;

var LS_PROJ = "giaoan_projects_v1";   /* {list:[{id,title,desc,owner,updated}], cur:id} */
var LS_DATA = "giaoan_proj_";          /* + id  → model */
var PROJ = {list:[], cur:null};

function projMeta(id){
  for(var i=0;i<PROJ.list.length;i++) if(PROJ.list[i].id===id) return PROJ.list[i];
  return null;
}
function newProjId(){ return "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function loadProjects(){
  try{
    var raw = localStorage.getItem(LS_PROJ);
    if(raw){ var d = JSON.parse(raw); if(d && Array.isArray(d.list)){ PROJ = d; if(!PROJ.cur && PROJ.list.length) PROJ.cur = PROJ.list[0].id; } }
  }catch(e){ console.error("Đọc danh sách dự án lỗi:", e); }
}
function saveProjects(){
  try{ localStorage.setItem(LS_PROJ, JSON.stringify(PROJ)); }
  catch(e){ console.error("Lưu danh sách dự án lỗi:", e); }
}
function touchProject(){
  var m = projMeta(PROJ.cur);
  if(m){ m.updated = new Date().toISOString(); saveProjects(); }
}

function load(){
  loadProjects();

  /* migrate: a single-project file from an earlier version becomes project #1 */
  if(!PROJ.list.length){
    var legacy = null;
    try{ var raw = localStorage.getItem(LS_KEY); if(raw) legacy = JSON.parse(raw); }
    catch(e){ console.error("Đọc dữ liệu cũ lỗi:", e); }

    var id = newProjId();
    var isLegacy = !!(legacy && legacy.nodes && legacy.blocks);
    PROJ.list = [{id:id,
      title: isLegacy ? "Giáo án AI Builder" : "Giáo án AI Builder",
      desc:  isLegacy ? "Chuyển từ bản trước" : "6 giờ · 4 tư duy · seed từ bài viết và khảo sát",
      updated: new Date().toISOString()}];
    PROJ.cur = id;
    saveProjects();
    S = isLegacy ? legacy : JSON.parse(JSON.stringify(SEED));
    try{ localStorage.setItem(LS_DATA + id, JSON.stringify(S)); }catch(e){ console.error(e); }
    if(isLegacy){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
    return;
  }

  try{
    var d = localStorage.getItem(LS_DATA + PROJ.cur);
    if(d){ S = JSON.parse(d); if(S && S.nodes && S.blocks) return; }
  }catch(e){ console.error("Load dự án lỗi:", e); }
  S = JSON.parse(JSON.stringify(SEED));
}
function migrateHierarchy(){
  /* runs once on data saved before the L0>L1>L2>L3 model existed */
  var lastL2 = {};   /* block id -> most recent L2 node id while scanning in order */
  S.nodes.forEach(function(n){
    if(isL2(n)){ lastL2[n.b] = n.id; n.pid = null; return; }
    if(isL3(n) && !n.pid){
      var p = lastL2[n.b];
      if(p) n.pid = p;          /* nearest Idea/Story above, same block */
    }
  });
}
function normalize(){
  if(!Array.isArray(S.types) || !S.types.length) S.types = JSON.parse(JSON.stringify(SEED.types));
  /* levels: a type saved before the L2/L3 model has no lv — recover it from SEED by id,
     because defaulting everything to L3 leaves zero valid parents and breaks the picker */
  var seedLv = {};
  SEED.types.forEach(function(t){ seedLv[t.id] = t.lv; });
  S.types.forEach(function(t){
    if(t.lv === 2 || t.lv === 3) return;
    t.lv = seedLv[t.id] || 3;
  });
  /* a project with no L2 type at all cannot express the hierarchy — restore Idea/Story */
  if(!S.types.some(function(t){ return t.lv === 2; })){
    SEED.types.filter(function(t){ return t.lv === 2; }).forEach(function(t){
      if(!S.types.some(function(x){ return x.id === t.id; })) S.types.unshift(JSON.parse(JSON.stringify(t)));
      else S.types.forEach(function(x){ if(x.id === t.id) x.lv = 2; });
    });
  }
  var tids = {}; S.types.forEach(function(t){ tids[t.id]=1; });
  S.nodes.forEach(function(n){ if(!tids[n.type]) n.type = S.types[0].id; });
  S.nodes.forEach(function(n){
    if(!Array.isArray(n.dep)) n.dep = [];
    if(typeof n.link !== "string") n.link = "";
    if(n.pid === undefined) n.pid = null;
  });
  /* drop parent refs that no longer resolve, or that point at a non-L2 node */
  S.nodes.forEach(function(n){
    if(!n.pid) return;
    var p = nodeOf(n.pid);
    if(!p || !isL2(p) || p.id === n.id) n.pid = null;
  });
  migrateHierarchy();
  /* an L2 node can never have a parent */
  S.nodes.forEach(function(n){ if(isL2(n)) n.pid = null; });
  /* drop dangling refs (node deleted) */
  var ids = {}; S.nodes.forEach(function(n){ ids[n.id]=1; });
  S.nodes.forEach(function(n){ n.dep = n.dep.filter(function(d){ return ids[d] && d!==n.id; }); });
}
function save(){
  try{
    localStorage.setItem(LS_DATA + PROJ.cur, JSON.stringify(S));
    touchProject();
  }
  catch(e){ console.error("Lưu lỗi:", e); pill("Không lưu được: "+e.message, "err"); }
}
function snap(){
  undoStack.push(JSON.stringify(S));
  if(undoStack.length > 45) undoStack.shift();
  syncUndo();
}
function syncUndo(){
  var b = document.getElementById("undoBtn");
  b.textContent = "↩ Undo (" + undoStack.length + ")";
  b.disabled = undoStack.length === 0;
}
function undo(){
  clearTimeout(autoT); autoT = null; burstId = null;
  if(!undoStack.length) return;
  S = JSON.parse(undoStack.pop());
  syncUndo(); save(); render(); pill("Đã hoàn tác", "ok");
}
/* force-write any debounced edit immediately (node switch, undo, export, tab change, page close) */
function flushPending(){
  if(!autoT) return;
  clearTimeout(autoT); autoT = null;

/* ============ HELPERS ============ */
function lvOf(id){ var t = typeOf(id); return t.lv || 2; }
function isL2(n){ return lvOf(n.type) === 2; }
function isL3(n){ return lvOf(n.type) === 3; }
function parentOf(n){ return n.pid ? nodeOf(n.pid) : null; }
function childrenOf(id){ return S.nodes.filter(function(x){ return x.pid === id; }); }
function isOrphan(n){ return isL3(n) && (!n.pid || !nodeOf(n.pid)); }
function typeOf(id){ for(var i=0;i<S.types.length;i++) if(S.types[i].id===id) return S.types[i];
  return {id:id,label:id||"?",desc:"",col:"#5A6560",bg:"#ECEFED"}; }
function typeLabel(id){ return typeOf(id).label.toUpperCase(); }
function typeCol(id){ return typeOf(id).col; }
function typeBg(id){ return typeOf(id).bg; }
function typeStyleTag(){
  return '<style id="tdyn">' + S.types.map(function(t){
    return '.t-'+t.id+'{background:'+t.bg+';color:'+t.col+'}';
  }).join("") + '</style>';
}
function syncTypeStyles(){
  var old = document.getElementById("tdyn"); if(old) old.remove();
  document.head.insertAdjacentHTML("beforeend", typeStyleTag());
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
function blockOf(id){ for(var i=0;i<S.blocks.length;i++) if(S.blocks[i].id===id) return S.blocks[i]; return null; }
function nodeOf(id){ for(var i=0;i<S.nodes.length;i++) if(S.nodes[i].id===id) return S.nodes[i]; return null; }
function isEmpty(n){ return !n.content || !n.content.trim(); }
function hidden(n){ return filterMode === "hide" && !matches(n); }
function matches(n){
  if(filterType!=="all" && n.type!==filterType) return false;
  if(!query) return true;
  var q = query.toLowerCase();
  return (n.title||"").toLowerCase().indexOf(q)>=0
      || (n.content||"").toLowerCase().indexOf(q)>=0
      || (n.insight||"").toLowerCase().indexOf(q)>=0;
}




/* ---------- auto-grow textareas (height follows content & pane width) ---------- */
function grow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = (el.scrollHeight + 2) + "px";
}
function growAll(){
  document.querySelectorAll("#left .fta").forEach(grow);
}
var leftRO = null;
function watchLeftWidth(){
  if(leftRO || typeof ResizeObserver === "undefined") return;
  var host = document.getElementById("left");
  if(!host) return;
  var raf = null;
  leftRO = new ResizeObserver(function(){
    /* width changed (drag / collapse) → re-measure wrapped text */
    if(raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(growAll);
  });
  leftRO.observe(host);
}

/* parents first, each followed by its children; orphans at the end */
function orderTree(ns){
  var out = [], used = {};
  ns.forEach(function(n){
    if(!isL2(n)) return;
    out.push(n); used[n.id] = 1;
    ns.forEach(function(k){
      if(k.pid === n.id && !used[k.id]){ out.push(k); used[k.id] = 1; }
    });
  });
  ns.forEach(function(n){ if(!used[n.id]) out.push(n); });
  return out;
}
/* ---------- hierarchy pickers ---------- */
function parentOpts(n){
  /* Idea/Story in the SAME block first — that is the normal case.
     Other blocks are still offered but clearly marked, so cross-block links are deliberate. */
  var here = S.nodes.filter(function(x){ return isL2(x) && x.b === n.b; });
  var out = "";
  if(here.length){
    var hb = blockOf(n.b);
    out += '<optgroup label="'+esc(hb ? hb.num+" · "+hb.name : "Khối này")+'">'
        + here.map(function(x){
            return '<option value="'+x.id+'"'+(n.pid===x.id?" selected":"")+'>'
                 + esc(x.title.length>44 ? x.title.slice(0,43)+"…" : x.title) + '</option>'; }).join("")
        + '</optgroup>';
  }
  S.blocks.forEach(function(b){
    if(b.id === n.b) return;
    var arr = S.nodes.filter(function(x){ return isL2(x) && x.b === b.id; });
    if(!arr.length) return;
    out += '<optgroup label="↗ '+esc(b.num+" · "+b.name)+' (khác khối)">'
        + arr.map(function(x){
            return '<option value="'+x.id+'"'+(n.pid===x.id?" selected":"")+'>'
                 + esc(x.title.length>44 ? x.title.slice(0,43)+"…" : x.title) + '</option>'; }).join("")
        + '</optgroup>';
  });
  return out;
}
function kidChips(n){
  var ks = childrenOf(n.id);
  if(!ks.length) return '<span class="depnone">Chưa có node con — thêm Ví dụ / Câu hỏi / Bài tập cho Idea này.</span>';
  return ks.map(function(k){
    return '<span class="depchip" data-goto2="'+k.id+'" title="'+esc(k.title)+'">'
         + '<i>'+esc(typeOf(k.type).label)+'</i>'
         + esc(k.title.length>24 ? k.title.slice(0,23)+"…" : k.title) + '</span>';
  }).join("");
}
/* ---------- link helpers ---------- */
function isHttp(u){ return /^https?:\/\//i.test((u||"").trim()); }
function linkHint(n){
  var u = (n.link||"").trim();
  if(!u) return '';
  if(isHttp(u)) return '<a class="lnkopen" href="'+esc(u)+'" target="_blank" rel="noopener noreferrer">↗ Mở link trong tab mới</a>';
  return '<span class="lnknote">Không phải đường dẫn web — sẽ hiển thị dạng chữ để bạn tự mở.</span>';
}

/* ---------- dependency helpers ---------- */
function depChips(n){
  if(!n.dep || !n.dep.length) return '<span class="depnone">Chưa nối — node này đứng độc lập</span>';
  return n.dep.map(function(d){
    var t = nodeOf(d); if(!t) return "";
    var b = blockOf(t.b);
    return '<span class="depchip" title="'+esc(t.title)+'"><i>'+esc(b?b.num:"?")+'</i>'
         + esc(t.title.length>26 ? t.title.slice(0,25)+"…" : t.title)
         + '<button class="depx" data-dep="'+d+'" title="Bỏ liên kết">×</button></span>';
  }).join("");
}
function depOpts(n){
  var blocked = descendantsOf(n.id);   /* cannot depend on things that depend on me */
  blocked[n.id] = 1;
  return S.nodes.filter(function(x){
    return !blocked[x.id] && n.dep.indexOf(x.id) < 0;
  }).map(function(x){
    var b = blockOf(x.b);
    return '<option value="'+x.id+'">'+esc((b?b.num+" · ":"")+x.title)+'</option>';
  }).join("");
}
/* everything that (transitively) depends on id — used to prevent cycles */
function descendantsOf(id){
  var out = {}, stack = [id], guard = 0;
  while(stack.length && guard++ < 3000){
    var cur = stack.pop();
    S.nodes.forEach(function(x){
      if(x.dep && x.dep.indexOf(cur) >= 0 && !out[x.id]){ out[x.id] = 1; stack.push(x.id); }
    });
  }
  return out;
}
/* tier = longest prerequisite chain depth; null if cycle detected */
function computeTiers(){
  var tier = {}, seen = {}, cyc = false;
  function depth(id, path){
    if(tier[id] != null) return tier[id];
    if(path[id]){ cyc = true; return 0; }
    path[id] = 1;
    var n = nodeOf(id), d = 0;
    if(n && n.dep) n.dep.forEach(function(p){
      if(nodeOf(p)) d = Math.max(d, depth(p, path) + 1);
    });
    delete path[id];
    tier[id] = d; return d;
  }
  S.nodes.forEach(function(n){ depth(n.id, {}); });
  return {tier:tier, cycle:cyc};
}

                + 'title="Thêm '+esc(t.label)+' (tầng 2) vào khối này">+ '+esc(t.label)+'</button>'; }).join("")
       + '<span class="addhint">Node chi tiết (Ví dụ, Câu hỏi, Bài tập) thêm từ trong một Idea/Story.</span>'
