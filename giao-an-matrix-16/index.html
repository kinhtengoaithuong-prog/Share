  if(selKind === "block" && sel){ renderBlockEditor(); return; }
  var el = document.getElementById("left");
  if(!sel){ el.innerHTML = '<div class="lempty">Chọn một node để xem và sửa nội dung.</div>'; return; }
  var n = nodeOf(sel);
  if(!n){ sel=null; renderLeft(); return; }
  var b = blockOf(n.b);
  var opts = S.blocks.map(function(x){
    return '<option value="'+x.id+'"'+(x.id===n.b?" selected":"")+'>'+esc(x.num+" · "+x.name)+'</option>'; }).join("");
  el.innerHTML =
   '<div class="ins">'
   +'<h4>Sửa node</h4><div class="isub">'+esc(n.id)+' · '+esc(b?b.num:"?")+'</div>'
   +'<div class="fgrp"><span class="flab">Tiêu đề</span><input class="fin" id="e_title" value="'+esc(n.title)+'"></div>'
   +'<div class="fgrp"><span class="flab">Loại</span><select class="fsel" id="e_type">'
     + S.types.map(function(t){ return '<option value="'+t.id+'"'+(n.type===t.id?" selected":"")+'>'
         + esc(t.label + (t.desc ? " — "+t.desc : "")) + '</option>'; }).join("")
     + '<option value="__new">+ Thêm loại mới…</option>'
   +'</select></div>'
   +'<div class="fgrp"><span class="flab">Thuộc khối</span><select class="fsel" id="e_b">'+opts
     +'<option value="__new">+ Thêm khối mới…</option></select></div>'
   + (isL3(n)
      ? '<div class="fgrp"><span class="flab">Thuộc Idea / Story (bắt buộc)</span>'
        + '<select class="fsel'+(isOrphan(n)?" warnsel":"")+'" id="e_pid">'
        + '<option value="">— chưa chọn —</option>'
        + parentOpts(n)
        + '<option value="__newidea">+ Tạo Idea mới trong khối này…</option>'
        + '</select>'
        + (isOrphan(n)
            ? (S.nodes.some(function(x){ return isL2(x) && x.b === n.b; })
                ? '<span class="lnknote" style="color:var(--warn)">⚠ Chưa thuộc Idea/Story nào — chọn một mục ở trên.</span>'
                : '<span class="lnknote" style="color:var(--warn)">⚠ Khối này chưa có Idea/Story nào. Dùng “+ Tạo Idea mới” để tạo cha cho node này.</span>')
            : '')
        + '</div>'
      : '<div class="fgrp"><span class="flab">Node con</span>'
        + '<div class="kidlist">'+kidChips(n)+'</div>'
        + '<div class="addrow" style="margin-top:8px">'
        + S.types.filter(function(t){ return (t.lv||3) === 3; }).map(function(t){
            return '<button class="btn sm addkid" data-type="'+t.id+'" '
                 + 'style="border-color:'+t.col+';color:'+t.col+'">+ '+esc(t.label)+'</button>'; }).join("")
        + '</div></div>')
   +'<div class="fgrp"><span class="flab">Nội dung</span><textarea class="fta lg" id="e_content">'+esc(n.content)+'</textarea></div>'
   +'<div class="fgrp"><span class="flab">Ghi chú khi dạy</span><textarea class="fta" id="e_insight">'+esc(n.insight)+'</textarea></div>'
   +'<div class="fgrp"><span class="flab">Nguồn</span><input class="fin" id="e_src" value="'+esc(n.src)+'"></div>'
   +'<div class="fgrp"><span class="flab">Link tài liệu tham khảo</span>'
     +'<input class="fin" id="e_link" placeholder="https://… hoặc tên file" value="'+esc(n.link||"")+'">'
     + linkHint(n)
   +'</div>'
   +'<div class="fgrp"><span class="flab">Cần hiểu trước (điều kiện tiên quyết)</span>'
     +'<div class="deplist" id="depList">'+depChips(n)+'</div>'
     +'<select class="fsel" id="e_dep"><option value="">+ Thêm node tiên quyết…</option>'+depOpts(n)+'</select>'
   +'</div>'
   +'<div class="irow"><span class="asave" id="asave">Tự động lưu</span>'
   +'<span class="spacer"></span>'
   +'<button class="btn" id="newN">+ Node</button>'
   +'<button class="btn" id="dupN">Nhân bản</button>'
   +'<button class="btn dgr" id="delN">Xóa</button></div>'
   +'</div>';

  /* ---- autosave: commit fields into model, debounce write + one snapshot per burst ---- */
  function commit(reRender){
    n.title = document.getElementById("e_title").value.trim() || "(chưa đặt tên)";
    var tv = document.getElementById("e_type").value;
    var bv = document.getElementById("e_b").value;
    if(tv && tv !== "__new") n.type = tv;
    if(bv && bv !== "__new") n.b = bv;
    n.content = document.getElementById("e_content").value;
    n.insight = document.getElementById("e_insight").value;
    n.src = document.getElementById("e_src").value;
    n.link = document.getElementById("e_link").value.trim();
    save();
    if(reRender) renderRight();
    var a = document.getElementById("asave");
    if(a){ a.textContent = "Đã lưu"; a.classList.add("saved");
      setTimeout(function(){ if(a.isConnected){ a.textContent="Tự động lưu"; a.classList.remove("saved"); } }, 1800); }
  }
  function touch(reRender){
    /* one undo snapshot per continuous editing burst on this node */
    if(burstId !== n.id){ snap(); burstId = n.id; }
    var a = document.getElementById("asave");
    if(a){ a.textContent = "Đang lưu…"; a.classList.remove("saved"); }
    clearTimeout(autoT);
    autoT = setTimeout(function(){ commit(reRender); }, 800);
  }
  ["e_title","e_content","e_insight","e_src","e_link"].forEach(function(id){
    var f = document.getElementById(id);
    f.oninput = function(){ if(f.tagName === "TEXTAREA") grow(f); touch(true); };
    f.onblur  = function(){ clearTimeout(autoT); commit(true); };
  });
  ["e_type","e_b"].forEach(function(id){
    document.getElementById(id).onchange = function(){
      var v = this.value;
      clearTimeout(autoT); autoT = null;

      if(v === "__new"){
        if(id === "e_type"){
          var lbl = prompt("Tên loại mới (ví dụ: Trích dẫn, Hoạt động nhóm):");
          if(!lbl || !lbl.trim()){ render(); return; }
          var desc = prompt("Mô tả ngắn (bỏ trống cũng được):") || "";
          var pal = [["#7A3E6B","#F2E6EF"],["#1E6B6B","#DCEFEF"],["#8C4A2F","#F7E7DE"],
                     ["#3E5A8C","#E6EAF5"],["#6B5E1E","#F2EEDC"]];
          var c = pal[S.types.length % pal.length];
          var nid = "t" + Date.now().toString(36);
          snap(); burstId = null;
          S.types.push({id:nid, label:lbl.trim(), desc:desc.trim(), col:c[0], bg:c[1]});
          n.type = nid;
          syncTypeStyles(); save(); render();
          pill('Đã thêm loại "'+lbl.trim()+'"', "ok");
        } else {
          var bn = prompt("Tên khối mới (ví dụ: TD5 · Tư duy hệ thống):");
          if(!bn || !bn.trim()){ render(); return; }
          var num = prompt("Mã ngắn hiển thị trên sơ đồ (ví dụ: TD5):") || "MỚI";
          var tm = prompt("Thời lượng (ví dụ: 30'):") || "";
          var bid = "b" + Date.now().toString(36);
          snap(); burstId = null;
          S.blocks.push({id:bid, num:num.trim(), name:bn.trim(), time:tm.trim(), note:""});
          n.b = bid;
          save(); render();
          pill('Đã thêm khối "'+bn.trim()+'"', "ok");
        }
        return;
      }

      snap();
      burstId = null;
      commit(false);
      if(isL2(n)){ n.pid = null; }                 /* L2 never has a parent */
      else if(!n.pid){ /* became L3 without parent → orphan, flagged in Rà thiếu */ }
      save();
      render();
      pill("Đã lưu", "ok");
    };
  });
  growAll();
  var psel = document.getElementById("e_pid");
  if(psel) psel.onchange = function(){
    clearTimeout(autoT); autoT = null;
    var v = this.value;
    if(v === "__newidea"){
      var t = prompt("Tên Idea mới (sẽ là cha của node này):", "Idea mới");
      if(!t || !t.trim()){ render(); return; }
      snap(); burstId = null;
      var ideaType = (S.types.filter(function(x){ return x.lv === 2; })[0] || {id:"idea"}).id;
      var np = {id:"n"+Date.now().toString(36), b:n.b, type:ideaType, pid:null,
                title:t.trim(), content:"", insight:"", src:"", link:"", dep:[]};
      S.nodes.splice(S.nodes.indexOf(n), 0, np);   /* put the parent just above its child */
      n.pid = np.id;
      save(); render();
      pill('Đã tạo Idea "'+t.trim().slice(0,24)+'" và gắn node vào', "ok");
      return;
    }
    snap(); burstId = null;
    n.pid = v || null;
    save(); render();
    pill(n.pid ? "Đã gắn vào " + (nodeOf(n.pid) ? nodeOf(n.pid).title : "") : "Đã bỏ liên kết cha", n.pid ? "ok" : "warn");
  };
  var kl = document.querySelector(".kidlist");
  if(kl) kl.onclick = function(ev){
    var t = ev.target.closest("[data-goto2]"); if(!t) return;
    flushPending(); burstId = null;
    sel = t.getAttribute("data-goto2"); selKind = "node"; render();
  };
  document.querySelectorAll(".addkid").forEach(function(btn){
    btn.onclick = function(){
      flushPending(); snap(); burstId = null;
      var t = btn.getAttribute("data-type");
      var nn = {id:"n"+Date.now().toString(36), b:n.b, type:t, pid:n.id,
                title:"(node mới)", content:"", insight:"", src:"", link:"", dep:[]};
      /* place directly after this parent's existing children */
      var lastIdx = S.nodes.indexOf(n);
      S.nodes.forEach(function(x,k){ if(x.pid === n.id) lastIdx = k; });
      S.nodes.splice(lastIdx+1, 0, nn);
      sel = nn.id; selKind = "node";
      save(); render();
      pill("Đã thêm " + typeOf(t).label + " vào \"" + n.title.slice(0,24) + "\"", "ok");
      var f = document.getElementById("e_title"); if(f){ f.focus(); f.select(); }
    };
  });
  var dsel = document.getElementById("e_dep");
  if(dsel) dsel.onchange = function(){
    var v = this.value; if(!v) return;
    clearTimeout(autoT); autoT = null;
    snap(); burstId = null;
    if(!Array.isArray(n.dep)) n.dep = [];
    if(n.dep.indexOf(v) < 0) n.dep.push(v);
    save(); render(); pill("Đã nối điều kiện tiên quyết", "ok");
  };
  var dl = document.getElementById("depList");
  if(dl) dl.onclick = function(ev){
    var d = ev.target.getAttribute("data-dep"); if(!d) return;
    clearTimeout(autoT); autoT = null;
    snap(); burstId = null;
    n.dep = n.dep.filter(function(x){ return x !== d; });
    save(); render(); pill("Đã bỏ liên kết", "warn");
  };
  document.getElementById("newN").onclick = function(){
    flushPending();
    snap(); burstId = null;
    /* insert into the SAME block, right after this node — keeps teaching order intact */
    var nn = {id:"n"+Date.now().toString(36), b:n.b, type:n.type,
              title:"(node mới)", content:"", insight:"", src:"", link:"", dep:[]};
    S.nodes.splice(S.nodes.indexOf(n)+1, 0, nn);
    sel = nn.id; selKind = "node";
    save(); render(); pill("Đã thêm node vào " + (blockOf(n.b) ? blockOf(n.b).num : "khối"), "ok");
    var t = document.getElementById("e_title"); if(t){ t.focus(); t.select(); }
  };
  document.getElementById("dupN").onclick = function(){
    flushPending();
    snap(); burstId = null;
    var c = JSON.parse(JSON.stringify(n));
    c.id = "n" + Date.now().toString(36);
    c.title = n.title + " (bản sao)";
    c.dep = (n.dep||[]).slice();
    S.nodes.splice(S.nodes.indexOf(n)+1, 0, c);
    sel = c.id; selKind = "node";
    save(); render(); pill("Đã nhân bản", "ok");
  };
  document.getElementById("delN").onclick = function(){
    var kids = childrenOf(n.id).length;
    var msg = 'Xóa node "'+n.title+'"?\n\n'
      + (kids ? kids+' node con sẽ KHÔNG bị xóa, nhưng sẽ mất cha và hiện ở tab Rà thiếu.\n\n' : '')
      + 'File JSON đã export trước đó KHÔNG bị ảnh hưởng. Có thể hoàn tác bằng nút Undo.';
    if(!confirm(msg)) return;
    snap();
    var gone = n.id;
    S.nodes.forEach(function(x){ if(x.pid === gone) x.pid = null; });
    S.nodes.splice(S.nodes.indexOf(n),1);
    S.nodes.forEach(function(x){ if(x.dep) x.dep = x.dep.filter(function(d){ return d !== gone; }); });
    sel = null; save(); render(); pill("Đã xóa node và các liên kết tới nó", "warn");
  };
}

/* ============ LIST ============ */
function renderList(){
  var out = "";
  S.blocks.forEach(function(b){
    var ns = S.nodes.filter(function(n){ return n.b===b.id; });
    if(!ns.length) return;
    var vis = ns.filter(matches).length;
    if(filterMode === "hide" && vis === 0) return;   /* empty group adds nothing when hiding */
    out += '<div class="grp"><div class="ghd'+(selKind==="block"&&sel===b.id?" selb":"")+'" data-blk="'+b.id+'"><span class="gnum">'+esc(b.num)+'</span>'
        + esc(b.name) + ' <span style="color:var(--dim);font-weight:400">· '+esc(b.time)+'</span>'
        + '<span class="gcnt">'+vis+'/'+ns.length+'</span></div><div class="rows">';
    ns = orderTree(ns);
    ns.forEach(function(n){
      if(hidden(n)) return;
      var d = matches(n) ? "" : " dim";
      var s = (sel===n.id) ? " sel" : "";
      out += '<div class="row'+d+s+(isL3(n)?" lv3":"")+(isOrphan(n)?" orph":"")+'" data-id="'+n.id+'">'
          + '<span class="tchip t-'+n.type+'">'+typeLabel(n.type)+'</span>'
          + '<div class="rbody"><div class="rtitle">'+esc(n.title)+'</div>'
          + (isEmpty(n) ? '<div class="rmiss">⚠ Chưa có nội dung</div>'
                        : '<div class="rtext">'+esc(n.content)+'</div>')
          + (n.link && n.link.trim() ? '<div class="rlink">🔗 '+esc(n.link.length>44?n.link.slice(0,43)+"…":n.link)+'</div>' : '')
          + '</div>'
          + '<div class="rbtns"><button class="btn sm" data-act="up" data-id="'+n.id+'">↑</button>'
          + '<button class="btn sm" data-act="down" data-id="'+n.id+'">↓</button></div>'
          + '</div>';
    });
    out += '</div></div>';
  });
  return out || '<div class="lempty">Chưa có node nào.</div>';
}

/* ============ BOARD ============ */
function renderBoard(){
  var out = '<div class="board">';
  S.blocks.forEach(function(b){
    var ns = S.nodes.filter(function(n){ return n.b===b.id; });
    if(filterMode === "hide" && !ns.filter(matches).length) return;
    out += '<div class="col"><div class="colh'+(selKind==="block"&&sel===b.id?" selb":"")+'" data-blk="'+b.id+'" style="cursor:pointer"><span class="gnum">'+esc(b.num)+'</span>'
        + esc(b.name) + '<span class="gcnt">'+ns.length+'</span></div><div class="colb">';
    ns = orderTree(ns);
    ns.forEach(function(n){
      if(hidden(n)) return;
      var d = matches(n) ? "" : " dim";
      var s = (sel===n.id) ? " sel" : "";
      out += '<div class="card'+d+s+(isL3(n)?" lv3":"")+(isOrphan(n)?" orph":"")+'" data-id="'+n.id+'">'
          + '<span class="tchip t-'+n.type+'">'+typeLabel(n.type)+'</span>'
          + '<div class="ctitle">'+esc(n.title)+'</div>'
          + (isEmpty(n) ? '<div class="rmiss">⚠ Chưa có nội dung</div>'
                        : '<div class="ctext">'+esc(n.content)+'</div>')
          + (n.link && n.link.trim() ? '<div class="rlink">🔗</div>' : '')
          + '</div>';
    });
    out += '</div></div>';
  });
  return out + '</div>';
}

/* ============ MINDMAP ============ */


function renderMind(){
  var COLW = 300, ROWH = 30, BX = 210, PAD = 26;
  var rows = 0;
  var layout = [];
  S.blocks.forEach(function(b){
    var ns = orderTree(S.nodes.filter(function(n){ return n.b===b.id && !hidden(n); }));
    if(!ns.length) return;
    var start = rows;
    ns.forEach(function(n){ layout.push({n:n, y: PAD + rows*ROWH + 14}); rows++; });
    var by = PAD + (start + (ns.length-1)/2)*ROWH + 14;
    layout.push({b:b, y:by, top: PAD + start*ROWH + 14, bot: PAD + (rows-1)*ROWH + 14});
  });
  var H = PAD*2 + rows*ROWH;
  var W = 120 + BX + COLW + 60;
  var rootY = H/2;

  /* canvas grows with zoom so scaled content is never clipped */
  var SW = Math.round(W * mmZoom), SH = Math.round(H * mmZoom);
  var svg = '<svg id="mm" width="'+SW+'" height="'+SH+'" viewBox="0 0 '+SW+' '+SH+'">';
  svg += '<g id="mmg" transform="translate('+mmPanX+','+mmPanY+') scale('+mmZoom+')">';

  // edges root -> block
  layout.filter(function(x){return x.b;}).forEach(function(bl){
    svg += '<path d="M 108 '+rootY+' C 150 '+rootY+', 165 '+bl.y+', '+BX+' '+bl.y+'" fill="none" stroke="#C8D2CD" stroke-width="1.4"/>';
  });
  // edges block -> node
  layout.filter(function(x){return x.b;}).forEach(function(bl){
    var ns = S.nodes.filter(function(n){ return n.b===bl.b.id && !hidden(n); });
    ns.forEach(function(n){
      var ly = null;
      for(var i=0;i<layout.length;i++) if(layout[i].n===n) ly = layout[i].y;
      if(ly==null) return;
      svg += '<path d="M '+(BX+86)+' '+bl.y+' C '+(BX+120)+' '+bl.y+', '+(BX+130)+' '+ly+', '+(BX+150)+' '+ly+'" fill="none" stroke="#DDE3E0" stroke-width="1.2"/>';
    });
  });

  // root
  svg += '<g><rect x="8" y="'+(rootY-20)+'" width="100" height="40" rx="9" fill="#0B5D4B"/>'
      + '<text x="58" y="'+(rootY+2)+'" text-anchor="middle" font-family="Outfit" font-size="12.5" font-weight="700" fill="#fff">GIÁO ÁN</text>'
      + '<text x="58" y="'+(rootY+15)+'" text-anchor="middle" font-family="DM Mono" font-size="9" fill="#9FCBBE">6 giờ</text></g>';

  // blocks
  layout.filter(function(x){return x.b;}).forEach(function(bl){
    var bsel = (selKind === "block" && sel === bl.b.id);
    svg += '<g class="mmn" data-blk="'+bl.b.id+'"><rect x="'+BX+'" y="'+(bl.y-14)+'" width="86" height="28" rx="7" fill="'+(bsel?"#E3F0EC":"#fff")+'" stroke="#0B5D4B" stroke-width="'+(bsel?2:1.3)+'"/>'
        + '<text x="'+(BX+43)+'" y="'+(bl.y-1)+'" text-anchor="middle" font-family="DM Mono" font-size="9.5" font-weight="500" fill="#0B5D4B">'+esc(bl.b.num)+'</text>'
        + '<text x="'+(BX+43)+'" y="'+(bl.y+9)+'" text-anchor="middle" font-family="Outfit" font-size="8.5" fill="#5A6560">'+esc(bl.b.time)+'</text></g>';
  });

  // nodes
  layout.filter(function(x){return x.n;}).forEach(function(it){
    var n = it.n, y = it.y, x = BX + 150 + (isL3(n) ? 26 : 0);
    var on = matches(n), s = (sel===n.id);
    var op = on ? 1 : .22;
    var t = n.title.length > 42 ? n.title.slice(0,41)+"…" : n.title;
    svg += '<g class="mmn" data-id="'+n.id+'" opacity="'+op+'">'
        + '<rect x="'+x+'" y="'+(y-11)+'" width="'+(COLW - (isL3(n)?26:0))+'" height="23" rx="6" fill="'+(s?typeBg(n.type):"#fff")+'" stroke="'+(s?typeCol(n.type):"#DDE3E0")+'" stroke-width="'+(s?1.8:1)+'"/>'
        + '<rect x="'+(x+6)+'" y="'+(y-5)+'" width="6" height="11" rx="2" fill="'+typeCol(n.type)+'"/>'
        + (isEmpty(n) ? '<text x="'+(x+COLW-9)+'" y="'+(y+4)+'" text-anchor="end" font-family="Outfit" font-size="10" fill="#A6603A">⚠</text>' : '')
        + '<text x="'+(x+19)+'" y="'+(y+4)+'" font-family="Outfit" font-size="11" fill="#16201C">'+esc(t)+'</text>'
        + '</g>';
  });

  svg += '</g></svg>';
  return '<div class="mmwrap"><div class="mmbar">'
       + '<button class="btn sm" id="zIn">+</button><button class="btn sm" id="zOut">−</button>'
       + '<button class="btn sm" id="zRst">Reset</button></div>' + svg + '</div>';
}


/* ============ DEPENDENCY VIEW ============ */
function renderDep(){
  var r = computeTiers(), tier = r.tier;
  var warn = r.cycle ? '<div class="cycwarn">⚠ Phát hiện vòng lặp phụ thuộc — kiểm tra lại liên kết.</div>' : '';

  /* group nodes by tier */
  var tiers = {}, maxT = 0;
  S.nodes.forEach(function(n){
    if(hidden(n)) return;
    var t = tier[n.id] || 0;
    (tiers[t] = tiers[t] || []).push(n);
    if(t > maxT) maxT = t;
  });

  var CW = 232, CH = 26, GAPY = 9, GAPX = 74, PAD = 30;
  var pos = {}, colH = [];
  for(var t = 0; t <= maxT; t++){
    var arr = tiers[t] || [];
    colH.push(arr.length * (CH + GAPY));
  }
  var H = Math.max.apply(null, colH.concat([120])) + PAD*2 + 34;
  var W = PAD*2 + (maxT+1)*CW + maxT*GAPX;

  for(var t2 = 0; t2 <= maxT; t2++){
    var arr2 = tiers[t2] || [];
    var x = PAD + t2*(CW + GAPX);
    var startY = PAD + 34 + (H - PAD*2 - 34 - arr2.length*(CH+GAPY))/2;
    arr2.forEach(function(n, i){
      pos[n.id] = {x:x, y: startY + i*(CH+GAPY), t:t2};
    });
  }

  /* canvas grows with zoom so scaled content is never clipped */
  var SW = Math.round(W * mmZoom), SH = Math.round(H * mmZoom);
  var svg = '<svg id="mm" width="'+SW+'" height="'+SH+'" viewBox="0 0 '+SW+' '+SH+'">';
  svg += '<defs><marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">'
       + '<path d="M0 0 L8 4 L0 8 z" fill="#8FA8A0"/></marker>'
       + '<marker id="arS" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">'
       + '<path d="M0 0 L8 4 L0 8 z" fill="#0B5D4B"/></marker></defs>';
  svg += '<g id="mmg" transform="translate('+mmPanX+','+mmPanY+') scale('+mmZoom+')">';

  /* tier headers */
  for(var t3 = 0; t3 <= maxT; t3++){
    var hx = PAD + t3*(CW + GAPX);
    svg += '<text x="'+(hx+CW/2)+'" y="'+(PAD+6)+'" text-anchor="middle" font-family="DM Mono" font-size="9.5" fill="#8A938F">'
         + (t3===0 ? 'NỀN TẢNG' : 'TẦNG '+t3) + '</text>';
  }

  /* edges: prerequisite -> node */
  S.nodes.forEach(function(n){
    if(!n.dep || hidden(n)) return;
    var to = pos[n.id]; if(!to) return;
    n.dep.forEach(function(d){
      var from = pos[d]; if(!from) return;
      var hi = (sel === n.id || sel === d);
      var x1 = from.x + CW, y1 = from.y + CH/2;
      var x2 = to.x - 5,    y2 = to.y + CH/2;
      var mx = (x1 + x2)/2;
      svg += '<path d="M '+x1+' '+y1+' C '+mx+' '+y1+', '+mx+' '+y2+', '+x2+' '+y2+'" fill="none" '
           + 'stroke="'+(hi?'#0B5D4B':'#C8D2CD')+'" stroke-width="'+(hi?1.8:1.1)+'" '
           + 'marker-end="url(#'+(hi?'arS':'ar')+')" opacity="'+(hi?1:.75)+'"/>';
    });
  });

  /* node boxes */
  S.nodes.forEach(function(n){
    if(hidden(n)) return;
    var p2 = pos[n.id]; if(!p2) return;
    var on = matches(n), s2 = (sel === n.id);
    var t4 = n.title.length > 30 ? n.title.slice(0,29)+'…' : n.title;
    var b = blockOf(n.b);
    svg += '<g class="mmn" data-id="'+n.id+'" opacity="'+(on?1:.22)+'">'
      + '<rect x="'+p2.x+'" y="'+p2.y+'" width="'+CW+'" height="'+CH+'" rx="6" '
      + 'fill="'+(s2?typeBg(n.type):'#fff')+'" stroke="'+(s2?typeCol(n.type):'#DDE3E0')+'" stroke-width="'+(s2?1.8:1)+'"/>'
      + '<rect x="'+(p2.x+6)+'" y="'+(p2.y+7)+'" width="5" height="12" rx="2" fill="'+typeCol(n.type)+'"/>'
      + '<text x="'+(p2.x+17)+'" y="'+(p2.y+12)+'" font-family="Outfit" font-size="10.5" fill="#16201C">'+esc(t4)+'</text>'
      + '<text x="'+(p2.x+17)+'" y="'+(p2.y+21)+'" font-family="DM Mono" font-size="8" fill="#8A938F">'+esc(b?b.num:'')+'</text>'
      + (isEmpty(n) ? '<text x="'+(p2.x+CW-8)+'" y="'+(p2.y+17)+'" text-anchor="end" font-size="9.5" fill="#A6603A">⚠</text>' : '')
      + '</g>';
  });

  svg += '</g></svg>';
  return warn + '<div class="mmwrap"><div class="mmbar">'
    + '<button class="btn sm" id="zIn">+</button><button class="btn sm" id="zOut">−</button>'
    + '<button class="btn sm" id="zRst">Reset</button></div>' + svg + '</div>';
}

/* ============ GAP TAB ============ */
function renderGap(){
  var empty = S.nodes.filter(isEmpty);
  var noIns = S.nodes.filter(function(n){ return !isEmpty(n) && (!n.insight || !n.insight.trim()); });
  var out = '';

  var orph = S.nodes.filter(isOrphan);
  out += '<div class="grp"><div class="ghd"><span class="gnum" style="background:var(--warn)">⚠</span>'
      + 'Node chưa thuộc Idea/Story nào<span class="gcnt">'+orph.length+'</span></div><div class="rows">';
  if(!orph.length) out += '<div class="lempty">Mọi node chi tiết đều đã có cha. Tốt.</div>';
  orph.forEach(function(n){
    var b = blockOf(n.b);
    out += '<div class="row'+(sel===n.id?" sel":"")+'" data-id="'+n.id+'">'
        + '<span class="tchip t-'+n.type+'">'+typeLabel(n.type)+'</span>'
        + '<div class="rbody"><div class="rtitle">'+esc(n.title)+'</div>'
        + '<div class="rtext" style="color:var(--dim)">'+esc(b?b.num+" · "+b.name:"")+'</div></div></div>';
  });
  out += '</div></div>';

  out += '<div class="grp"><div class="ghd"><span class="gnum" style="background:var(--warn)">⚠</span>'
      + 'Node chưa có nội dung<span class="gcnt">'+empty.length+'</span></div><div class="rows">';
  if(!empty.length) out += '<div class="lempty">Không có node nào trống. Tốt.</div>';
  empty.forEach(function(n){
    var b = blockOf(n.b);
    out += '<div class="row'+(sel===n.id?" sel":"")+'" data-id="'+n.id+'">'
        + '<span class="tchip t-'+n.type+'">'+typeLabel(n.type)+'</span>'
        + '<div class="rbody"><div class="rtitle">'+esc(n.title)+'</div>'
        + '<div class="rtext" style="color:var(--dim)">'+esc(b?b.num+" · "+b.name:"")+'</div>'
        + (n.insight ? '<div class="rmiss" style="color:var(--muted)">'+esc(n.insight)+'</div>' : '')
        + '</div></div>';
  });
  out += '</div></div>';

  // per-block balance
  out += '<div class="grp"><div class="ghd"><span class="gnum">⚖</span>Cân đối idea / ví dụ / bài tập theo khối</div><div class="rows">';
  S.blocks.forEach(function(b){
    var ns = S.nodes.filter(function(n){ return n.b===b.id; });
    if(!ns.length) return;
    var ci = ns.filter(function(n){return n.type==="idea";}).length;
    var cv = ns.filter(function(n){return n.type==="vidu";}).length;
    var cb = ns.filter(function(n){return n.type==="baitap";}).length;
    var flags = [];
    if(ci>0 && cv===0) flags.push("thiếu ví dụ");
    if(ci>0 && cb===0) flags.push("thiếu bài tập");
    out += '<div class="row" style="cursor:default">'
        + '<div class="rbody"><div class="rtitle">'+esc(b.num+" · "+b.name)+'</div>'
        + '<div class="rtext">'
        + '<span class="tchip t-idea">IDEA '+ci+'</span> '
        + '<span class="tchip t-vidu">VÍ DỤ '+cv+'</span> '
        + '<span class="tchip t-baitap">BÀI TẬP '+cb+'</span></div>'
        + (flags.length ? '<div class="rmiss">⚠ '+flags.join(" · ")+'</div>' : '')
        + '</div></div>';
  });
  out += '</div></div>';

  out += '<div class="grp"><div class="ghd"><span class="gnum">💬</span>'
      + 'Có nội dung nhưng chưa có ghi chú khi dạy<span class="gcnt">'+noIns.length+'</span></div><div class="rows">';
  if(!noIns.length) out += '<div class="lempty">Tất cả node đã có ghi chú.</div>';
  noIns.forEach(function(n){
    out += '<div class="row'+(sel===n.id?" sel":"")+'" data-id="'+n.id+'">'
        + '<span class="tchip t-'+n.type+'">'+typeLabel(n.type)+'</span>'
        + '<div class="rbody"><div class="rtitle">'+esc(n.title)+'</div></div></div>';
  });
  out += '</div></div>';
  return out;
}


/* ============ DETAIL / SLIDE PANE ============ */
function visibleNodes(){
  var out = [];
  S.blocks.forEach(function(b){
    S.nodes.forEach(function(n){ if(n.b === b.id && matches(n)) out.push(n); });
  });
  return out;
}
function renderDetail(){
  var el = document.getElementById("det");
  if(!el) return;
  if(!sel){
    el.innerHTML = '<div class="slide"><div class="lempty">Chọn một node để xem dạng slide.</div></div>';
    return;
  }
  if(selKind === "block"){
    var bb = blockOf(sel);
    if(bb){
      var ns = S.nodes.filter(function(x){ return x.b === bb.id; });
      var byType = {};
      ns.forEach(function(x){ byType[x.type] = (byType[x.type]||0)+1; });
      el.innerHTML = '<div class="slide">'
        + '<div class="slblk">KHỐI'+(bb.time?'  ·  '+esc(bb.time):'')+'</div>'
        + '<h2 class="sltitle">'+esc(bb.num)+' · '+esc(bb.name)+'</h2>'
        + (bb.note ? '<div class="slbody">'+esc(bb.note)+'</div>' : '')
        + '<div class="sldep" style="margin-top:0"><span class="l">'+ns.length+' node trong khối</span>'
        + S.types.map(function(t){ return byType[t.id]
            ? '<span class="tchip t-'+t.id+'" style="margin-right:6px">'+esc(t.label.toUpperCase())+' '+byType[t.id]+'</span>' : ''; }).join("")
        + '</div>'
        + '<div class="sldep">' + ns.map(function(x){
            return '<a data-goto="'+x.id+'">'+(isEmpty(x)?'⚠ ':'')+esc(x.title)+'</a>'; }).join("") + '</div>'
        + '</div>';
      el.querySelectorAll("[data-goto]").forEach(function(a){
        a.onclick = function(){ sel = a.getAttribute("data-goto"); selKind = "node"; render(); };
      });
      return;
    }
  }
  var n = nodeOf(sel);
  if(!n){ el.innerHTML = '<div class="slide"><div class="lempty">Node không còn tồn tại.</div></div>'; return; }
  var b = blockOf(n.b);
  var seq = visibleNodes();
  var idx = seq.map(function(x){ return x.id; }).indexOf(n.id);
  var tl = typeLabel(n.type);

  var deps = (n.dep||[]).map(function(d){
    var t = nodeOf(d); if(!t) return "";
    var tb = blockOf(t.b);
    return '<a data-goto="'+d+'"><i>'+esc(tb?tb.num:"?")+'</i>'+esc(t.title)+'</a>';
  }).join("");

  el.innerHTML =
    '<div class="slnav">'
      +'<button class="btn sm" id="slPrev"'+(idx<=0?" disabled":"")+'>‹ Trước</button>'
      +'<button class="btn sm" id="slNext"'+(idx<0||idx>=seq.length-1?" disabled":"")+'>Sau ›</button>'
      +'<span class="spacer"></span>'
      +'<span class="slpos">'+(idx>=0?(idx+1)+" / "+seq.length:"—")+'</span>'
    +'</div>'
    +'<div class="slide">'
      +'<div class="slblk">'+esc(b ? b.num+" · "+b.name : "(chưa xếp khối)")+(b&&b.time?'  ·  '+esc(b.time):'')+'</div>'
      +'<span class="sltype" style="background:'+typeBg(n.type)+';color:'+typeCol(n.type)+'">'+esc(tl)+'</span>'
      +'<h2 class="sltitle">'+esc(n.title)+'</h2>'
      +(n.content && n.content.trim()
          ? '<div class="slbody">'+esc(n.content)+'</div>'
          : '<div class="slbody empty">⚠ Chưa có nội dung — điền ở vùng soạn bên trái.</div>')
      +(n.insight && n.insight.trim()
          ? '<div class="slnote"><span class="l">Ghi chú khi dạy</span>'+esc(n.insight)+'</div>' : '')
      +(deps ? '<div class="sldep"><span class="l">Cần hiểu trước</span>'+deps+'</div>' : '')
      +(n.link && n.link.trim()
          ? '<div class="sllink">' + (isHttp(n.link)
              ? '<a href="'+esc(n.link.trim())+'" target="_blank" rel="noopener noreferrer">↗ Mở tài liệu tham khảo</a>'
              : '<span class="slfile">📎 '+esc(n.link.trim())+'</span>') + '</div>'
          : '')
      +(n.src ? '<div class="slsrc">Nguồn: '+esc(n.src)+'</div>' : '')
    +'</div>';

  var pv = document.getElementById("slPrev"), nx = document.getElementById("slNext");
  if(pv) pv.onclick = function(){ if(idx>0){ flushPending(); burstId=null; sel = seq[idx-1].id; render(); } };
  if(nx) nx.onclick = function(){ if(idx>=0 && idx<seq.length-1){ flushPending(); burstId=null; sel = seq[idx+1].id; render(); } };
  el.querySelectorAll("[data-goto]").forEach(function(a){
    a.onclick = function(){ flushPending(); burstId=null; sel = a.getAttribute("data-goto"); render(); };
  });
}

/* ============ RENDER ============ */
/* renderRight: redraw content pane ONLY — leaves the inspector (and focus) untouched */
function renderRight(){
  var right = document.getElementById("right");
  if(tab === "gap"){
    right.innerHTML = renderGap();
  } else {
    if(view === "list") right.innerHTML = renderList();
    else if(view === "board") right.innerHTML = renderBoard();
    else right.innerHTML = (mmMode === "dep") ? renderDep() : renderMind();
  }
  var tot = S.nodes.length, vis = S.nodes.filter(matches).length;
  document.getElementById("cnt").textContent = vis + "/" + tot + " node";
  var e = S.nodes.filter(isEmpty).length;
  document.getElementById("fstat").textContent = tot + " node · " + S.blocks.length + " khối · " + e + " node trống";
  renderDetail();
  wire();
}

function renderFmode(){
  var b = document.getElementById("fmode");
  if(!b) return;
  b.textContent = (filterMode === "dim") ? "👁 Làm mờ" : "🚫 Ẩn hẳn";
  b.classList.toggle("hidemode", filterMode === "hide");
  b.title = (filterMode === "dim")
    ? "Mục bị lọc đang được làm mờ — bấm để ẩn hẳn"
    : "Mục bị lọc đang bị ẩn — bấm để chuyển sang làm mờ";
}
function renderChips(){
  var el = document.getElementById("tf");
  el.innerHTML = '<span class="fchip'+(filterType==="all"?" on":"")+'" data-t="all">Tất cả</span>'
    + S.types.map(function(t){
        return '<span class="fchip'+(filterType===t.id?" on":"")+'" data-t="'+t.id+'">'+esc(t.label)+'</span>';
      }).join("");
}
function render(){
  renderChips(); renderFmode();
  var right = document.getElementById("right");
  if(tab === "gap"){
    right.innerHTML = renderGap();
    document.getElementById("hintTxt").textContent =
      "Rà soát: node nào còn trống, khối nào thiếu ví dụ hoặc bài tập, node nào chưa có ghi chú khi dạy.";
  } else {
    if(view === "list") right.innerHTML = renderList();
    else if(view === "board") right.innerHTML = renderBoard();
    else right.innerHTML = (mmMode === "dep") ? renderDep() : renderMind();
    document.getElementById("hintTxt").textContent =
      "Phân tầng: Dự án › Khối › Idea/Story › Ví dụ/Câu hỏi/Bài tập. Node chi tiết phải thuộc một Idea hoặc Story. Ba vùng: Soạn · Tổng thể · Slide. Kéo thanh dọc để đổi rộng, nhấp đúp để reset, dùng nút Soạn/Tổng thể/Slide để ẩn hiện.";
  }

  document.getElementById("mmSeg").style.display = (view === "mind" && tab === "edit") ? "" : "none";
  var tot = S.nodes.length, vis = S.nodes.filter(matches).length;
  document.getElementById("cnt").textContent = vis + "/" + tot + " node";
  var e = S.nodes.filter(isEmpty).length;
  document.getElementById("fstat").textContent = tot + " node · " + S.blocks.length + " khối · " + e + " node trống";
  renderLeft();
  renderDetail();
  wire();
}

function wire(){
  var right = document.getElementById("right");
  right.querySelectorAll("[data-blk]").forEach(function(el){
    el.onclick = function(ev){
      ev.stopPropagation();
      flushPending(); burstId = null;
      sel = el.getAttribute("data-blk"); selKind = "block";
      render();
    };
  });
  right.querySelectorAll("[data-id]").forEach(function(el){
    el.onclick = function(ev){
      var act = ev.target.getAttribute("data-act");
      if(act){
        ev.stopPropagation();
        var id = ev.target.getAttribute("data-id"), n = nodeOf(id);
        var i = S.nodes.indexOf(n);
        var sib = S.nodes.filter(function(x){ return x.b===n.b; });
        var si = sib.indexOf(n);
        if(act==="up" && si>0){ snap(); var p=S.nodes.indexOf(sib[si-1]); S.nodes.splice(i,1); S.nodes.splice(p,0,n); save(); render(); }
        if(act==="down" && si<sib.length-1){ snap(); var q2=S.nodes.indexOf(sib[si+1]); S.nodes.splice(i,1); S.nodes.splice(q2,0,n); save(); render(); }
        return;
      }
      var nid = el.getAttribute("data-id");
      flushPending();
      burstId = null;   /* any (re)selection starts a new editing session → own undo point */
      sel = nid; selKind = "node";
      render();
    };
  });
  var zi=document.getElementById("zIn"), zo=document.getElementById("zOut"), zr=document.getElementById("zRst");
  if(zi){
    zi.onclick=function(){ mmZoom=Math.min(2.2,mmZoom*1.2); render(); };
    zo.onclick=function(){ mmZoom=Math.max(.45,mmZoom/1.2); render(); };
    zr.onclick=function(){ mmZoom=1; mmPanX=0; mmPanY=0; render(); };
    var svg=document.getElementById("mm"), dragging=false, sx=0, sy=0, ox=0, oy=0;
    svg.onmousedown=function(e){ if(e.target.closest(".mmn")) return; dragging=true; sx=e.clientX; sy=e.clientY; ox=mmPanX; oy=mmPanY; svg.classList.add("drag"); };
    window.onmousemove=function(e){ if(!dragging) return; mmPanX=ox+(e.clientX-sx); mmPanY=oy+(e.clientY-sy);
      var g=document.getElementById("mmg"); if(g) g.setAttribute("transform","translate("+mmPanX+","+mmPanY+") scale("+mmZoom+")"); };
    window.onmouseup=function(){ if(dragging){ dragging=false; svg.classList.remove("drag"); } };
  }
}

/* ============ INIT ============ */

/* ============ PROJECT MANAGEMENT ============ */
function renderProjBar(){
  var sel2 = document.getElementById("psel");
  if(!sel2) return;
  sel2.innerHTML = PROJ.list.map(function(m){
    return '<option value="'+m.id+'"'+(m.id===PROJ.cur?" selected":"")+'>'+esc(m.title)+'</option>';
  }).join("");
  var m = projMeta(PROJ.cur);
  document.getElementById("ptitle").textContent = m ? m.title : "Ma trận kịch bản";
  document.title = (m ? m.title : "Ma trận kịch bản") + " — Ma trận kịch bản";
  var d = document.getElementById("pdesc");
  var when = m && m.updated ? new Date(m.updated).toLocaleString("vi-VN",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
  d.textContent = (m && m.desc ? m.desc : "") + (when ? "  ·  sửa lần cuối " + when : "");
  document.getElementById("pDel").disabled = PROJ.list.length <= 1;
}

function switchProject(id){
  if(id === PROJ.cur) return;
  flushPending();
  PROJ.cur = id; saveProjects();
  undoStack = []; sel = null; selKind = "node"; burstId = null;
  load(); normalize(); syncTypeStyles(); syncUndo(); render(); renderProjBar();
  pill('Đã mở "' + (projMeta(id) ? projMeta(id).title : id) + '"', "ok");
}

function createProject(fromTemplate){
  var t = prompt("Tên dự án mới:", fromTemplate ? "Giáo án mới" : "Dự án trống");
  if(!t || !t.trim()) return;
  var ds = prompt("Mô tả ngắn (bỏ trống cũng được):") || "";
  flushPending();
  var id = newProjId();
  var model = fromTemplate
    ? JSON.parse(JSON.stringify(SEED))
    : {types: JSON.parse(JSON.stringify(SEED.types)),
       blocks: [{id:"b1", num:"P1", name:"Phần 1", time:"", note:""}],
       nodes: []};
  try{ localStorage.setItem(LS_DATA + id, JSON.stringify(model)); }
  catch(e){ console.error(e); pill("Không tạo được: "+e.message, "err"); return; }
  PROJ.list.push({id:id, title:t.trim(), desc:ds.trim(), updated:new Date().toISOString()});
  PROJ.cur = id; saveProjects();
  undoStack = []; sel = null; selKind = "node"; burstId = null;
  S = model; normalize(); syncTypeStyles(); syncUndo(); render(); renderProjBar();
  pill('Đã tạo "' + t.trim() + '"', "ok");
}

function editProject(){
  var m = projMeta(PROJ.cur); if(!m) return;
  var t = prompt("Tên dự án:", m.title);
  if(t === null) return;
  if(!t.trim()){ pill("Tên dự án không được để trống", "warn"); return; }
  var ds = prompt("Mô tả ngắn:", m.desc || "");
  if(ds === null) ds = m.desc || "";
  m.title = t.trim(); m.desc = ds.trim();
  saveProjects(); renderProjBar();
  pill("Đã cập nhật thông tin dự án", "ok");
}

function duplicateProject(){
  var m = projMeta(PROJ.cur); if(!m) return;
  flushPending();
  var id = newProjId();
  try{ localStorage.setItem(LS_DATA + id, JSON.stringify(S)); }
  catch(e){ console.error(e); pill("Không nhân bản được: "+e.message, "err"); return; }
  PROJ.list.splice(PROJ.list.indexOf(m)+1, 0,
    {id:id, title:m.title + " (bản sao)", desc:m.desc, updated:new Date().toISOString()});
  PROJ.cur = id; saveProjects();
  undoStack = []; syncUndo();
  load(); normalize(); syncTypeStyles(); render(); renderProjBar();
  pill("Đã nhân bản dự án", "ok");
}

function deleteProject(){
  if(PROJ.list.length <= 1){ pill("Phải giữ lại ít nhất một dự án", "warn"); return; }
  var m = projMeta(PROJ.cur); if(!m) return;
  var cnt = S.nodes.length;
  if(!confirm('Xóa dự án "'+m.title+'"?\n\n'+cnt+' node và '+S.blocks.length+' khối sẽ mất khỏi máy này.\n'
    + 'File JSON đã export KHÔNG bị ảnh hưởng.\n\nHành động này KHÔNG hoàn tác được bằng nút Undo.')) return;
  try{ localStorage.removeItem(LS_DATA + m.id); }catch(e){ console.error(e); }
  var i = PROJ.list.indexOf(m);
  PROJ.list.splice(i,1);
  PROJ.cur = PROJ.list[Math.max(0,i-1)].id;
  saveProjects();
  undoStack = []; sel = null; selKind = "node"; burstId = null;
  load(); normalize(); syncTypeStyles(); syncUndo(); render(); renderProjBar();
  pill("Đã xóa dự án", "warn");
}

/* ============ PANES: resize + collapse ============ */
var LS_UI = "giaoan_matrix_ui_v1";
var UI = {w:[20,40,40], hid:{}};
function loadUI(){
  try{ var r = localStorage.getItem(LS_UI); if(r){ var d = JSON.parse(r);
    if(d && Array.isArray(d.w) && d.w.length===3) UI = d; } }
  catch(e){ console.error("UI load lỗi:", e); }
  if(!UI.hid) UI.hid = {};
}
function saveUI(){
  try{ localStorage.setItem(LS_UI, JSON.stringify(UI)); }
  catch(e){ console.error("UI save lỗi:", e); }
}
function applyPanes(){
  var ids = ["left","mid","det"], els = [document.getElementById("left"),
    document.getElementById("right"), document.getElementById("det")];
  var vis = ids.filter(function(k){ return !UI.hid[k]; });
  var sum = vis.reduce(function(a,k){ return a + UI.w[ids.indexOf(k)]; }, 0) || 1;
  ids.forEach(function(k,i){
    var el = els[i]; if(!el) return;
    if(UI.hid[k]){ el.classList.add("hid"); }
    else { el.classList.remove("hid"); el.style.flex = "0 0 " + (UI.w[i]/sum*100).toFixed(3) + "%"; }
  });
  /* a resizer is only useful when both neighbours are visible */
  var r1 = document.getElementById("rsz1"), r2 = document.getElementById("rsz2");
  if(r1) r1.classList.toggle("off", !!(UI.hid.left || UI.hid.mid));
  if(r2) r2.classList.toggle("off", !!(UI.hid.mid || UI.hid.det));
  document.querySelectorAll("#ptog button").forEach(function(b){
    b.classList.toggle("on", !UI.hid[b.getAttribute("data-p")]);
  });
}
function initPanes(){
  loadUI(); applyPanes();
  document.getElementById("ptog").onclick = function(e){
    var k = e.target.getAttribute("data-p"); if(!k) return;
    var vis = ["left","mid","det"].filter(function(x){ return !UI.hid[x]; });
    if(!UI.hid[k] && vis.length === 1){ pill("Phải giữ lại ít nhất một vùng", "warn"); return; }
    UI.hid[k] = !UI.hid[k];
    saveUI(); applyPanes();
    if(view === "mind") render();
  };
  [["rsz1",0,1],["rsz2",1,2]].forEach(function(cfg){
    var el = document.getElementById(cfg[0]); if(!el) return;
    var ia = cfg[1], ib = cfg[2];
    el.onmousedown = function(ev){
      ev.preventDefault();
      var shell = document.getElementById("shell");
      var total = shell.getBoundingClientRect().width;
      var startX = ev.clientX, a0 = UI.w[ia], b0 = UI.w[ib];
      var pairPct = a0 + b0;
      el.classList.add("act");
      document.body.style.cursor = "col-resize";
      function mv(e2){
        var dPct = (e2.clientX - startX) / total * 100;
        var na = a0 + dPct, nb = b0 - dPct;
        var MIN = 8;
        if(na < MIN){ na = MIN; nb = pairPct - MIN; }
        if(nb < MIN){ nb = MIN; na = pairPct - MIN; }
        UI.w[ia] = na; UI.w[ib] = nb;
        applyPanes();
      }
      function up(){
        document.removeEventListener("mousemove", mv);
        document.removeEventListener("mouseup", up);
        el.classList.remove("act");
        document.body.style.cursor = "";
        saveUI();
        if(view === "mind") render();
      }
      document.addEventListener("mousemove", mv);
      document.addEventListener("mouseup", up);
    };
    el.ondblclick = function(){
      UI.w = [20,40,40]; saveUI(); applyPanes();
      if(view === "mind") render();
      pill("Đã đặt lại tỷ lệ 20/40/40", "ok");
    };
  });
}

document.getElementById("addBtn").onclick = function(){
  flushPending(); burstId = null;
  snap();
  /* drop it into whatever block is in focus, else the first one */
  var host = (selKind === "block" && blockOf(sel)) ? sel
           : (selKind === "node" && nodeOf(sel)) ? nodeOf(sel).b
           : S.blocks[0].id;
  var n = {id:"n"+Date.now().toString(36), b:host, type:S.types[0].id,
           title:"(node mới)", content:"", insight:"", src:"", link:"", dep:[]};
  S.nodes.push(n); sel = n.id; selKind = "node";
  save(); render(); pill("Đã thêm node vào " + (blockOf(host) ? blockOf(host).num : "khối"), "ok");
  var t = document.getElementById("e_title"); if(t){ t.focus(); t.select(); }
};
document.getElementById("expBtn").onclick = function(){
  flushPending();
  try{
    var m = projMeta(PROJ.cur);
    var payload = {project: m ? {title:m.title, desc:m.desc} : null,
                   exportedAt: new Date().toISOString(),
                   types:S.types, blocks:S.blocks, nodes:S.nodes};
    var blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    var slug = (m ? m.title : "du-an").toLowerCase()
      .replace(/[^a-z0-9\u00C0-\u1EF9]+/gi,"-").replace(/^-+|-+$/g,"").slice(0,40) || "du-an";
    a.download = slug + "-" + new Date().toISOString().slice(0,10) + ".json";
    a.click(); URL.revokeObjectURL(a.href);
    pill("Đã tải file JSON", "ok");
  }catch(e){ console.error(e); pill("Export lỗi: "+e.message, "err"); }
};
document.getElementById("impBtn").onclick = function(){ document.getElementById("impFile").click(); };
document.getElementById("impFile").onchange = function(ev){
  var f = ev.target.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(){
    try{
      var d = JSON.parse(r.result);
      if(!d.nodes || !d.blocks) throw new Error("File không đúng định dạng — thiếu 'nodes' hoặc 'blocks'");
      var asNew = confirm("Nạp "+d.nodes.length+" node từ file:\n\n"
        + "OK = tạo DỰ ÁN MỚI (giữ nguyên dự án đang mở)\n"
        + "Cancel = GHI ĐÈ dự án đang mở ("+S.nodes.length+" node, hoàn tác được bằng Undo)");
      var model = {types: d.types || JSON.parse(JSON.stringify(SEED.types)), blocks: d.blocks, nodes: d.nodes};
      if(asNew){
        var nid = newProjId();
        var nt = (d.project && d.project.title) ? d.project.title : ("Nhập từ file " + f.name.replace(/\.json$/i,""));
        localStorage.setItem(LS_DATA + nid, JSON.stringify(model));
        PROJ.list.push({id:nid, title:nt, desc:(d.project && d.project.desc) || "", updated:new Date().toISOString()});
        PROJ.cur = nid; saveProjects();
        undoStack = []; sel = null; selKind = "node"; burstId = null;
        S = model; normalize(); syncTypeStyles(); syncUndo(); render(); renderProjBar();
        pill('Đã tạo dự án "'+nt+'" với '+d.nodes.length+' node', "ok");
      } else {
        snap(); S = model; sel = null; selKind = "node";
        normalize(); syncTypeStyles(); save(); render();
        pill("Đã ghi đè: "+d.nodes.length+" node", "ok");
      }
    }catch(e){ console.error(e); pill("Import lỗi: "+e.message, "err"); }
    ev.target.value = "";
  };
  r.onerror = function(){ pill("Không đọc được file", "err"); };
  r.readAsText(f);
};
